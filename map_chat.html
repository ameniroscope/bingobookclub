<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Bingo Book Club</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  background: #0d0a0e;
  height: 100vh;
  overflow: hidden;
}

.split {
  display: flex;
  width: 100vw;
  height: 100vh;
}

.panel {
  width: 50%;
  height: 100%;
  border: none;
}

.divider {
  width: 2px;
  background: #c9a84c55;
}

@media (max-width: 800px) {
  .split {
    flex-direction: column;
  }

  .panel {
    width: 100%;
    height: 50%;
  }

  .divider {
    width: 100%;
    height: 2px;
  }
}

</style>
</head>

<body>

<div class="split">
  <iframe class="panel" src="map.html"></iframe>
  <div class="divider"></div>
  <iframe class="panel" src="chapter_hub.html"></iframe>
</div>

</body>
</html>
