:root {
  --base: 20px;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  font-size: var(--base);
  height: 100%;
}

body {
  background: #0d0a0e;
  font-family: 'Crimson Text', Georgia, serif;
  height: 100%;
  width: 100%;
  overflow: hidden;
}

/* TOP NAV */
.top-nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  background: #0f0b12;
  border-bottom: 1px solid #c9a84c22;
  padding: 0.75rem 1rem;
  overflow-x: auto;
  display: flex;
  gap: 0.5rem;
  scrollbar-width: none;
}

.top-nav::-webkit-scrollbar {
  display: none;
}

.nav-btn {
  flex-shrink: 0;
  padding: 0.4375rem 0.75rem;
  font-family: 'Cinzel', serif;
  font-size: 0.7rem;
  letter-spacing: 0.0625rem;
  text-transform: uppercase;
  cursor: pointer;
  border: 1px solid #c9a84c33;
  border-radius: 4px;
  background: transparent;
  color: #c9a84ccc;
  white-space: nowrap;
  transition: all 0.2s;
}

.nav-btn.active {
  border-color: #c9a84c;
  color: #c9a84c;
  background: rgba(201,168,76,0.08);
}

/* SLIDER */
.slider-outer {
  position: fixed;
  top: 53px;
  left: 0;
  right: 0;
  bottom: 0;
  overflow: hidden;
}

.slider-track {
  display: flex;
  height: 100%;
  transition: transform 0.35s ease;
}

.slide {
  min-width: 100%;
  height: 100%;
  flex-shrink: 0;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  min-height: 0;
}

/* SCROLL AREA */
.card-scroll {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 1rem 1rem 5rem;
  -webkit-overflow-scrolling: touch;
}

/* DESKTOP CENTERING */
@media (min-width: 760px) {
  .card-scroll {
    padding: 2rem 1rem 5rem;
  }

  .card,
  .store-bar {
    width: 100%;
    max-width: 720px;
    margin-left: auto;
    margin-right: auto;
  }
}

/* CARD */
.card {
  background: linear-gradient(170deg,#1a1020 0%,#110d14 50%,#0f0a10 100%);
  border: 1px solid #c9a84c55;
  border-radius: 0.5rem;
  overflow: hidden;
  position: relative;
  margin-bottom: 1rem;
}

.card::before,
.card::after {
  content: '';
  position: absolute;
  width: 1.875rem;
  height: 1.875rem;
  border-color: #c9a84c55;
  border-style: solid;
  border-width: 0;
}

.card::before {
  top: 0.5rem;
  left: 0.5rem;
  border-top-width: 1px;
  border-left-width: 1px;
}

.card::after {
  top: 0.5rem;
  right: 0.5rem;
  border-top-width: 1px;
  border-right-width: 1px;
}

.corner-bl,
.corner-br {
  position: absolute;
  width: 1.875rem;
  height: 1.875rem;
  border-color: #c9a84c55;
  border-style: solid;
  border-width: 0;
}

.corner-bl {
  bottom: 0.5rem;
  left: 0.5rem;
  border-bottom-width: 1px;
  border-left-width: 1px;
}

.corner-br {
  bottom: 0.5rem;
  right: 0.5rem;
  border-bottom-width: 1px;
  border-right-width: 1px;
}

.accent-bar {
  height: 0.25rem;
}

.header {
  padding: 1.125rem 1.25rem 0.75rem;
  text-align: center;
}

.crown {
  font-size: 1.25rem;
  color: #c9a84c;
  margin-bottom: 0.25rem;
  display: block;
}

.book-title {
  font-family: 'Cinzel', serif;
  font-size: 1.375rem;
  font-weight: 700;
  color: #f0e6c8;
  line-height: 1.2;
  letter-spacing: 0.0625rem;
}

.author-line {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
  margin-top: 0.5rem;
}

.author-line .rule {
  flex: 1;
  height: 1px;
  max-width: 3.125rem;
}

.author-line .rule.l {
  background: linear-gradient(to right,transparent,#c9a84c66);
}

.author-line .rule.r {
  background: linear-gradient(to left,transparent,#c9a84c66);
}

.author {
  font-family: 'Cinzel', serif;
  font-size: 0.7rem;
  letter-spacing: 0.15625rem;
  color: #c9a84c;
  text-transform: uppercase;
}

.divider {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0 1.25rem;
  margin: 0.25rem 0;
}

.divider .line {
  flex: 1;
  height: 1px;
  background: linear-gradient(to right,transparent,#c9a84c33,transparent);
}

.divider .dot {
  color: #c9a84c;
  font-size: 0.5rem;
}

/* COVER + STATS */
.mid {
  display: flex;
  gap: 0.875rem;
  padding: 0.75rem 1rem 0.5rem;
  align-items: flex-start;
}

.cover {
  width: 6.875rem;
  min-width: 6.875rem;
  height: 10.3125rem;
  border-radius: 0.375rem;
  border: 1px solid #c9a84c22;
  overflow: hidden;
  flex-shrink: 0;
}

.cover img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* STATS */
.mid-right {
  flex: 1;
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(2,1fr);
  gap: 1px;
  background: #c9a84c11;
  border: 1px solid #c9a84c11;
  border-radius: 0.375rem;
  overflow: hidden;
}

.stat-row {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  padding: 0.5rem 0.25rem;
  background: #0f0b12;
}

.stat-icon {
  font-size: 0.9375rem;
  margin-bottom: 0.1875rem;
}

.stat-label {
  font-family: 'Cinzel', serif;
  font-size: 0.4375rem;
  letter-spacing: 0.0625rem;
  color: #c9a84c88;
  text-transform: uppercase;
  margin-bottom: 0.125rem;
}

.stat-val {
  font-size: 0.625rem;
  color: #f0e6c8;
  line-height: 1.3;
}

.stat-sub {
  font-size: 0.5625rem;
  color: #8a7060;
  font-style: italic;
  line-height: 1.3;
  margin-top: 0.0625rem;
}

/* IF LIKED */
.if-liked-full {
  margin: 0 1rem 0.5rem;
  padding: 0.375rem 0.625rem;
  border: 1px solid #c9a84c22;
  border-radius: 0.3125rem;
  background: rgba(201,168,76,0.03);
}

.if-liked-label {
  font-family: 'Cinzel', serif;
  font-size: 0.4375rem;
  letter-spacing: 0.0625rem;
  color: #c9a84c88;
  text-transform: uppercase;
  display: block;
  margin-bottom: 0.1875rem;
}

.if-liked-val {
  font-size: 0.6875rem;
  color: #c8b89a;
  line-height: 1.5;
  font-style: italic;
}

/* SUMMARY */
.summary {
  padding: 0.625rem 1rem;
}

.summary p {
  font-size: 0.8125rem;
  color: #c8b89a;
  line-height: 1.8;
  text-align: justify;
}

.bars-section {

.bars-title {

.bars-title::before,

.bar-label {
  font-size: 0.6875rem;
  color: #a89070;

.bar-val {

.trope-desc {

  flex-direction: column;
  align-items: center;
  gap: 0.25rem;

  font-family: 'Cinzel', serif;
  font-size: 0.46875rem;
  letter-spacing: 0.0625rem;
  text-transform: uppercase;
  border: 1px solid #c9a84c44;
  border-radius: 0.375rem;
  background: transparent;
  color: #c9a84c88;
  text-decoration: none;
  transition: all 0.2s;

.store-btn:active,
.store-btn:hover {
  border-color: #c9a84c;
  color: #c9a84c;
  background: rgba(201,168,76,0.08);
}

.store-btn-icon {
  font-size: 1.125rem;
}

/* DOTS */
.dots {
  position: fixed;
  bottom: 1rem;
  left: 0;
  right: 0;
  display: flex;
  justify-content: center;
  gap: 0.375rem;
  z-index: 50;
  pointer-events: none;
}

.dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: #c9a84c33;
  transition: background 0.3s;
}

.dot.active {
  background: #c9a84c;
}

/* MOBILE */
@media (max-width: 480px) {
  :root {
    --base: 18px;

    min-width: 6.2rem;
    height: 9.3rem;

.home-btn {

    bottom: 1.2rem;
    left: 1.2rem;
    z-index: 1000;

    align-items: center;
    justify-content: center;

    height: 40px;

.home-btn:hover {

.loading {

  align-items: center;
  justify-content: center;
  height: 100vh;

  color: #c9a84c;

.no-card-msg {

  color: #c9a84c88;
  font-size: 0.85rem;
  letter-spacing: 0.08em;
  line-height: 1.6;
}
  
</style>

    amazon: 'https://www.amazon.com/s?k=the+bridge+kingdom+jensen'
  },
  'a-touch-of-darkness': {
    crown: '🌙',
    accent: 'linear-gradient(to right,#2a1a4a,#7a4aa0,#2a1a4a)',
    genre: 'Mythology romantasy',
    pages: '~350 pages',
    audio: '~11h audio',
    series: '4 + 3 Hades POV',
    seriesSub: 'All finished',
    spice: '🌶️🌶️🌶️',
    spiceLabel: 'High',
    spiceSub: 'Explicit content',
    ifLiked: 'ACOTAR · Neon Gods · From Blood and Ash',
    summary: 'Persephone is the Goddess of Spring in title only — flowers shrivel at her touch. Living undercover as a mortal journalist in New Athens, she makes a reckless bet at a nightclub with Hades, God of the Dead. The terms are impossible: grow something living in the Underworld or lose her freedom forever. But as she descends into his world, she begins to wonder if the real danger isn\'t the bet — it\'s the god himself, and the feelings neither of them can afford to have.',
    vibes: [
      { label: 'Political intrigue', val: 'medium', width: 45 },
      { label: 'Plot twists', val: 'medium', width: 50 },
      { label: 'Character', val: 'high', width: 78 },
      { label: 'Magic', val: 'high', width: 80 }
    ],
    tropes: [
      { icon: '🌑', label: 'Villain romance', desc: 'Hades is everything' },
      { icon: '🌸', label: 'Forbidden love', desc: 'A bet with a god' },
      { icon: '🔮', label: 'Mythology', desc: 'Greek gods, modern world' }
    ],
    goodreads: 'https://www.goodreads.com/book/show/58750487-a-touch-of-darkness',
    orell: 'https://www.orellfuessli.ch/suche?sq=a+touch+of+darkness',
    amazon: 'https://www.amazon.com/s?k=a+touch+of+darkness+st+clair'
  }
};

function slugify(str) {
  return str.toLowerCase()
    .replace(/[^\w\s-]/g, '')
    .replace(/\s+/g, '-')
    .replace(/-+/g, '-')
    .trim();
}

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const booksCol = collection(db, "books");

let allBooks = {};
let booksList = [];
let currentIndex = 0;

// Get URL parameters
const params = new URLSearchParams(window.location.search);
const targetBookId = params.get('id');
const targetSlug = params.get('book');

onSnapshot(booksCol, snap => {
  allBooks = {};
  snap.forEach(d => { allBooks[d.id] = { id: d.id, ...d.data() }; });
  booksList = Object.values(allBooks).sort((a, b) => (a.addedAt || 0) - (b.addedAt || 0));
  
  // Find starting index
  if (targetBookId && allBooks[targetBookId]) {
    currentIndex = booksList.findIndex(b => b.id === targetBookId);
    if (currentIndex === -1) currentIndex = 0;
  } else if (targetSlug) {
    currentIndex = booksList.findIndex(b => slugify(b.title) === targetSlug);
    if (currentIndex === -1) currentIndex = 0;
  }
  
  renderAll();
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'block';
});

function renderAll() {
  if (!booksList.length) {
    document.getElementById('sliderTrack').innerHTML = '<div class="no-card-msg">No books available yet!</div>';
    return;
  }

  const topNav = document.getElementById('topNav');
  const dots = document.getElementById('dots');
  const track = document.getElementById('sliderTrack');

  // Render nav buttons
  topNav.innerHTML = booksList.map((book, i) => 
    `<button class="nav-btn${i === currentIndex ? ' active' : ''}" data-index="${i}">${book.title}</button>`
  ).join('');

  // Render dots
  dots.innerHTML = booksList.map((_, i) => 
    `<div class="dot${i === currentIndex ? ' active' : ''}"></div>`
  ).join('');

  // Render slides
  track.style.width = `${booksList.length * 100}%`;
  track.innerHTML = booksList.map(book => renderSlide(book)).join('');

  // Set up nav click handlers
  topNav.querySelectorAll('.nav-btn').forEach(btn => {
    btn.addEventListener('click', () => goTo(parseInt(btn.dataset.index)));
  });

  // Initial position
  goTo(currentIndex);

  // Touch swipe
  setupSwipe();
}

function renderSlide(book) {
  const slug = slugify(book.title);
  const cardData = BOOK_CARDS[slug];
  
  if (!cardData) {
    return `<div class="slide"><div class="card-scroll">
      <div class="no-card-msg">
        📖<br><br>
        Detailed card for <strong>${book.title}</strong> is coming soon!<br><br>
        This book was recommended by ${book.recommenderEmoji} ${book.recommender}
      </div>
    </div></div>`;
  }

  const { crown, accent, genre, pages, audio, series, seriesSub, spice, spiceLabel, spiceSub, 
          ifLiked, summary, vibes, tropes, goodreads, orell, amazon } = cardData;

  return `<div class="slide"><div class="card-scroll">
    <div class="card">
      <div class="corner-bl"></div><div class="corner-br"></div>
      <div class="accent-bar" style="background:${accent};"></div>
      <div class="header">
        <span class="crown">${crown}</span>
        <div class="book-title">${book.title}</div>
        <div class="author-line">
          <div class="rule l"></div>
          <span style="color:#c9a84c;font-size:0.625rem;">✦</span>
          <span class="author">${book.author || 'Unknown Author'}</span>
          <span style="color:#c9a84c;font-size:0.625rem;">✦</span>
          <div class="rule r"></div>
        </div>
      </div>
      <div class="mid">
        <div class="cover">
          ${book.cover ? `<img src="${book.cover}" alt="cover">` : '📖'}
        </div>
        <div class="mid-right">
          <div class="stats-grid">
            <div class="stat-row"><span class="stat-icon">🌑</span><span class="stat-label">Genre</span><span class="stat-val">${genre}</span></div>
            <div class="stat-row"><span class="stat-icon">⏱️</span><span class="stat-label">Length</span><span class="stat-val">${pages}</span><span class="stat-sub">${audio}</span></div>
            <div class="stat-row"><span class="stat-icon">📖</span><span class="stat-label">Series</span><span class="stat-val">${series}</span><span class="stat-sub">${seriesSub}</span></div>
            <div class="stat-row"><span class="stat-icon">${spice}</span><span class="stat-label">Spice</span><span class="stat-val">${spiceLabel}</span><span class="stat-sub">${spiceSub}</span></div>
          </div>
        </div>
      </div>
      <div class="if-liked-full">
        <span class="if-liked-label">Perfect if you liked</span>
        <span class="if-liked-val">${ifLiked}</span>
      </div>
      <div class="divider"><div class="line"></div><div class="dot">◆</div><div class="line"></div></div>
      <div class="summary"><p>${summary}</p></div>
      <div class="divider"><div class="line"></div><div class="dot">◆</div><div class="line"></div></div>
      <div class="bars-section">
        <div class="bars-title">Vibes</div>
        ${vibes.map(v => `<div class="bar-row">
          <div class="bar-header"><span class="bar-label">${v.label}</span><span class="bar-val">${v.val}</span></div>
          <div class="bar-track"><div class="bar-fill" style="width:${v.width}%;background:${accent};"></div></div>
        </div>`).join('')}
      </div>
      <div class="tropes">
        ${tropes.map(t => `<div class="trope">
          <span class="trope-icon">${t.icon}</span>
          <span class="trope-label">${t.label}</span>
          <span class="trope-desc">${t.desc}</span>
        </div>`).join('')}
      </div>
    </div>
    <div class="store-bar">
      <a class="store-btn" href="${goodreads}" target="_blank"><span class="store-btn-icon">📚</span>Goodreads</a>
      <a class="store-btn" href="${orell}" target="_blank"><span class="store-btn-icon">🏪</span>OrellFüsseli</a>
      <a class="store-btn" href="${amazon}" target="_blank"><span class="store-btn-icon">📦</span>Amazon</a>
    </div>
  </div></div>`;
}

function goTo(n) {
  if (n < 0 || n >= booksList.length) return;
  currentIndex = n;
  
  const track = document.getElementById('sliderTrack');
  track.style.transform = `translateX(-${100 / booksList.length * n}%)`;
  
  document.querySelectorAll('.nav-btn').forEach((b, i) => {
    b.classList.toggle('active', i === n);
  });
  
  document.querySelectorAll('.dot').forEach((d, i) => {
    d.classList.toggle('active', i === n);
  });
  
  const activeBtn = document.querySelector('.nav-btn.active');
  if (activeBtn) {
    activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  }
}

function setupSwipe() {
  let tx = 0, ty = 0, tt = 0, dragging = false;
  const outer = document.getElementById('sliderOuter');

  outer.addEventListener('touchstart', e => {
    tx = e.touches[0].clientX;
    ty = e.touches[0].clientY;
    tt = Date.now();
    dragging = true;
  }, { passive: true });

  outer.addEventListener('touchmove', e => {
    if (!dragging) return;
    const dx = e.touches[0].clientX - tx;
    const dy = e.touches[0].clientY - ty;
    if (Math.abs(dy) > Math.abs(dx)) {
      dragging = false;
    }
  }, { passive: true });

  outer.addEventListener('touchend', e => {
    if (!dragging) return;
    dragging = false;
    const dx = e.changedTouches[0].clientX - tx;
    const dy = e.changedTouches[0].clientY - ty;
    const dt = Date.now() - tt;
    if (dt > 500 || Math.abs(dy) > Math.abs(dx) || Math.abs(dx) < 40) return;
    dx < 0 ? goTo(currentIndex + 1) : goTo(currentIndex - 1);
  }, { passive: true });
}
</script>
