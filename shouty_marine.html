<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!--
  PLAYER CONFIG — change these lines per file:
    marine.html  →  PID = "marine"  PEMOJI = "🧜‍♀️"  PNAME = "Marine"  CARD_PASSWORD = "marinara"
    kathi.html   →  PID = "kathi"   PEMOJI = "🍄"    PNAME = "Kathi"   CARD_PASSWORD = "your-password"
-->
<title>Book Club — Player</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Cinzel:wght@400;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--ink:#2b1d0e;--ink-faded:#5c3d1e;--gold:#8b6914;--gold-lt:#c9a84c;--parch:#f2e8d0;--parch-dark:#e0ceaa;--worn:#c9af82;}
html,body{min-height:100vh;font-family:'IM Fell English',Georgia,serif;color:var(--ink);}
#bg{position:fixed;inset:0;z-index:0;background:var(--parch);}
#bg::after{content:'';position:absolute;inset:0;background:
  radial-gradient(ellipse 70% 50% at 15% 20%,rgba(180,130,60,0.13) 0%,transparent 55%),
  radial-gradient(ellipse 60% 70% at 85% 75%,rgba(160,110,40,0.10) 0%,transparent 55%),
  radial-gradient(ellipse 100% 100% at 50% 50%,transparent 60%,rgba(80,40,5,0.18) 100%);}

/* TOP BAR */
.topbar{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;
  padding:0.75rem 1.5rem;border-bottom:1px solid var(--worn);background:rgba(242,232,208,0.95);}
.topbar-title{font-family:'Cinzel',serif;font-size:0.72rem;letter-spacing:3px;text-transform:uppercase;color:var(--gold);}
.home-link{font-family:'Cinzel',serif;font-size:0.58rem;letter-spacing:1.5px;text-transform:uppercase;
  text-decoration:none;color:var(--ink-faded);border:1px solid var(--worn);border-radius:4px;padding:0.3rem 0.65rem;transition:all 0.2s;}
.home-link:hover{border-color:var(--gold);color:var(--ink);}

/* LAYOUT */
.wrap{position:relative;z-index:1;min-height:calc(100vh - 48px);max-width:1100px;
  margin:0 auto;padding:2rem 1.5rem;display:grid;grid-template-columns:1fr 1fr;gap:2rem;align-items:start;}

.kicker{font-family:'Cinzel',serif;font-size:0.58rem;letter-spacing:4px;color:var(--gold);text-transform:uppercase;margin-bottom:0.3rem;}
.parch-card{background:rgba(242,232,208,0.82);border:1.5px solid var(--worn);border-radius:8px;
  box-shadow:inset 0 1px 6px rgba(100,60,10,0.1),0 2px 10px rgba(0,0,0,0.15);padding:1.1rem;}

/* ── BINGO ── */
.bingo-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:0.5rem;flex-wrap:wrap;}
.bingo-badge{background:#3b1e06;color:var(--gold-lt);font-size:9px;font-family:'Cinzel',serif;
  letter-spacing:1px;padding:2px 8px;border-radius:3px;border:1px solid var(--gold-lt);display:none;}
.bingo-badge.show{display:inline;}

/* Lock button inside bingo header */
.bingo-lock-btn{background:none;border:1.5px solid var(--worn);border-radius:50%;
  width:28px;height:28px;cursor:pointer;font-size:0.85rem;display:flex;align-items:center;
  justify-content:center;transition:all 0.2s;flex-shrink:0;padding:0;}
.bingo-lock-btn:hover{border-color:var(--gold);}
.bingo-lock-btn.unlocked{border-color:var(--gold);background:rgba(139,105,20,0.15);}

/* Password modal — uses normal flow wrapper so it doesn't collapse the iframe */
.lock-modal-wrap{display:none;position:fixed;inset:0;z-index:400;background:rgba(20,10,4,0.72);
  align-items:center;justify-content:center;}
.lock-modal-wrap.open{display:flex;}
.lock-modal{background:var(--parch);border:2px solid var(--worn);border-radius:10px;
  padding:1.5rem;display:flex;flex-direction:column;gap:0.75rem;min-width:240px;
  box-shadow:0 8px 30px rgba(0,0,0,0.5);}
.lock-modal h3{font-family:'Cinzel',serif;font-size:0.85rem;letter-spacing:1px;color:var(--gold);margin:0;}
.lock-modal input[type="password"]{
  width:100%;background:rgba(255,252,244,0.9);border:1px solid var(--worn);border-radius:4px;
  color:var(--ink);font-family:'IM Fell English',serif;font-size:1rem;padding:0.4rem 0.6rem;
  text-align:center;outline:none;}
.lock-modal input[type="password"]:focus{border-color:var(--gold);}
.lock-error{color:#c0392b;font-size:0.78rem;min-height:1em;text-align:center;}
.lock-modal-btns{display:flex;gap:0.5rem;}
.lock-modal-btns button{flex:1;font-family:'Cinzel',serif;font-size:0.6rem;letter-spacing:1.5px;
  text-transform:uppercase;padding:0.45rem;background:#3b1e06;color:var(--gold-lt);
  border:1px solid var(--gold-lt);border-radius:4px;cursor:pointer;transition:background 0.2s;}
.lock-modal-btns button:hover{background:#5a3010;}

/* Bingo card image container */
.bingo-card-wrap{position:relative;width:100%;aspect-ratio:1024/1536;
  background-image:url('current_bingo.png');background-size:100% 100%;margin-top:6px;}

/* Grid overlaid on the image — same positioning as original bingo page */
.bingo-grid{position:absolute;left:50%;top:34.5%;width:73%;aspect-ratio:1/1;
  transform:translateX(-50%);display:grid;
  grid-template-columns:repeat(5,1fr);grid-template-rows:repeat(5,1fr);}

.bingo-cell{aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;
  font-size:clamp(7px,1.3vw,11px);line-height:1.2;text-align:center;
  padding:2px;overflow:hidden;cursor:pointer;transition:background 0.15s;}
.bingo-cell.marked{background:rgba(212,175,55,0.55);}
.bingo-cell.free{font-weight:600;color:var(--gold);cursor:default;}

/* Cell text (read mode) */
.cell-text{width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  text-align:center;font-family:'IM Fell English',Georgia,serif;font-size:inherit;
  line-height:1.2;color:#2a1a0a;padding:2px;overflow-wrap:break-word;word-break:break-word;}

/* Cell textarea (edit mode) */
.bingo-cell textarea{width:100%;height:100%;border:none;background:rgba(255,252,240,0.7);
  outline:none;resize:none;text-align:center;font-family:'IM Fell English',Georgia,serif;
  font-size:inherit;line-height:1.2;color:#2a1a0a;padding:2px;overflow:hidden;
  overflow-wrap:break-word;word-break:break-word;}

.bingo-hint{font-size:9px;color:var(--gold);margin-top:5px;font-style:italic;}
.bingo-status{font-size:9px;color:var(--ink-faded);font-style:italic;text-align:right;margin-top:3px;min-height:1em;}

/* ── ROOMS (right column) ── */
.rooms-col{display:flex;flex-direction:column;gap:1rem;}
.rooms-header{display:flex;align-items:center;gap:0.75rem;}
.player-avatar{width:42px;height:42px;border-radius:50%;background:#3b1e06;border:1.5px solid var(--gold-lt);
  display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0;}
.rooms-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.room-btn{position:relative;height:80px;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:0.2rem;border-radius:6px;cursor:pointer;transition:all 0.2s;border:1.5px solid;}
.room-btn:hover{transform:translateY(-2px);box-shadow:0 5px 18px rgba(0,0,0,0.28);}
.room-btn.general{background:rgba(242,232,208,0.92);border-color:var(--gold);color:var(--ink);}
.room-btn.unlocked{background:rgba(139,105,20,0.18);border-color:var(--gold);color:var(--ink);}
.room-btn.locked{background:rgba(59,30,6,0.88);border-color:var(--gold-lt);color:var(--parch);}
.room-btn:hover.locked{background:#5a3010;}
.btn-label{font-family:'Cinzel',serif;font-size:0.7rem;letter-spacing:1px;font-weight:600;}
.btn-sub{font-size:0.65rem;font-style:italic;opacity:0.75;}
.btn-badge{position:absolute;top:5px;right:7px;font-family:'Cinzel',serif;font-size:0.5rem;
  letter-spacing:1px;padding:0.1rem 0.35rem;border-radius:3px;}
.room-btn.general .btn-badge,.room-btn.unlocked .btn-badge{background:var(--gold);color:var(--parch);}
.room-btn.locked .btn-badge{background:rgba(201,168,76,0.18);color:var(--gold-lt);}

/* ── CHAT MODAL ── */
.overlay{position:fixed;inset:0;z-index:200;background:rgba(20,10,4,0.72);
  display:flex;align-items:center;justify-content:center;padding:1rem;
  opacity:0;pointer-events:none;transition:opacity 0.2s;}
.overlay.open{opacity:1;pointer-events:all;}
.chat-modal{background:var(--parch);border:2px solid var(--worn);border-radius:10px;width:100%;
  max-width:650px;height:88vh;max-height:88vh;display:flex;flex-direction:column;
  box-shadow:0 8px 40px rgba(0,0,0,0.55),inset 0 1px 10px rgba(100,60,10,0.1);
  transform:translateY(12px);transition:transform 0.2s;}
.overlay.open .chat-modal{transform:translateY(0);}
.chat-hdr{padding:1rem 1.25rem 0.85rem;border-bottom:1px solid var(--worn);
  background:rgba(201,175,130,0.3);border-radius:8px 8px 0 0;
  display:flex;align-items:flex-start;justify-content:space-between;gap:0.5rem;}
.chat-room-label{font-family:'Cinzel',serif;font-size:0.6rem;letter-spacing:2px;color:var(--gold);}
.chat-title{font-family:'Cinzel',serif;font-size:1.05rem;font-weight:600;color:var(--ink);}
.chat-sub{font-size:0.78rem;color:var(--ink-faded);font-style:italic;margin-top:0.1rem;}
.chat-status{display:inline-block;margin-top:4px;font-family:'Cinzel',serif;font-size:0.55rem;
  letter-spacing:1px;padding:0.18rem 0.5rem;border-radius:3px;}
.chat-status.open,.chat-status.unlocked{background:var(--gold);color:var(--parch);}
.chat-status.locked{background:#3b1e06;color:var(--gold-lt);border:1px solid var(--gold-lt);}
.close-btn{background:none;border:none;cursor:pointer;color:var(--ink-faded);font-size:1.3rem;line-height:1;padding:0.1rem;transition:color 0.15s;}
.close-btn:hover{color:var(--ink);}
.messages{flex:1;overflow-y:auto;padding:0.9rem 1.1rem;display:flex;flex-direction:column;gap:0.7rem;min-height:420px;}
.empty-msg,.write-note{font-size:0.85rem;color:var(--ink-faded);font-style:italic;text-align:center;margin:auto;line-height:1.8;}
.write-note strong{display:block;font-family:'Cinzel',serif;font-size:0.78rem;font-style:normal;margin-bottom:0.3rem;color:var(--ink-faded);}
.msg-name{font-family:'Cinzel',serif;font-size:0.65rem;letter-spacing:1px;color:var(--gold);display:block;margin-bottom:0.1rem;}
.msg.mine .msg-name{color:#3b1e06;}
.msg-text{font-size:0.9rem;color:var(--ink);line-height:1.65;}
.compose{border-top:1px solid var(--worn);padding:0.65rem 1rem;display:flex;gap:0.45rem;align-items:flex-end;
  background:rgba(201,175,130,0.18);border-radius:0 0 8px 8px;}
.compose textarea{flex:1;resize:none;min-height:38px;max-height:100px;background:rgba(255,252,244,0.85);
  border:1px solid var(--worn);border-radius:4px;padding:0.38rem 0.55rem;
  font-family:'IM Fell English',serif;font-size:0.9rem;color:var(--ink);line-height:1.5;}
.compose textarea::placeholder{color:var(--worn);font-style:italic;}
.compose textarea:focus{outline:none;border-color:var(--gold);}
.send-btn{height:38px;padding:0 0.9rem;background:#3b1e06;border:1px solid var(--gold-lt);border-radius:4px;
  color:var(--gold-lt);font-family:'Cinzel',serif;font-size:0.62rem;letter-spacing:1.5px;
  text-transform:uppercase;cursor:pointer;transition:background 0.2s;white-space:nowrap;}
.send-btn:hover{background:#5a3010;}

/* FOOTER */
.footer{position:relative;z-index:1;font-family:'Cinzel',serif;font-size:0.55rem;letter-spacing:3px;
  color:var(--gold);text-transform:uppercase;text-align:center;padding:1.5rem 0 1rem;}
.footer-orn{display:flex;align-items:center;gap:0.5rem;max-width:10rem;margin:0 auto 0.4rem;}

@media(max-width:800px){.wrap{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div id="bg"></div>

<!-- TOP BAR -->
<header class="topbar">
  <div class="topbar-title" id="pageTitle">— Book Club —</div>
  <a class="home-link" href="shouty_index.html">🦖 Shouty Bookclub</a>
</header>

<!-- MAIN LAYOUT -->
<div class="wrap">

  <!-- LEFT: BINGO -->
  <div class="parch-card">
    <div class="bingo-header">
      <div class="kicker">Reading Bingo</div>
      <div style="display:flex;align-items:center;gap:0.5rem;">
        <span class="bingo-badge" id="bingoBadge">BINGO!</span>
        <button class="bingo-lock-btn" id="bingoLockBtn" title="Unlock card">🔒</button>
      </div>
    </div>

    <!-- Card image with overlaid grid -->
    <div class="bingo-card-wrap">
      <div class="bingo-grid" id="bingoGrid"></div>
    </div>

    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:5px;">
      <div class="bingo-hint" id="bingoHint">Unlock to edit or mark squares</div>
      <div class="bingo-status" id="bingoStatus"></div>
    </div>
  </div>

  <!-- RIGHT: ROOMS -->
  <div class="rooms-col">
    <div class="rooms-header">
      <div class="player-avatar" id="playerAvatar"></div>
      <div>
        <div class="kicker">Chapter Rooms</div>
        <div id="playerName" style="font-family:'Cinzel',serif;font-weight:600;font-size:1rem;color:var(--ink);"></div>
      </div>
    </div>
    <div class="rooms-grid" id="roomsGrid"></div>
  </div>
</div>

<div class="footer">
  <div class="footer-orn"><div style="flex:1;height:1px;background:linear-gradient(to right,transparent,var(--worn),transparent);"></div><span style="color:var(--gold);font-size:0.6rem;">◆</span><div style="flex:1;height:1px;background:linear-gradient(to right,transparent,var(--worn),transparent);"></div></div>
  ✦ &nbsp; The Bingo Book Club &nbsp; ✦
</div>

<!-- CHAT MODAL -->
<div class="overlay" id="overlay">
  <div class="chat-modal">
    <div class="chat-hdr">
      <div>
        <div class="chat-room-label" id="chatRoomLabel"></div>
        <div class="chat-title" id="chatTitle"></div>
        <div class="chat-sub" id="chatSub"></div>
        <span class="chat-status" id="chatStatus"></span>
      </div>
      <button class="close-btn" id="chatClose">✕</button>
    </div>
    <div class="messages" id="chatMessages"></div>
    <div class="compose">
      <textarea id="chatTA" rows="1" placeholder="Leave a thought…"></textarea>
      <button class="send-btn" id="chatSend">Post</button>
    </div>
  </div>
</div>

<!-- PASSWORD MODAL -->
<div class="lock-modal-wrap" id="lockModalWrap">
  <div class="lock-modal">
    <h3>🔐 Unlock Bingo Card</h3>
    <input type="password" id="passwordInput" placeholder="Enter password" autocomplete="off">
    <div class="lock-error" id="lockError"></div>
    <div class="lock-modal-btns">
      <button id="unlockSubmit">Unlock</button>
      <button id="unlockCancel">Cancel</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
  getFirestore, collection, addDoc, onSnapshot,
  query, where, orderBy, serverTimestamp,
  doc, setDoc, getDoc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

/* ══════════════════════════════════════════
   PLAYER CONFIG — edit for each file:
   marine.html:  PID = "marine"  PEMOJI = "🧜‍♀️"  PNAME = "Marine"  CARD_PASSWORD = "marinara"
   kathi.html:   PID = "kathi"   PEMOJI = "🍄"    PNAME = "Kathi"   CARD_PASSWORD = "your-password"
══════════════════════════════════════════ */
const PID           = "kathi";
const PEMOJI        = "🍄";
const PNAME         = "Kathi";
let CARD_PASSWORD = null; // loaded from Firebase accessCodes
/* ══════════════════════════════════════════ */

const OTHER       = { marine:"kathi",   kathi:"marine" };
const OTHER_EMOJI = { marine:"🍄",      kathi:"🧜‍♀️" };
const OTHER_NAME  = { marine:"Kathi",   kathi:"Marine" };

const fb = initializeApp({
  apiKey: "AIzaSyAIQTe-QGQmwqTVmIyJZZ_qlDNsD6GUskY",
  authDomain: "bingobookclub-2144e.firebaseapp.com",
  projectId: "bingobookclub-2144e",
  storageBucket: "bingobookclub-2144e.firebasestorage.app",
  messagingSenderId: "294177836341",
  appId: "1:294177836341:web:6d5f11e64737fbe3aad07c"
});
const db = getFirestore(fb);

const ROOMS = [
  {ch:0,  label:"General",      sub:"No spoilers — anything goes"},
  {ch:6,  label:"Up to Ch. 6",  sub:"Chapters 1–6"},
  {ch:16, label:"Up to Ch. 16", sub:"Chapters 7–16"},
  {ch:26, label:"Up to Ch. 26", sub:"Chapters 17–26"},
  {ch:36, label:"Up to Ch. 36", sub:"Chapters 27–36"},
  {ch:46, label:"Up to Ch. 46", sub:"Chapters 37–46"},
  {ch:56, label:"Up to Ch. 56", sub:"Chapters 47–56"},
  {ch:66, label:"Up to Ch. 66", sub:"Chapters 57–66"},
];

const GRID_SIZE = 25;

/* ── INIT UI ── */
document.title = `Book Club — ${PNAME}`;
document.getElementById('pageTitle').textContent = PNAME + ' — Book Club';
document.getElementById('playerAvatar').textContent = PEMOJI;
document.getElementById('playerName').textContent = PNAME;

/* ══════════════════════════════════════════
   BINGO STATE
══════════════════════════════════════════ */
let cells      = Array(GRID_SIZE).fill('');
let markedSet  = new Set([12]);
let isUnlocked = false;
let isEditMode = false;
let isSaving   = false;

const bingoGrid    = document.getElementById('bingoGrid');
const bingoBadge   = document.getElementById('bingoBadge');
const bingoHint    = document.getElementById('bingoHint');
const bingoStatus  = document.getElementById('bingoStatus');
const lockBtn      = document.getElementById('bingoLockBtn');
const lockModalWrap= document.getElementById('lockModalWrap');
const passwordInput= document.getElementById('passwordInput');
const lockError    = document.getElementById('lockError');

/* ── LOCK / UNLOCK ── */
function setLockState(unlocked) {
  isUnlocked = unlocked;
  lockBtn.textContent = unlocked ? '🔓' : '🔒';
  lockBtn.classList.toggle('unlocked', unlocked);
  lockBtn.title = unlocked ? 'Lock card' : 'Unlock card';
  bingoHint.textContent = unlocked
    ? (isEditMode ? 'Click cells to toggle; edit mode active' : 'Click cells to mark — unlock more with 🔓')
    : 'Unlock to edit or mark squares';
  renderBingo();
}

lockBtn.addEventListener('click', () => {
  if (isUnlocked) {
    isEditMode = false;
    setLockState(false);
  } else {
    passwordInput.value = '';
    lockError.textContent = '';
    lockModalWrap.classList.add('open');
    setTimeout(() => passwordInput.focus(), 50);
  }
});

document.getElementById('unlockSubmit').addEventListener('click', tryUnlock);
document.getElementById('unlockCancel').addEventListener('click', () => lockModalWrap.classList.remove('open'));
passwordInput.addEventListener('keydown', e => {
  if (e.key === 'Enter')  tryUnlock();
  if (e.key === 'Escape') lockModalWrap.classList.remove('open');
});

function tryUnlock() {
  if (passwordInput.value === CARD_PASSWORD) {
    lockModalWrap.classList.remove('open');
    setLockState(true);
  } else {
    lockError.textContent = 'Wrong password, try again.';
    passwordInput.value = '';
    passwordInput.focus();
  }
}

/* ── BINGO CHECK ── */
function checkBingo() {
  for (let r = 0; r < 5; r++) if ([0,1,2,3,4].every(c => markedSet.has(r*5+c))) return true;
  for (let c = 0; c < 5; c++) if ([0,1,2,3,4].every(r => markedSet.has(r*5+c))) return true;
  if ([0,1,2,3,4].every(i => markedSet.has(i*5+i)))   return true;
  if ([0,1,2,3,4].every(i => markedSet.has(i*5+(4-i)))) return true;
  return false;
}

/* ── RENDER BINGO ── */
function renderBingo() {
  bingoGrid.innerHTML = '';
  for (let i = 0; i < GRID_SIZE; i++) {
    const isFree = i === 12;
    const cell = document.createElement('div');
    cell.className = 'bingo-cell' + (isFree ? ' free' : markedSet.has(i) ? ' marked' : '');

    if (isFree) {
      cell.style.cursor = 'default';
      // free square shows nothing (the card image has it)
    } else if (isUnlocked && isEditMode) {
      const ta = document.createElement('textarea');
      ta.value = cells[i];
      ta.addEventListener('input', e => { cells[i] = e.target.value; });
      ta.addEventListener('blur', saveToFirebase);
      cell.appendChild(ta);
    } else {
      const txt = document.createElement('div');
      txt.className = 'cell-text';
      txt.textContent = cells[i];
      cell.appendChild(txt);
      if (isUnlocked) {
        cell.style.cursor = 'pointer';
        cell.addEventListener('click', async () => {
          markedSet.has(i) ? markedSet.delete(i) : markedSet.add(i);
          bingoBadge.classList.toggle('show', checkBingo());
          renderBingo();
          await saveToFirebase();
        });
      }
    }
    bingoGrid.appendChild(cell);
  }
  bingoBadge.classList.toggle('show', checkBingo());
}

/* ── FIREBASE SAVE ── */
async function saveToFirebase() {
  if (isSaving) return;
  isSaving = true;
  bingoStatus.textContent = 'Saving…';
  try {
    await setDoc(doc(db, 'shouty_bingo', PID), {
      cells:  cells,
      marked: [...markedSet]
    });
    bingoStatus.textContent = 'Saved ✓';
  } catch(e) {
    console.error(e);
    bingoStatus.textContent = 'Save failed';
  } finally {
    isSaving = false;
    setTimeout(() => { bingoStatus.textContent = ''; }, 2000);
  }
}

/* ── FIREBASE LOAD ── */
async function loadBingo() {
  bingoStatus.textContent = 'Loading…';
  try {
    const d = await getDoc(doc(db, 'shouty_bingo', PID));
    if (d.exists()) {
      const data = d.data();
      if (Array.isArray(data.cells))  cells = data.cells;
      if (Array.isArray(data.marked)) { markedSet = new Set(data.marked); markedSet.add(12); }
    }
  } catch(e) { console.error(e); }
  renderBingo();
  bingoStatus.textContent = '';
}

/* ── LOAD PASSWORD FROM FIREBASE ── */
async function loadPassword() {
  try {
    const snap = await getDoc(doc(db, 'accessCodes', PID));
    if (snap.exists()) CARD_PASSWORD = snap.data().password || snap.data().code || null;
    // fallback: some schemas store the password as the field matching PID
    if (!CARD_PASSWORD) {
      const snap2 = await getDoc(doc(db, 'accessCodes', 'codes'));
      if (snap2.exists()) CARD_PASSWORD = snap2.data()[PID] || null;
    }
  } catch(e) { console.error('Could not load password:', e); }
}

async function init() {
  await loadPassword();
  await loadBingo();
}
init();

/* ══════════════════════════════════════════
   ROOMS / CHAT (unchanged)
══════════════════════════════════════════ */
let myProgress = 0;
let activeRoom = null, activeUnsub = null;

onSnapshot(doc(db,'progress_spoiler',PID), d=>{
  if(d.exists()) myProgress = d.data().chapter || 0;
  renderRooms();
}, err=>console.error(err));

function renderRooms(){
  const grid = document.getElementById('roomsGrid');
  grid.innerHTML='';
  ROOMS.forEach(r=>{
    const isGeneral = r.ch===0;
    const unlocked  = isGeneral || myProgress >= r.ch;
    const cls = isGeneral?'general':unlocked?'unlocked':'locked';
    const badge = isGeneral?'Open':unlocked?'Unlocked':'Write only';
    const btn = document.createElement('div');
    btn.className='room-btn '+cls;
    btn.innerHTML=`<span class="btn-badge">${badge}</span><span class="btn-label">${r.label}</span><span class="btn-sub">${r.sub}</span>`;
    btn.addEventListener('click',()=>openChat(r));
    grid.appendChild(btn);
  });
}
renderRooms();

const overlay   = document.getElementById('overlay');
const chatClose = document.getElementById('chatClose');
const chatTA    = document.getElementById('chatTA');
const chatSend  = document.getElementById('chatSend');

function openChat(room){
  activeRoom=room;
  const canRead = room.ch===0 || myProgress>=room.ch;
  document.getElementById('chatRoomLabel').textContent = room.ch===0?'General Room':`Room — Ch. ${room.ch}`;
  document.getElementById('chatTitle').textContent = room.label;
  document.getElementById('chatSub').textContent   = room.sub;
  const st=document.getElementById('chatStatus');
  st.className='chat-status '+(room.ch===0?'open':canRead?'unlocked':'locked');
  st.textContent = room.ch===0?'Open':canRead?'Unlocked — all messages visible':'Write only — visible after ch '+room.ch;
  overlay.classList.add('open');
  document.body.style.overflow='hidden';
  chatTA.value=''; chatTA.style.height='auto';
  subscribeChat(room);
}
chatClose.addEventListener('click',closeChat);
overlay.addEventListener('click',e=>{ if(e.target===overlay) closeChat(); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape' && overlay.classList.contains('open')) closeChat(); });

function closeChat(){
  overlay.classList.remove('open');
  document.body.style.overflow='';
  if(activeUnsub){activeUnsub();activeUnsub=null;}
  activeRoom=null;
}

chatTA.addEventListener('input',()=>{ chatTA.style.height='auto'; chatTA.style.height=chatTA.scrollHeight+'px'; });
chatTA.addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();} });
chatSend.addEventListener('click',sendMsg);

function subscribeChat(room){
  if(activeUnsub) activeUnsub();
  const msgDiv=document.getElementById('chatMessages');
  msgDiv.innerHTML='<span class="empty-msg">Loading…</span>';
  const q=query(collection(db,'shouty_messages'),where('room','==',room.ch),orderBy('ts','asc'));
  activeUnsub=onSnapshot(q,snap=>{
    const canRead=room.ch===0||myProgress>=room.ch;
    let msgs=[]; snap.forEach(d=>msgs.push({id:d.id,...d.data()}));
    if(!canRead) msgs=msgs.filter(m=>m.name===PID);
    msgDiv.innerHTML='';
    if(msgs.length===0){
      msgDiv.innerHTML=(!canRead&&room.ch!==0)
        ?`<div class="write-note"><strong>Write mode</strong>Post freely — you'll see everyone's thoughts once you reach chapter ${room.ch}.</div>`
        :`<span class="empty-msg">No thoughts yet. Be the first!</span>`;
      return;
    }
    msgs.forEach(m=>{
      const isMine=m.name===PID;
      const emoji=isMine?PEMOJI:OTHER_EMOJI[PID];
      const name=isMine?PNAME:OTHER_NAME[PID];
      const el=document.createElement('div');
      el.className='msg'+(isMine?' mine':'');
      el.innerHTML=`<span class="msg-name">${emoji} ${name}</span><span class="msg-text">${esc(m.text)}</span>`;
      msgDiv.appendChild(el);
    });
    msgDiv.scrollTop=msgDiv.scrollHeight;
  },err=>{
    console.error(err);
    msgDiv.innerHTML=`<span class="empty-msg">Could not load messages: ${esc(err.message)}</span>`;
  });
}

async function sendMsg(){
  const text=chatTA.value.trim();
  if(!text||!activeRoom) return;
  try{
    await addDoc(collection(db,'shouty_messages'),{room:activeRoom.ch,name:PID,text,ts:serverTimestamp()});
    chatTA.value=''; chatTA.style.height='auto';
  }catch(e){console.error(e);}
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');}
</script>
