<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>The results</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  html{font-size:20px;}
  html,body{background:#0d0a0e;font-family:'Crimson Text',Georgia,serif;min-height:100vh;width:100%;overflow-x:hidden;}

  .stars{position:fixed;inset:0;pointer-events:none;z-index:0;}
  .star{position:absolute;background:#c9a84c;border-radius:50%;animation:twinkle var(--d) ease-in-out infinite;animation-delay:var(--delay);}
  @keyframes twinkle{0%,100%{opacity:0.1;}50%{opacity:0.8;}}

  .floating-books{position:fixed;inset:0;pointer-events:none;z-index:0;}
  .book{position:absolute;font-size:var(--size);animation:float var(--fd) ease-in-out infinite;animation-delay:var(--fdelay);opacity:0.07;}
  @keyframes float{0%,100%{transform:translateY(0) rotate(var(--r));}50%{transform:translateY(-20px) rotate(calc(var(--r) + 5deg));}}

  .page{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2.2rem 1.3rem;text-align:center;}

  .candle-wrap{position:relative;margin-bottom:1.8rem;}
  .candle-emoji{font-size:3.5rem;display:block;animation:flicker 2s ease-in-out infinite;}
  @keyframes flicker{0%,100%{transform:scale(1) rotate(-1deg);filter:brightness(1);}25%{transform:scale(1.03) rotate(1deg);filter:brightness(1.1);}50%{transform:scale(0.97) rotate(-0.5deg);filter:brightness(0.95);}75%{transform:scale(1.02) rotate(0.5deg);filter:brightness(1.05);}}
  .candle-glow{position:absolute;top:0.6rem;left:50%;transform:translateX(-50%);width:4.5rem;height:4.5rem;background:radial-gradient(circle,rgba(201,168,76,0.35) 0%,transparent 70%);border-radius:50%;animation:glow 2s ease-in-out infinite;}
  @keyframes glow{0%,100%{opacity:0.6;transform:translateX(-50%) scale(1);}50%{opacity:1;transform:translateX(-50%) scale(1.2);}}

  .number{font-family:'Cinzel',serif;font-size:clamp(4rem,20vw,6.5rem);font-weight:700;color:transparent;background:linear-gradient(135deg,#c9a84c,#f0e6c8,#c9a84c88);-webkit-background-clip:text;background-clip:text;line-height:1;letter-spacing:8px;filter:drop-shadow(0 0 30px rgba(201,168,76,0.3));margin-bottom:0.5rem;}

  .ornament{display:flex;align-items:center;gap:0.6rem;width:100%;max-width:18rem;margin:1rem auto;}
  .ornament .line{flex:1;height:1px;background:linear-gradient(to right,transparent,#c9a84c55,transparent);}
  .ornament .gem{color:#c9a84c;font-size:0.6rem;}

  .subtitle{font-family:'Cinzel',serif;font-size:0.78rem;letter-spacing:3px;color:#c9a84c;text-transform:uppercase;margin-bottom:2rem;}

  /* Image Container */
  .image-container{position:relative;max-width:50rem;width:95%;margin:0 auto;}
  .image-container::before,.image-container::after{display:none;}
  .image-container::before{top:-0.5rem;left:-0.5rem;}
  .image-container::after{bottom:-0.5rem;right:-0.5rem;animation-delay:1s;}
  @keyframes sparkle{0%,100%{opacity:0.4;transform:scale(1);}50%{opacity:1;transform:scale(1.2);}}
  
  .result-image{width:100%;height:auto;border-radius:10px;display:block;filter:sepia(0.1) contrast(1.15) brightness(1.05);box-shadow:0 12px 50px rgba(0,0,0,0.6);}

  /* Store Buttons - Mobile: in flow at bottom */
  .store-bar{
    display:flex;
    flex-direction:row;
    gap:0.75rem;
    justify-content:center;
    align-items:center;
    margin:2rem auto 1.5rem;
    padding:0 1rem;
    max-width:100%;
    flex-wrap:wrap;
  }
  
  .store-btn{
    flex:1;
    min-width:7rem;
    max-width:7.5rem;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:0.25rem;
    padding:0.625rem 0.375rem;
    font-family:'Cinzel',serif;
    font-size:0.46875rem;
    letter-spacing:0.0625rem;
    text-transform:uppercase;
    border:1px solid #c9a84c44;
    border-radius:0.375rem;
    background:rgba(13,10,14,0.5);
    backdrop-filter:blur(6px);
    color:#c9a84c88;
    text-decoration:none;
    transition:all 0.2s;
  }
  
  .store-btn:active,.store-btn:hover{
    border-color:#c9a84c;
    color:#c9a84c;
    background:rgba(13,10,14,0.8);
    box-shadow:0 0 16px rgba(201,168,76,0.2);
  }
  
  .store-btn-icon{font-size:1.125rem;display:block;}

  /* Desktop: Fixed on right side */
  @media (min-width: 768px){
    .store-bar{
      position:fixed;
      right:1.2rem;
      top:50%;
      transform:translateY(-50%);
      flex-direction:column;
      margin:0;
      padding:0;
      gap:0.5rem;
    }
    
    .store-btn{
      width:7.5rem;
      min-width:auto;
      max-width:none;
    }
  }

  /* Button Group */
  .button-group{display:flex;gap:0.5rem;justify-content:center;padding:0.75rem 1rem 1.5rem;margin:0 auto 3rem;}
  
  .info-btn{flex:1;max-width:7.5rem;display:flex;flex-direction:column;align-items:center;gap:0.25rem;padding:0.625rem 0.375rem;font-family:'Cinzel',serif;font-size:0.46875rem;letter-spacing:0.0625rem;text-transform:uppercase;border:1px solid #c9a84c44;border-radius:0.375rem;background:transparent;color:#c9a84c88;text-decoration:none;transition:all 0.2s;}
  
  .info-btn:hover,.info-btn:active{border-color:#c9a84c;color:#c9a84c;background:rgba(201,168,76,0.08);}
  
  .btn-icon{font-size:1.125rem;}

  .message{max-width:17rem;margin:1.5rem auto 0.7rem;}
  .message p{font-size:0.88rem;color:#c8b89a;line-height:1.9;}
  .message p+p{margin-top:0.6rem;}
  .message em{color:#f0e6c8;font-style:italic;}

  .quote-box{max-width:17rem;margin:1.4rem auto;padding:0.9rem 1.2rem;border:1px solid #c9a84c22;border-radius:8px;background:rgba(201,168,76,0.03);position:relative;}
  .quote-box::before,.quote-box::after{content:'✦';position:absolute;color:#c9a84c44;font-size:0.6rem;}
  .quote-box::before{top:0.5rem;left:0.7rem;}
  .quote-box::after{bottom:0.5rem;right:0.7rem;}
  .quote{font-size:0.78rem;color:#a89070;font-style:italic;line-height:1.8;}

  /* ── Home Button ── */
  .home-btn {
    position: fixed;
    bottom: 1.2rem;
    left: 1.2rem;
    z-index: 1000;

    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.45rem;

    width: 100px;
    height: 40px;

    font-size: 0.65rem;
    font-family: 'Cinzel', serif;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    text-decoration: none;
    border-radius: 6px;

    background: #1a0f1f;
    border: 1px solid #c9a84c33;
    color: #f5ecd9;
    text-shadow: 0 1px 2px rgba(0,0,0,0.6);
    box-shadow: 0 0 12px rgba(201,168,76,0.12);

    transition: all 0.3s ease;
  }

  .home-btn:hover {
    background: #24152b;
    border-color: #c9a84c88;
    box-shadow: 0 0 20px rgba(201,168,76,0.25);
    transform: translateY(-2px);
  }

  .footer{margin-top:2.2rem;font-family:'Cinzel',serif;font-size:0.45rem;letter-spacing:2px;color:#c9a84cbb;text-transform:uppercase;}
</style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="floating-books" id="floatingBooks"></div>

<div class="page">
  <div class="candle-wrap">
    <div class="candle-glow"></div>
    <span class="candle-emoji">👑</span>
  </div>

  <div class="ornament"><div class="line"></div><div class="gem">◆</div><div class="line"></div></div>

  <div class="subtitle">The people have spoken</div>

  <div class="image-container">
    <img src="results.png" alt="Winner Book Cover" class="result-image">
  </div>

  <div class="store-bar">
    <a class="store-btn" href="https://www.goodreads.com/book/show/211081101-the-bridge-kingdom" target="_blank"><span class="store-btn-icon">📚</span>Goodreads</a>
    <a class="store-btn" href="https://www.orellfuessli.ch/suche?sq=the+bridge+kingdom" target="_blank"><span class="store-btn-icon">🏪</span>OrellFüssli</a>
    <a class="store-btn" href="https://www.amazon.com/s?k=the+bridge+kingdom+jensen" target="_blank"><span class="store-btn-icon">📦</span>Amazon</a>
  </div>

  <div class="ornament"><div class="line"></div><div class="gem">◆</div><div class="line"></div></div>

  <div class="footer">✦ &nbsp; The Bingo Book Club &nbsp; ✦</div>
</div>

<script>
  const starsEl = document.getElementById('stars');
  for(let i = 0; i < 70; i++){
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() > 0.85 ? 3 : 2;
    s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;width:${size}px;height:${size}px;--d:${2+Math.random()*4}s;--delay:${Math.random()*4}s;`;
    starsEl.appendChild(s);
  }

  const bookEmojis = ['📖','📚','🕯️','✨','🌙','⚔️','🗡️','🌹','♟️','🔮'];
  const booksEl = document.getElementById('floatingBooks');
  for(let i = 0; i < 10; i++){
    const b = document.createElement('div');
    b.className = 'book';
    b.textContent = bookEmojis[i % bookEmojis.length];
    const rot = (Math.random()*30 - 15).toFixed(1);
    b.style.cssText = `left:${Math.random()*90}%;top:${Math.random()*90}%;--size:${1.3+Math.random()*1.2}rem;--fd:${4+Math.random()*4}s;--fdelay:${Math.random()*4}s;--r:${rot}deg;`;
    booksEl.appendChild(b);
  }
</script>

<a class="home-btn" href="index.html"><span class="home-btn-icon">🏠</span> Home</a>
</body>
</html>
