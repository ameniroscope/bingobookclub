<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bingo Book Club</title>

<!-- Link to shared styles -->
<link rel="stylesheet" href="style.css">

<!-- Page-specific styles -->
<style>
/* Main layout */
.home-layout {
    position: relative;
    z-index: 2;
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr 1.4fr;
    gap: 60px;
    align-items: center;
    padding: 60px;
}

/* Book card */
.book-card {
    text-align: center;
}

.book-card img {
    height: 80vh;
    width: auto;
    max-width: 100%;
    border-radius: 10px;
    border: 2px solid #c9a84c55;
    box-shadow: 0 0 30px rgba(201, 168, 76, 0.25);
    cursor: zoom-in;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.book-card img:hover {
    transform: scale(1.02);
    box-shadow: 0 0 50px rgba(201, 168, 76, 0.45);
}

/* Lightbox */
.lightbox {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 1000;
    background: rgba(0, 0, 0, 0.85);
    backdrop-filter: blur(6px);
    align-items: center;
    justify-content: center;
    cursor: zoom-out;
}

.lightbox.open {
    display: flex;
}

.lightbox img {
    max-height: 90vh;
    max-width: 90vw;
    border-radius: 12px;
    border: 2px solid #c9a84c88;
    box-shadow: 0 0 60px rgba(201, 168, 76, 0.4);
    animation: popIn 0.25s ease;
}

@keyframes popIn {
    from { transform: scale(0.85); opacity: 0; }
    to   { transform: scale(1);    opacity: 1; }
}

/* Players */
.players-section {
    text-align: center;
}

.players-title {
    font-family: 'Cinzel', serif;
    font-size: 2rem;
    letter-spacing: 2px;
    margin-bottom: 35px;
    color: #f0e6c8;
    text-shadow: 0 0 20px rgba(201, 168, 76, 0.25);
}

.players-grid {
    display: grid;
    grid-template-columns: repeat(2, auto);
    gap: 40px 60px;
    justify-content: center;
}

.player-card {
    text-decoration: none;
    color: #f0e6c8;
    font-family: 'Cinzel', serif;
    letter-spacing: 1px;
    transition: transform 0.3s ease;
}

.player-img-frame {
    position: relative;
    width: 170px;
    height: 170px;
    margin: 0 auto;
}

.player-img-frame::before {
    content: '';
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    background: conic-gradient(
        from 0deg,
        transparent 0%,
        #c9a84c33 20%,
        #c9a84c88 50%,
        #c9a84c33 80%,
        transparent 100%
    );
    animation: spin 12s linear infinite;
    z-index: 0;
}

.player-img-frame::after {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    background: #0d0a0e;
    z-index: 1;
}

.player-img-frame img {
    position: relative;
    z-index: 2;
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
    border: 2px solid #c9a84c55;
}

@keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

.player-card span {
    display: block;
    margin-top: 16px;
    font-size: 1.15rem;
}

.player-card:hover {
    transform: translateY(-5px);
}

.player-card:hover .player-img-frame img {
    border-color: #c9a84c;
    box-shadow: 0 0 25px rgba(201, 168, 76, 0.4);
}

/* Footer section */
.footer-section {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 2rem 1rem 3rem;
}

/* Mobile */  
@media (max-width: 800px) {
    .home-layout {
        grid-template-columns: 1fr;
        gap: 45px;
        padding: 35px 20px;
    }

    .book-card img {
        height: 50vh;
    }

    .players-title {
        font-size: 1.5rem;
        margin-bottom: 28px;
    }

    .players-grid {
        gap: 28px 18px;
    }

    .player-img-frame {
        width: 120px;
        height: 120px;
    }

    .player-card span {
        font-size: 0.95rem;
    }
}

@media (max-width: 420px) {
    .players-grid {
        grid-template-columns: 1fr 1fr;
    }

    .player-img-frame {
        width: 105px;
        height: 105px;
    }
}
</style>
</head>

<body>

<!-- Stars background -->
<div class="stars" id="stars"></div>

<main class="home-layout">

    <!-- Left: Book -->
    <section class="book-card">
        <img src="current_book.png" alt="Current book cover" id="bookCover">
    </section>

    <!-- Right: Players -->
    <section class="players-section">
        <h1 class="players-title">Choose Your Player</h1>

        <div class="players-grid">

            <a class="player-card" href="elana_bingo.html">
                <div class="player-img-frame">
                    <img src="elana.png" alt="Elana">
                </div>
                <span>Elana</span>
            </a>

            <a class="player-card" href="lena_bingo.html">
                <div class="player-img-frame">
                    <img src="lena.png" alt="Lena">
                </div>
                <span>Lena</span>
            </a>

            <a class="player-card" href="kathi_bingo.html">
                <div class="player-img-frame">
                    <img src="kathi.png" alt="Kathi">
                </div>
                <span>Kathi</span>
            </a>

            <a class="player-card" href="marine_bingo.html">
                <div class="player-img-frame">
                    <img src="marine.png" alt="Marine">
                </div>
                <span>Marine</span>
            </a>

        </div>
    </section>

</main>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
    <img src="current_book.png" alt="Current book cover enlarged">
</div>

<!-- Footer Section -->
<section class="footer-section">
    <div class="ornament">
        <div class="line"></div>
        <div class="gem">◆</div>
        <div class="line"></div>
    </div>

    <a class="home-btn" href="index.html">
        <span class="home-btn-icon">🏠</span> Home
    </a>

    <div class="footer">✦ &nbsp; The Bingo Book Club &nbsp; ✦</div>
</section>

<script>
// Lightbox
document.getElementById('bookCover').addEventListener('click', () => {
    document.getElementById('lightbox').classList.add('open');
});
document.getElementById('lightbox').addEventListener('click', () => {
    document.getElementById('lightbox').classList.remove('open');
});

// Star generation
const starsContainer = document.getElementById('stars');

for (let i = 0; i < 80; i++) {
    const star = document.createElement('div');
    star.className = 'star';

    const size = Math.random() > 0.8 ? 3 : 2;

    star.style.cssText = `
        left: ${Math.random() * 100}%;
        top: ${Math.random() * 100}%;
        width: ${size}px;
        height: ${size}px;
        --d: ${2 + Math.random() * 4}s;
        --delay: ${Math.random() * 4}s;
    `;

    starsContainer.appendChild(star);
}
</script>

</body>
</html>
