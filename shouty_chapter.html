<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iron Flame — Chapter Rooms</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=IM+Fell+English+SC&family=Cinzel:wght@400;600&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink:        #2b1d0e;
  --ink-faded:  #5c3d1e;
  --gold:       #8b6914;
  --gold-lt:    #c9a84c;
  --parch:      #f2e8d0;
  --parch-dark: #e0ceaa;
  --worn:       #c9af82;
}

html, body {
  min-height: 100vh;
  font-family: 'IM Fell English', Georgia, serif;
  color: var(--ink);
  background: #1a120a;
}

#bg {
  position: fixed; inset: 0; z-index: 0;
  background: var(--parch);
}
#bg::after {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 70% 50% at 15% 20%, rgba(180,130,60,0.13) 0%, transparent 55%),
    radial-gradient(ellipse 60% 70% at 85% 75%, rgba(160,110,40,0.10) 0%, transparent 55%),
    radial-gradient(ellipse 100% 100% at 50% 50%, transparent 60%, rgba(80,40,5,0.18) 100%);
}

/* ── LAYOUT ── */
.layout {
  position: relative; z-index: 1;
  min-height: 100vh;
  max-width: 1250px;
  margin: 0 auto;
  padding: 3rem 1.4rem;
  display: grid;
  grid-template-columns: 420px 1fr;
  gap: 2rem;
  align-items: start;
}

/* ── MAP ── */
.map-column {
  position: sticky; top: 3rem;
  display: flex; justify-content: center;
  padding-top: 10rem;
}

.map {
  position: relative;
  width: 100%; max-width: 420px;
  border-radius: 10px; overflow: hidden;
  border: 3px solid var(--worn);
  box-shadow: 0 0 0 1px var(--parch-dark), 4px 6px 24px rgba(0,0,0,0.45), inset 0 0 30px rgba(100,60,10,0.15);
}
.map::after {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% 50%, transparent 60%, rgba(50,25,5,0.2) 100%);
  pointer-events: none;
}
.map-image { width: 100%; height: auto; display: block; filter: sepia(0.35) saturate(0.85) brightness(0.92); }

.player {
  position: absolute; width: 34px; height: 34px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.35rem;
  filter: drop-shadow(0 1px 3px rgba(0,0,0,0.7));
  transform: translate(-50%, -50%);
  transition: left 0.6s ease, top 0.6s ease;
  z-index: 10;
}

/* ── RIGHT COLUMN ── */
.page { text-align: center; }

.kicker {
  font-family: 'IM Fell English SC', serif;
  font-size: 0.68rem; letter-spacing: 5px;
  color: var(--gold); text-transform: uppercase;
  margin-bottom: 0.4rem;
}

.title {
  font-family: 'Cinzel', serif;
  font-size: clamp(1.8rem, 4vw, 2.8rem);
  font-weight: 600; letter-spacing: 2px; color: var(--ink);
}

.ornament {
  display: flex; align-items: center; gap: 0.6rem;
  max-width: 16rem; margin: 0.9rem auto 1.4rem;
}
.orn-line { flex: 1; height: 1px; background: linear-gradient(to right, transparent, var(--worn), transparent); }
.orn-gem  { color: var(--gold); font-size: 0.65rem; }

/* identity */
.identity {
  max-width: 700px; margin: 0 auto 1.6rem;
  background: rgba(242,232,208,0.75);
  border: 1.5px solid var(--worn); border-radius: 8px;
  padding: 0.85rem 1.1rem;
  display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
  box-shadow: inset 0 1px 6px rgba(100,60,10,0.1), 0 2px 10px rgba(0,0,0,0.15);
}
.identity label {
  font-family: 'IM Fell English SC', serif;
  font-size: 0.78rem; letter-spacing: 1px; color: var(--ink-faded); white-space: nowrap;
}
.identity select, .identity input[type=number] {
  background: var(--parch); border: 1px solid var(--worn); border-radius: 4px;
  padding: 0.32rem 0.5rem;
  font-family: 'IM Fell English', serif; font-size: 0.9rem; color: var(--ink);
}
.identity select { min-width: 130px; }
.identity input[type=number] { width: 70px; }
.id-group { display: flex; align-items: center; gap: 0.5rem; }

/* ── ROOM BUTTONS ── */
.buttons {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0.7rem;
  max-width: 700px; margin: 0 auto;
}

.room-btn {
  position: relative;
  height: 80px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 0.25rem;
  border-radius: 6px; cursor: pointer; text-decoration: none;
  background: rgba(242,232,208,0.82);
  border: 1.5px solid var(--worn);
  color: var(--ink);
  box-shadow: inset 0 1px 5px rgba(100,60,10,0.1), 0 2px 8px rgba(0,0,0,0.22);
  transition: all 0.2s;
}
.room-btn:hover {
  background: var(--parch-dark);
  border-color: var(--gold);
  transform: translateY(-2px);
  box-shadow: inset 0 1px 5px rgba(100,60,10,0.12), 0 5px 16px rgba(0,0,0,0.3);
}
.room-btn.write {
  background: rgba(59,30,6,0.88);
  border-color: var(--gold-lt);
  color: var(--parch);
}
.room-btn.read {
  background: rgba(139,105,20,0.18);
  border-color: var(--gold);
}
.room-btn.general {
  background: rgba(242,232,208,0.92);
  border-color: var(--gold);
}

.btn-label {
  font-family: 'Cinzel', serif;
  font-size: 0.72rem; letter-spacing: 1px; font-weight: 600;
}
.btn-sub {
  font-size: 0.68rem; font-style: italic;
  opacity: 0.75;
}
.btn-badge {
  position: absolute; top: 6px; right: 7px;
  font-family: 'IM Fell English SC', serif;
  font-size: 0.55rem; letter-spacing: 1px;
  padding: 0.1rem 0.35rem; border-radius: 3px;
}
.room-btn.write  .btn-badge { background: rgba(201,168,76,0.18); color: var(--gold-lt); }
.room-btn.read   .btn-badge { background: var(--gold); color: var(--parch); }
.room-btn.general .btn-badge { background: var(--gold); color: var(--parch); }

/* notification dot */
.notif {
  position: absolute; top: 6px; left: 8px;
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--gold-lt); display: none;
}

/* ── MODAL OVERLAY ── */
.overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(20,10,4,0.72);
  display: flex; align-items: center; justify-content: center;
  padding: 1rem;
  opacity: 0; pointer-events: none;
  transition: opacity 0.2s;
}
.overlay.open { opacity: 1; pointer-events: all; }

.modal {
  background: var(--parch);
  border: 2px solid var(--worn);
  border-radius: 10px;
  width: 100%; max-width: 540px;
  max-height: 82vh;
  display: flex; flex-direction: column;
  box-shadow: 0 8px 40px rgba(0,0,0,0.55), inset 0 1px 10px rgba(100,60,10,0.1);
  transform: translateY(12px);
  transition: transform 0.2s;
}
.overlay.open .modal { transform: translateY(0); }

.modal-header {
  padding: 1rem 1.25rem 0.85rem;
  border-bottom: 1px solid var(--worn);
  background: rgba(201,175,130,0.3);
  border-radius: 8px 8px 0 0;
  display: flex; align-items: flex-start; justify-content: space-between; gap: 0.5rem;
}
.modal-header-text {}
.modal-room-num {
  font-family: 'IM Fell English SC', serif;
  font-size: 0.68rem; letter-spacing: 2px; color: var(--gold);
}
.modal-title {
  font-family: 'Cinzel', serif;
  font-size: 1.05rem; font-weight: 600; color: var(--ink);
}
.modal-sub { font-size: 0.8rem; color: var(--ink-faded); font-style: italic; margin-top: 0.1rem; }

.modal-badge {
  font-family: 'IM Fell English SC', serif;
  font-size: 0.62rem; letter-spacing: 1px;
  padding: 0.2rem 0.55rem; border-radius: 3px; white-space: nowrap;
  margin-top: 0.2rem; display: inline-block;
}
.modal-badge.write  { background: #3b1e06; color: var(--gold-lt); }
.modal-badge.read   { background: var(--gold); color: var(--parch); }
.modal-badge.general{ background: var(--gold); color: var(--parch); }

.close-btn {
  background: none; border: none; cursor: pointer;
  color: var(--ink-faded); font-size: 1.3rem; line-height: 1;
  padding: 0.1rem 0.2rem;
  font-family: serif;
  transition: color 0.15s;
}
.close-btn:hover { color: var(--ink); }

.messages {
  flex: 1; overflow-y: auto;
  padding: 1rem 1.25rem;
  display: flex; flex-direction: column; gap: 0.7rem;
  min-height: 120px;
}

.empty-note, .locked-note {
  font-size: 0.85rem; color: var(--ink-faded);
  font-style: italic; text-align: center; margin: auto;
  line-height: 1.7;
}
.locked-note strong {
  display: block; font-family: 'Cinzel', serif;
  font-size: 0.82rem; color: var(--ink-faded);
  margin-bottom: 0.3rem; font-weight: 400; font-style: normal;
}

.msg { font-size: 0.9rem; line-height: 1.65; }
.msg-name {
  font-family: 'IM Fell English SC', serif;
  font-size: 0.72rem; letter-spacing: 1px; color: var(--gold);
  display: block; margin-bottom: 0.1rem;
}
.msg.mine .msg-name { color: #3b1e06; }
.msg-text { color: var(--ink); }

.compose {
  border-top: 1px solid var(--worn);
  padding: 0.7rem 1.1rem;
  display: flex; gap: 0.5rem; align-items: flex-end;
  background: rgba(201,175,130,0.18);
  border-radius: 0 0 8px 8px;
}
.compose textarea {
  flex: 1; resize: none; min-height: 38px; max-height: 100px;
  background: rgba(255,252,244,0.85); border: 1px solid var(--worn);
  border-radius: 4px; padding: 0.38rem 0.55rem;
  font-family: 'IM Fell English', serif; font-size: 0.9rem;
  color: var(--ink); line-height: 1.5; overflow-y: hidden;
}
.compose textarea::placeholder { color: var(--worn); font-style: italic; }
.send-btn {
  height: 38px; padding: 0 0.9rem;
  background: #3b1e06; border: 1px solid var(--gold-lt);
  border-radius: 4px; color: var(--gold-lt);
  font-family: 'Cinzel', serif; font-size: 0.65rem;
  letter-spacing: 1.5px; text-transform: uppercase;
  cursor: pointer; transition: background 0.2s; white-space: nowrap;
}
.send-btn:hover { background: #5a3010; }

/* ── FOOTER ── */
.bottom-center { position: relative; z-index: 1; text-align: center; margin: 2rem auto 2.5rem; }
.footer {
  font-family: 'IM Fell English SC', serif;
  font-size: 0.6rem; letter-spacing: 3px;
  color: var(--gold); text-transform: uppercase;
}
.home-btn {
  position: fixed; bottom: 1.2rem; left: 1.2rem; z-index: 100;
  display: flex; align-items: center; gap: 0.45rem;
  padding: 0.5rem 0.85rem;
  font-family: 'Cinzel', serif; font-size: 0.55rem;
  letter-spacing: 1.5px; text-transform: uppercase;
  text-decoration: none; border-radius: 5px;
  background: rgba(242,232,208,0.92); border: 1px solid var(--worn);
  color: var(--ink-faded); box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  transition: all 0.2s;
}
.home-btn:hover { border-color: var(--gold); color: var(--ink); }

@media (max-width: 900px) {
  .layout { grid-template-columns: 1fr; max-width: 760px; }
  .map-column { position: static; max-width: 430px; width: 100%; margin: 0 auto; padding-top: 0; }
}
@media (max-width: 600px) {
  .buttons { grid-template-columns: repeat(2, 1fr); }
  .identity { flex-direction: column; align-items: stretch; }
}
</style>
</head>
<body>

<div id="bg"></div>

<div class="layout">

  <!-- MAP -->
  <aside class="map-column">
    <div class="map">
      <img src="iron_flamme.png" class="map-image" alt="Book map">
    </div>
  </aside>

  <!-- RIGHT -->
  <main class="page">
    <div class="kicker">Spoiler-Safe</div>
    <div class="title">Chapter Rooms</div>
    <div class="ornament">
      <div class="orn-line"></div><div class="orn-gem">◆</div><div class="orn-line"></div>
    </div>

    <div class="identity">
      <div class="id-group">
        <label for="nameSelect">Reading as</label>
        <select id="nameSelect">
          <option value="">— choose —</option>
          <option value="marine">🧜‍♀️ Marine</option>
          <option value="kathi">🍄 Kathi</option>
        </select>
      </div>
      <div class="id-group">
        <label for="progressInput">Up to chapter</label>
        <input type="number" id="progressInput" min="0" max="66" value="0" />
      </div>
      <div class="id-group" style="font-size:0.78rem;color:var(--ink-faded);font-style:italic;">
        Progress saved automatically
      </div>
    </div>

    <div class="buttons" id="buttonsContainer"></div>
  </main>
</div>

<div class="bottom-center">
  <div class="ornament">
    <div class="orn-line"></div><div class="orn-gem">◆</div><div class="orn-line"></div>
  </div>
  <div class="footer">✦ &nbsp; The Bingo Book Club &nbsp; ✦</div>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-header-text">
        <div class="modal-room-num" id="modalRoomNum"></div>
        <div class="modal-title" id="modalTitle"></div>
        <div class="modal-sub" id="modalSub"></div>
        <span class="modal-badge" id="modalBadge"></span>
      </div>
      <button class="close-btn" id="closeBtn">✕</button>
    </div>
    <div class="messages" id="modalMessages"></div>
    <div class="compose">
      <textarea id="modalTA" placeholder="Leave a thought…" rows="1"></textarea>
      <button class="send-btn" id="modalSend">Post</button>
    </div>
  </div>
</div>

<a class="home-btn" href="index.html"><span style="font-size:0.85rem;">🏠</span> Home</a>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
  getFirestore, collection, addDoc, onSnapshot,
  query, where, orderBy, serverTimestamp, doc, setDoc, getDoc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAIQTe-QGQmwqTVmIyJZZ_qlDNsD6GUskY",
  authDomain: "bingobookclub-2144e.firebaseapp.com",
  projectId: "bingobookclub-2144e",
  storageBucket: "bingobookclub-2144e.firebasestorage.app",
  messagingSenderId: "294177836341",
  appId: "1:294177836341:web:6d5f11e64737fbe3aad07c"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

const ROOMS = [0, 6, 16, 26, 36, 46, 56, 66];
const ROOM_TITLES = {
  0:"General", 6:"Up to Chapter 6", 16:"Up to Chapter 16",
  26:"Up to Chapter 26", 36:"Up to Chapter 36",
  46:"Up to Chapter 46", 56:"Up to Chapter 56", 66:"Up to Chapter 66"
};
const ROOM_SUBS = {
  0:"No spoilers — anything goes",
  6:"Chapters 1–6", 16:"Chapters 7–16", 26:"Chapters 17–26",
  36:"Chapters 27–36", 46:"Chapters 37–46", 56:"Chapters 47–56", 66:"Chapters 57–66"
};
const EMOJIS = { marine:"🧜‍♀️", kathi:"🍄" };
const playerOffsets = { marine:{x:-2,y:0}, kathi:{x:2,y:0} };

let currentName = sessionStorage.getItem("bookClubName") || "";
let currentProgress = 0;
let activeRoom = null;
let activeUnsub = null;

const nameSelect    = document.getElementById("nameSelect");
const progressInput = document.getElementById("progressInput");
const overlay       = document.getElementById("overlay");
const closeBtn      = document.getElementById("closeBtn");
const modalTA       = document.getElementById("modalTA");
const modalSend     = document.getElementById("modalSend");

if (currentName) { nameSelect.value = currentName; loadProgress(currentName); }

nameSelect.addEventListener("change", () => {
  currentName = nameSelect.value;
  sessionStorage.setItem("bookClubName", currentName);
  if (currentName) loadProgress(currentName);
  renderButtons();
});

progressInput.addEventListener("change", () => {
  const v = Math.min(66, Math.max(0, parseInt(progressInput.value)||0));
  progressInput.value = v; currentProgress = v;
  if (currentName) saveProgress(currentName, v);
  renderButtons();
});

async function loadProgress(name) {
  try {
    const d = await getDoc(doc(db, "progress_spoiler", name));
    if (d.exists()) {
      currentProgress = d.data().chapter || 0;
      progressInput.value = currentProgress;
      renderButtons();
    }
  } catch(e) { console.error(e); }
}
async function saveProgress(name, chapter) {
  try { await setDoc(doc(db, "progress_spoiler", name), { chapter }); }
  catch(e) { console.error(e); }
}

function canRead(ch) { return ch === 0 || currentProgress >= ch; }

// ── BUTTONS ──
function renderButtons() {
  const c = document.getElementById("buttonsContainer");
  c.innerHTML = "";
  ROOMS.forEach((ch, i) => {
    const unlocked = canRead(ch);
    const isGeneral = ch === 0;

    const btn = document.createElement("div");
    btn.className = "room-btn " + (isGeneral ? "general" : unlocked ? "read" : "write");
    btn.dataset.ch = ch;

    const badgeText = isGeneral ? "Open" : unlocked ? "Unlocked" : "Write only";

    btn.innerHTML = `
      <div class="notif" id="notif-${ch}"></div>
      <span class="btn-badge">${badgeText}</span>
      <span class="btn-label">${ROOM_TITLES[ch]}</span>
      <span class="btn-sub">${ROOM_SUBS[ch]}</span>`;

    btn.addEventListener("click", () => openRoom(ch));
    c.appendChild(btn);
  });
}

// ── MODAL ──
function openRoom(ch) {
  activeRoom = ch;
  const unlocked = canRead(ch);
  const isGeneral = ch === 0;

  document.getElementById("modalRoomNum").textContent = isGeneral ? "General Room" : `Room ${ROOMS.indexOf(ch)}`;
  document.getElementById("modalTitle").textContent   = ROOM_TITLES[ch];
  document.getElementById("modalSub").textContent     = ROOM_SUBS[ch];

  const badge = document.getElementById("modalBadge");
  badge.className = "modal-badge " + (isGeneral ? "general" : unlocked ? "read" : "write");
  badge.textContent = isGeneral ? "Open" : unlocked ? "Unlocked — all messages visible" : "Write only — you won't see others yet";

  overlay.classList.add("open");
  document.body.style.overflow = "hidden";

  modalTA.value = ""; modalTA.style.height = "auto";
  subscribeModal(ch);
}

function closeRoom() {
  overlay.classList.remove("open");
  document.body.style.overflow = "";
  if (activeUnsub) { activeUnsub(); activeUnsub = null; }
  activeRoom = null;
}

closeBtn.addEventListener("click", closeRoom);
overlay.addEventListener("click", e => { if (e.target === overlay) closeRoom(); });

document.addEventListener("keydown", e => { if (e.key === "Escape") closeRoom(); });

modalTA.addEventListener("input", () => {
  modalTA.style.height = "auto";
  modalTA.style.height = modalTA.scrollHeight + "px";
});
modalTA.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
modalSend.addEventListener("click", sendMessage);

function subscribeModal(ch) {
  if (activeUnsub) activeUnsub();
  const msgDiv = document.getElementById("modalMessages");
  msgDiv.innerHTML = `<span class="empty-note">Loading…</span>`;

  const q = query(
    collection(db, "spoiler_messages"),
    where("room", "==", ch),
    orderBy("ts", "asc")
  );

  activeUnsub = onSnapshot(q, snap => {
    const unlocked = canRead(ch);
    let msgs = [];
    snap.forEach(d => msgs.push({ id: d.id, ...d.data() }));
    if (!unlocked) msgs = msgs.filter(m => m.name === currentName);

    msgDiv.innerHTML = "";

    if (!currentName) {
      msgDiv.innerHTML = `<span class="empty-note">Choose your name above to join.</span>`; return;
    }
    if (msgs.length === 0) {
      if (!unlocked && ch !== 0) {
        msgDiv.innerHTML = `<div class="locked-note"><strong>Write mode</strong>Post freely — you'll see everyone's thoughts once you reach chapter ${ch}.</div>`;
      } else {
        msgDiv.innerHTML = `<span class="empty-note">No thoughts yet. Be the first!</span>`;
      }
      return;
    }

    msgs.forEach(m => {
      const el = document.createElement("div");
      el.className = "msg" + (m.name === currentName ? " mine" : "");
      el.innerHTML = `<span class="msg-name">${EMOJIS[m.name]||"✦"} ${m.name}</span><span class="msg-text">${esc(m.text)}</span>`;
      msgDiv.appendChild(el);
    });
    msgDiv.scrollTop = msgDiv.scrollHeight;
  }, err => console.error(err));
}

async function sendMessage() {
  if (!currentName) { alert("Choose your name first."); return; }
  const text = modalTA.value.trim();
  if (!text || activeRoom === null) return;
  try {
    await addDoc(collection(db, "spoiler_messages"), {
      room: activeRoom, name: currentName, text, ts: serverTimestamp()
    });
    modalTA.value = ""; modalTA.style.height = "auto";
  } catch(e) { console.error(e); alert("Could not send. Try again."); }
}

function esc(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>");
}

/* ── MAP PLAYERS ── */
const map = document.querySelector(".map");

const rowY  = [22.7, 32.2, 41.2, 51.5, 60.9, 69.6];
const rowX1 = [10.3, 10.8, 10.8, 11.3, 11.3, 10.8];
const xStep = 8.7;
function pos(row, col) { return { x: rowX1[row] + col * xStep, y: rowY[row] }; }

const positions = {
  0: pos(0,0), 1:pos(0,0), 2:pos(0,1), 3:pos(0,2), 4:pos(0,3), 5:pos(0,4),
  6:pos(0,5), 7:pos(0,6), 8:pos(0,7), 9:pos(0,8), 10:pos(0,9),
  11:pos(1,0),12:pos(1,1),13:pos(1,2),14:pos(1,3),15:pos(1,4),
  16:pos(1,5),17:pos(1,6),18:pos(1,7),19:pos(1,8),20:pos(1,9),

function getOrCreateMarker(id) {
  let m = document.getElementById("player-"+id);
  if (!m) {
    m = document.createElement("div");
    m.className = "player"; m.id = "player-"+id;
    m.textContent = EMOJIS[id] || "✨";
    map.appendChild(m);
  }
  return m;
}
function movePlayer(id, chapter) {
  const m = getOrCreateMarker(id);
  const p = positions[chapter] || positions[0];
  const o = playerOffsets[id] || {x:0,y:0};
  m.style.left = (p.x+o.x)+"%"; m.style.top = (p.y+o.y)+"%";
  m.title = id+" — chapter "+chapter;
}
