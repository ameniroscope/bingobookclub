<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Bingo Book Club</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Cinzel:wght@400;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--ink:#2b1d0e;--ink-faded:#5c3d1e;--gold:#8b6914;--gold-lt:#c9a84c;--parch:#f2e8d0;--parch-dark:#e0ceaa;--worn:#c9af82;}
html,body{min-height:100vh;font-family:'IM Fell English',Georgia,serif;color:var(--ink);background:#1a120a;}
#bg{position:fixed;inset:0;z-index:0;background:var(--parch);}
#bg::after{content:'';position:absolute;inset:0;background:
  radial-gradient(ellipse 70% 50% at 15% 20%,rgba(180,130,60,0.13) 0%,transparent 55%),
  radial-gradient(ellipse 60% 70% at 85% 75%,rgba(160,110,40,0.10) 0%,transparent 55%),
  radial-gradient(ellipse 100% 100% at 50% 50%,transparent 60%,rgba(80,40,5,0.18) 100%);}

/* NAV */
nav{position:relative;z-index:10;display:flex;justify-content:center;border-bottom:1px solid var(--worn);background:rgba(242,232,208,0.95);padding:0 1rem;}
.nav-tab{font-family:'Cinzel',serif;font-size:0.62rem;letter-spacing:2px;text-transform:uppercase;padding:0.75rem 1rem;cursor:pointer;background:none;border:none;color:var(--ink-faded);border-bottom:2px solid transparent;transition:all 0.2s;margin-bottom:-1px;}
.nav-tab:hover{color:var(--ink);}
.nav-tab.active{color:var(--gold);border-bottom-color:var(--gold);font-weight:600;}

/* PAGES */
.page{display:none;position:relative;z-index:1;padding:1.5rem 1.2rem;max-width:820px;margin:0 auto;}
.page.active{display:block;}

.kicker{font-family:'Cinzel',serif;font-size:0.58rem;letter-spacing:4px;color:var(--gold);text-transform:uppercase;margin-bottom:0.3rem;}
.big-title{font-family:'Cinzel',serif;font-size:1.9rem;font-weight:600;letter-spacing:2px;color:var(--ink);text-align:center;}
.ornament{display:flex;align-items:center;gap:0.5rem;max-width:12rem;margin:0.6rem auto 1.25rem;}
.orn-line{flex:1;height:1px;background:linear-gradient(to right,transparent,var(--worn),transparent);}
.orn-gem{color:var(--gold);font-size:0.6rem;}
.parch-card{background:rgba(242,232,208,0.82);border:1.5px solid var(--worn);border-radius:8px;box-shadow:inset 0 1px 6px rgba(100,60,10,0.1),0 2px 10px rgba(0,0,0,0.15);}
.footer-orn{font-family:'Cinzel',serif;font-size:0.55rem;letter-spacing:3px;color:var(--gold);text-transform:uppercase;text-align:center;padding:1.5rem 0 1rem;}

/* HOME GRID */
.home-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;margin-bottom:1.25rem;}

/* MAP */
.map-wrap{position:relative;width:100%;border-radius:8px;overflow:hidden;border:2px solid var(--worn);
  box-shadow:0 0 0 1px var(--parch-dark),4px 6px 20px rgba(0,0,0,0.4),inset 0 0 24px rgba(100,60,10,0.12);}
.map-wrap::after{content:'';position:absolute;inset:0;pointer-events:none;z-index:5;
  background:radial-gradient(ellipse at 50% 50%,transparent 60%,rgba(50,25,5,0.2) 100%);}
.map-img{width:100%;height:auto;display:block;filter:sepia(0.35) saturate(0.85) brightness(0.92);}
.marker{position:absolute;width:34px;height:34px;display:flex;align-items:center;justify-content:center;
  font-size:1.35rem;transform:translate(-50%,-50%);z-index:10;
  filter:drop-shadow(0 1px 3px rgba(0,0,0,0.7));pointer-events:none;transition:left 0.4s ease,top 0.4s ease;}
.marker.mine{cursor:grab;pointer-events:all;}
.marker.mine:active{cursor:grabbing;}
.map-tooltip{position:absolute;z-index:30;background:rgba(59,30,6,0.92);color:var(--gold-lt);
  font-family:'Cinzel',serif;font-size:0.6rem;letter-spacing:1px;padding:0.2rem 0.5rem;border-radius:3px;
  border:1px solid var(--gold-lt);pointer-events:none;white-space:nowrap;transform:translate(-50%,-140%);
  opacity:0;transition:opacity 0.15s;}
.map-tooltip.show{opacity:1;}
.player-pick-row{display:flex;gap:8px;margin-top:8px;justify-content:center;}
.player-pick-btn{font-family:'Cinzel',serif;font-size:0.55rem;letter-spacing:1.5px;text-transform:uppercase;
  padding:0.3rem 0.65rem;border-radius:4px;cursor:pointer;transition:all 0.2s;
  background:rgba(242,232,208,0.7);border:1px solid var(--worn);color:var(--ink-faded);}
.player-pick-btn.active{background:#3b1e06;border-color:var(--gold-lt);color:var(--gold-lt);}
.map-hint{font-family:'Cinzel',serif;font-size:0.55rem;letter-spacing:1px;color:var(--ink-faded);font-style:italic;text-align:center;margin-top:4px;}

/* ROOM BUTTONS */
.rooms-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.room-btn{position:relative;height:76px;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:0.2rem;border-radius:6px;cursor:pointer;transition:all 0.2s;border:1.5px solid;}
.room-btn:hover{transform:translateY(-2px);box-shadow:0 5px 16px rgba(0,0,0,0.28);}
.room-btn.general{background:rgba(242,232,208,0.92);border-color:var(--gold);color:var(--ink);}
.room-btn.unlocked{background:rgba(139,105,20,0.18);border-color:var(--gold);color:var(--ink);}
.room-btn.locked{background:rgba(59,30,6,0.88);border-color:var(--gold-lt);color:var(--parch);}
.btn-label{font-family:'Cinzel',serif;font-size:0.68rem;letter-spacing:1px;font-weight:600;}
.btn-sub{font-size:0.65rem;font-style:italic;opacity:0.75;}
.btn-badge{position:absolute;top:5px;right:6px;font-family:'Cinzel',serif;font-size:0.5rem;
  letter-spacing:1px;padding:0.1rem 0.3rem;border-radius:3px;}
.room-btn.general .btn-badge,.room-btn.unlocked .btn-badge{background:var(--gold);color:var(--parch);}
.room-btn.locked .btn-badge{background:rgba(201,168,76,0.18);color:var(--gold-lt);}

/* PLAYER PAGE LAYOUT */
.player-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;align-items:start;}

/* BINGO */
.bingo-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;}
.bingo-cell{aspect-ratio:1;min-height:40px;border-radius:4px;display:flex;align-items:center;justify-content:center;
  text-align:center;font-size:8px;line-height:1.2;padding:2px;cursor:pointer;
  border:1px solid var(--worn);transition:all 0.15s;background:rgba(242,232,208,0.5);color:var(--ink-faded);}
.bingo-cell.marked{background:#3b1e06;color:var(--gold-lt);border-color:var(--gold);}
.bingo-cell.free{background:rgba(139,105,20,0.25);color:var(--ink);font-weight:600;cursor:default;}

/* NOTES */
.ch-pick-row{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:8px;}
.ch-pick{width:32px;height:22px;border-radius:3px;border:1px solid;font-family:'Cinzel',serif;font-size:7.5px;font-weight:600;cursor:pointer;transition:all 0.15s;}
.ch-pick.active{background:#3b1e06;color:var(--gold-lt);border-color:var(--gold-lt);}
.ch-pick.inactive{background:rgba(139,105,20,0.12);color:var(--ink-faded);border-color:var(--gold);}
.parch-note{width:100%;box-sizing:border-box;resize:none;background:rgba(255,252,244,0.85);
  border:1px solid var(--worn);border-radius:4px;padding:0.45rem 0.55rem;
  font-family:'IM Fell English',serif;font-size:0.88rem;color:var(--ink);line-height:1.6;}
.parch-note:focus{outline:none;border-color:var(--gold);}
.parch-note::placeholder{color:var(--worn);font-style:italic;}

/* CHAT MODAL */
.chat-overlay{position:fixed;inset:0;z-index:200;background:rgba(20,10,4,0.72);
  display:flex;align-items:center;justify-content:center;padding:1rem;
  opacity:0;pointer-events:none;transition:opacity 0.2s;}
.chat-overlay.open{opacity:1;pointer-events:all;}
.chat-modal{background:var(--parch);border:2px solid var(--worn);border-radius:10px;
  width:100%;max-width:540px;max-height:82vh;display:flex;flex-direction:column;
  box-shadow:0 8px 40px rgba(0,0,0,0.55),inset 0 1px 10px rgba(100,60,10,0.1);
  transform:translateY(12px);transition:transform 0.2s;}
.chat-overlay.open .chat-modal{transform:translateY(0);}
.chat-header{padding:1rem 1.25rem 0.85rem;border-bottom:1px solid var(--worn);
  background:rgba(201,175,130,0.3);border-radius:8px 8px 0 0;
  display:flex;align-items:flex-start;justify-content:space-between;gap:0.5rem;}
.chat-room-num{font-family:'Cinzel',serif;font-size:0.62rem;letter-spacing:2px;color:var(--gold);}
.chat-title{font-family:'Cinzel',serif;font-size:1rem;font-weight:600;color:var(--ink);}
.chat-sub{font-size:0.78rem;color:var(--ink-faded);font-style:italic;margin-top:0.1rem;}
.chat-badge{font-family:'Cinzel',serif;font-size:0.55rem;letter-spacing:1px;padding:0.18rem 0.5rem;
  border-radius:3px;white-space:nowrap;display:inline-block;margin-top:4px;}
.chat-badge.open,.chat-badge.unlocked{background:var(--gold);color:var(--parch);}
.chat-badge.locked{background:#3b1e06;color:var(--gold-lt);border:1px solid var(--gold-lt);}
.close-btn{background:none;border:none;cursor:pointer;color:var(--ink-faded);font-size:1.2rem;line-height:1;padding:0.1rem 0.2rem;transition:color 0.15s;}
.close-btn:hover{color:var(--ink);}
.messages{flex:1;overflow-y:auto;padding:0.85rem 1.1rem;display:flex;flex-direction:column;gap:0.6rem;min-height:120px;}
.empty-note,.locked-note{font-size:0.85rem;color:var(--ink-faded);font-style:italic;text-align:center;margin:auto;line-height:1.7;}
.locked-note strong{display:block;font-family:'Cinzel',serif;font-size:0.78rem;color:var(--ink-faded);margin-bottom:0.3rem;font-weight:400;font-style:normal;}
.msg-name{font-family:'Cinzel',serif;font-size:0.65rem;letter-spacing:1px;color:var(--gold);display:block;margin-bottom:0.1rem;}
.msg.mine .msg-name{color:#3b1e06;}
.msg-text{font-size:0.88rem;color:var(--ink);line-height:1.6;}
.compose{border-top:1px solid var(--worn);padding:0.6rem 0.9rem;display:flex;gap:0.4rem;align-items:flex-end;
  background:rgba(201,175,130,0.18);border-radius:0 0 8px 8px;}
.compose textarea{flex:1;resize:none;min-height:36px;max-height:90px;background:rgba(255,252,244,0.85);
  border:1px solid var(--worn);border-radius:4px;padding:0.35rem 0.5rem;
  font-family:'IM Fell English',serif;font-size:0.88rem;color:var(--ink);line-height:1.5;}
.compose textarea::placeholder{color:var(--worn);font-style:italic;}
.compose textarea:focus{outline:none;border-color:var(--gold);}
.send-btn{height:36px;padding:0 0.8rem;background:#3b1e06;border:1px solid var(--gold-lt);border-radius:4px;
  color:var(--gold-lt);font-family:'Cinzel',serif;font-size:0.6rem;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:background 0.2s;}
.send-btn:hover{background:#5a3010;}

/* player page nav buttons */
.page-nav-row{display:flex;gap:10px;margin-bottom:1rem;}
.back-btn{font-family:'Cinzel',serif;font-size:0.58rem;letter-spacing:1.5px;text-transform:uppercase;
  padding:0.3rem 0.65rem;border-radius:4px;cursor:pointer;background:none;border:1px solid var(--worn);color:var(--ink-faded);transition:all 0.2s;}
.back-btn:hover{border-color:var(--gold);color:var(--ink);}

/* player shortcut cards */
.player-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.25rem;}
.player-card-btn{background:rgba(139,105,20,0.12);border:1.5px solid var(--gold);border-radius:8px;
  padding:0.85rem;cursor:pointer;text-align:left;font-family:inherit;transition:all 0.2s;}
.player-card-btn:hover{background:rgba(139,105,20,0.2);}
.pc-name{font-family:'Cinzel',serif;font-weight:600;font-size:0.82rem;color:var(--ink);}
.pc-sub{font-family:'Cinzel',serif;font-size:0.58rem;color:var(--gold);margin-top:2px;}

@media(max-width:640px){.home-grid,.player-grid,.rooms-grid,.player-cards{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div id="bg"></div>

<nav>
  <button class="nav-tab active" data-page="home">Home</button>
  <button class="nav-tab" data-page="p-marine">🧜‍♀️ Marine</button>
  <button class="nav-tab" data-page="p-kathi">🍄 Kathi</button>
</nav>

<!-- HOME PAGE -->
<div class="page active" id="page-home">
  <div style="text-align:center;margin-bottom:1.25rem;">
    <div class="kicker">Spoiler-Safe</div>
    <div class="big-title">Iron Flame</div>
    <div class="ornament"><div class="orn-line"></div><div class="orn-gem">◆</div><div class="orn-line"></div></div>
  </div>

  <div class="home-grid">
    <!-- MAP -->
    <div>
      <div class="kicker" style="margin-bottom:6px;">Progress Map</div>
      <div class="map-wrap" id="mapEl">
        <img src="shouty_map.png" class="map-img" alt="Book map" id="mapImg">
        <div class="map-tooltip" id="mapTooltip"></div>
      </div>
      <div class="player-pick-row">
        <button class="player-pick-btn active" data-pid="marine">🧜‍♀️ Marine</button>
        <button class="player-pick-btn" data-pid="kathi">🍄 Kathi</button>
      </div>
      <div class="map-hint">Select your name, then drag your marker</div>
    </div>

    <!-- ROOMS -->
    <div>
      <div class="kicker" style="margin-bottom:6px;">Chapter Rooms</div>
      <div class="rooms-grid" id="roomsGrid"></div>
    </div>
  </div>

  <!-- PLAYER SHORTCUTS -->
  <div class="player-cards">
    <button class="player-card-btn" onclick="showPage('p-marine')">
      <span style="font-size:1.2rem;">🧜‍♀️</span>
      <div class="pc-name">Marine</div>
      <div class="pc-sub">Bingo &amp; Notes →</div>
    </button>
    <button class="player-card-btn" onclick="showPage('p-kathi')">
      <span style="font-size:1.2rem;">🍄</span>
      <div class="pc-name">Kathi</div>
      <div class="pc-sub">Bingo &amp; Notes →</div>
    </button>
  </div>

  <div class="footer-orn">✦ &nbsp; The Bingo Book Club &nbsp; ✦</div>
</div>

<!-- PLAYER PAGES -->
<div class="page" id="page-p-marine"></div>
<div class="page" id="page-p-kathi"></div>

<!-- CHAT MODAL -->
<div class="chat-overlay" id="chatOverlay">
  <div class="chat-modal">
    <div class="chat-header">
      <div>
        <div class="chat-room-num" id="chatRoomNum"></div>
        <div class="chat-title" id="chatTitle"></div>
        <div class="chat-sub" id="chatSub"></div>
        <span class="chat-badge" id="chatBadge"></span>
      </div>
      <button class="close-btn" id="chatClose">✕</button>
    </div>
    <div class="messages" id="chatMessages"></div>
    <div class="compose">
      <textarea id="chatTA" placeholder="Leave a thought…" rows="1"></textarea>
      <button class="send-btn" id="chatSend">Post</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
  getFirestore, collection, addDoc, onSnapshot,
  query, where, orderBy, serverTimestamp,
  doc, setDoc, getDoc, updateDoc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const fb = initializeApp({
  apiKey: "AIzaSyAIQTe-QGQmwqTVmIyJZZ_qlDNsD6GUskY",
  authDomain: "bingobookclub-2144e.firebaseapp.com",
  projectId: "bingobookclub-2144e",
  storageBucket: "bingobookclub-2144e.firebasestorage.app",
  messagingSenderId: "294177836341",
  appId: "1:294177836341:web:6d5f11e64737fbe3aad07c"
});
const db = getFirestore(fb);

/* ── DATA ── */
const PLAYERS = {
  marine: { name:"marine", display:"Marine", emoji:"🧜‍♀️", offset:{x:-2,y:0} },
  kathi:  { name:"kathi",  display:"Kathi",  emoji:"🍄",   offset:{x:2, y:0} },
};

const ROOMS = [
  {ch:0,  label:"General",      sub:"No spoilers — anything goes"},
  {ch:6,  label:"Up to Ch. 6",  sub:"Chapters 1–6"},
  {ch:16, label:"Up to Ch. 16", sub:"Chapters 7–16"},
  {ch:26, label:"Up to Ch. 26", sub:"Chapters 17–26"},
  {ch:36, label:"Up to Ch. 36", sub:"Chapters 27–36"},
  {ch:46, label:"Up to Ch. 46", sub:"Chapters 37–46"},
  {ch:56, label:"Up to Ch. 56", sub:"Chapters 47–56"},
  {ch:66, label:"Up to Ch. 66", sub:"Chapters 57–66"},
];

const BINGO_ITEMS = [
  "Plot twist","Love triangle","Flashback","New character","Cliffhanger",
  "Betrayal","Death","Secret revealed","Reunion","Time skip",
  "Comic relief","Symbol appears","FREE","Dream sequence","Conflict",
  "Letter/note","Weather motif","Chapter ends abruptly","Foreshadowing","Moral dilemma",
  "Found family","Villain POV","Mystery deepens","Sacrifice","New location"
];

/* ── MAP POSITIONS ── */
const rowY=[22.7,32.2,41.2,51.5,60.9,69.6];
const rowX1=[10.3,10.8,10.8,11.3,11.3,10.8];
const xStep=8.7;
function mkPos(r,c){return{x:rowX1[r]+c*xStep,y:rowY[r]};}
const POS={0:mkPos(0,0)};
let _c=0;
for(let r=0;r<rowY.length;r++) for(let c=0;c<10;c++){_c++;if(_c>66)break;POS[_c]=mkPos(r,c);}

/* ── STATE ── */
const progress = {marine:0, kathi:0};
let activePid = "marine";
let activeRoom = null, activeUnsub = null;

/* ── NAV ── */
window.showPage = function(pid) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+pid).classList.add('active');
  document.querySelector(`.nav-tab[data-page="${pid}"]`)?.classList.add('active');
};
document.querySelectorAll('.nav-tab').forEach(t=>{
  t.addEventListener('click',()=>showPage(t.dataset.page));
});

/* ── ROOMS ── */
function renderRooms() {
  const grid = document.getElementById('roomsGrid');
  grid.innerHTML = '';
  const prog = progress[activePid] || 0;
  ROOMS.forEach(r => {
    const isGeneral = r.ch === 0;
    const unlocked = isGeneral || prog >= r.ch;
    const cls = isGeneral ? 'general' : unlocked ? 'unlocked' : 'locked';
    const badge = isGeneral ? 'Open' : unlocked ? 'Unlocked' : 'Write only';
    const btn = document.createElement('div');
    btn.className = 'room-btn ' + cls;
    btn.innerHTML = `<span class="btn-badge">${badge}</span><span class="btn-label">${r.label}</span><span class="btn-sub">${r.sub}</span>`;
    btn.addEventListener('click', () => openChat(r));
    grid.appendChild(btn);
  });
}
renderRooms();

/* ── MAP ── */
const mapEl = document.getElementById('mapEl');
const tooltip = document.getElementById('mapTooltip');

function placeMarker(pid, ch) {
  let m = document.getElementById('marker-'+pid);
  if (!m) {
    m = document.createElement('div');
    m.id = 'marker-'+pid;
    m.className = 'marker' + (pid === activePid ? ' mine' : '');
    m.textContent = PLAYERS[pid].emoji;
    mapEl.appendChild(m);
  }
  const p = POS[Math.min(ch,66)] || POS[1];
  const o = PLAYERS[pid].offset;
  m.style.left = (p.x+o.x)+'%';
  m.style.top  = (p.y+o.y)+'%';
}

function snapNearest(clientX, clientY) {
  const rect = mapEl.getBoundingClientRect();
  const xp = (clientX-rect.left)/rect.width*100;
  const yp = (clientY-rect.top)/rect.height*100;
  let best=1, bestD=Infinity;
  for (const [ch,p] of Object.entries(POS)) {
    if (+ch===0) continue;
    const d = Math.hypot(xp-p.x, yp-p.y);
    if (d<bestD) {bestD=d;best=+ch;}
  }
  return best;
}

let dragging=false;
mapEl.addEventListener('mousedown', e=>{
  const m = document.getElementById('marker-'+activePid);
  if (!m) return;
  const r=m.getBoundingClientRect();
  if (Math.hypot(e.clientX-(r.left+r.width/2), e.clientY-(r.top+r.height/2))>24) return;
  e.preventDefault(); dragging=true; m.style.transition='none';
});
mapEl.addEventListener('touchstart', e=>{
  const t=e.touches[0];
  const m=document.getElementById('marker-'+activePid);
  if(!m) return;
  const r=m.getBoundingClientRect();
  if(Math.hypot(t.clientX-(r.left+r.width/2),t.clientY-(r.top+r.height/2))>24) return;
  e.preventDefault(); dragging=true; m.style.transition='none';
},{passive:false});

window.addEventListener('mousemove', e=>{
  if(!dragging) return; e.preventDefault();
  const rect=mapEl.getBoundingClientRect();
  const xp=Math.min(Math.max((e.clientX-rect.left)/rect.width*100,2),98);
  const yp=Math.min(Math.max((e.clientY-rect.top)/rect.height*100,2),98);
  const m=document.getElementById('marker-'+activePid);
  if(m){m.style.left=xp+'%';m.style.top=yp+'%';}
  const ch=snapNearest(e.clientX,e.clientY);
  tooltip.textContent='Chapter '+ch;
  tooltip.style.left=xp+'%'; tooltip.style.top=yp+'%';
  tooltip.classList.add('show');
});
window.addEventListener('touchmove', e=>{
  if(!dragging) return; e.preventDefault();
  const t=e.touches[0];
  const rect=mapEl.getBoundingClientRect();
  const xp=Math.min(Math.max((t.clientX-rect.left)/rect.width*100,2),98);
  const yp=Math.min(Math.max((t.clientY-rect.top)/rect.height*100,2),98);
  const m=document.getElementById('marker-'+activePid);
  if(m){m.style.left=xp+'%';m.style.top=yp+'%';}
  const ch=snapNearest(t.clientX,t.clientY);
  tooltip.textContent='Chapter '+ch;
  tooltip.style.left=xp+'%'; tooltip.style.top=yp+'%';
  tooltip.classList.add('show');
},{passive:false});

async function endDrag(e) {
  if(!dragging) return;
  dragging=false; tooltip.classList.remove('show');
  const m=document.getElementById('marker-'+activePid);
  if(m) m.style.transition='';
  const pt=e.changedTouches?e.changedTouches[0]:e;
  const ch=snapNearest(pt.clientX,pt.clientY);
  progress[activePid]=ch;
  placeMarker(activePid,ch);
  renderRooms();
  await saveProgress(activePid,ch);
}
window.addEventListener('mouseup',endDrag);
window.addEventListener('touchend',endDrag);

/* player pick buttons */
document.querySelectorAll('.player-pick-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.player-pick-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    activePid=btn.dataset.pid;
    document.querySelectorAll('.marker').forEach(m=>m.classList.remove('mine'));
    const mine=document.getElementById('marker-'+activePid);
    if(mine) mine.classList.add('mine');
    renderRooms();
  });
});

/* ── FIREBASE: PROGRESS ── */
async function saveProgress(pid,ch) {
  try { await setDoc(doc(db,'progress_spoiler',pid),{chapter:ch},{merge:true}); } catch(e){console.error(e);}
}
// live markers
onSnapshot(collection(db,'progress_spoiler'), snap=>{
  snap.forEach(d=>{
    const pid=d.id;
    if(!PLAYERS[pid]) return;
    const ch=d.data().chapter||0;
    progress[pid]=ch;
    placeMarker(pid,ch);
  });
  renderRooms();
},err=>console.error(err));

/* ── CHAT MODAL ── */
const chatOverlay = document.getElementById('chatOverlay');
const chatClose   = document.getElementById('chatClose');
const chatTA      = document.getElementById('chatTA');
const chatSend    = document.getElementById('chatSend');

function openChat(room) {
  activeRoom = room;
  const prog = progress[activePid]||0;
  const unlocked = room.ch===0 || prog>=room.ch;
  document.getElementById('chatRoomNum').textContent = room.ch===0 ? 'General Room' : `Room — Ch. ${room.ch}`;
  document.getElementById('chatTitle').textContent   = room.label;
  document.getElementById('chatSub').textContent     = room.sub;
  const badge = document.getElementById('chatBadge');
  const badgeCls = room.ch===0?'open':unlocked?'unlocked':'locked';
  badge.className = 'chat-badge '+badgeCls;
  badge.textContent = room.ch===0?'Open':unlocked?'Unlocked — all messages visible':'Write only — visible after ch '+room.ch;
  chatOverlay.classList.add('open');
  document.body.style.overflow='hidden';
  chatTA.value=''; chatTA.style.height='auto';
  subscribeChat(room, unlocked);
}

chatClose.addEventListener('click', closeChat);
chatOverlay.addEventListener('click', e=>{ if(e.target===chatOverlay) closeChat(); });
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeChat(); });

function closeChat() {
  chatOverlay.classList.remove('open');
  document.body.style.overflow='';
  if(activeUnsub){activeUnsub();activeUnsub=null;}
  activeRoom=null;
}

chatTA.addEventListener('input',()=>{ chatTA.style.height='auto'; chatTA.style.height=chatTA.scrollHeight+'px'; });
chatTA.addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} });
chatSend.addEventListener('click',sendMessage);

function subscribeChat(room, unlocked) {
  if(activeUnsub) activeUnsub();
  const msgDiv = document.getElementById('chatMessages');
  msgDiv.innerHTML='<span class="empty-note">Loading…</span>';
  const q = query(collection(db,'shouty_messages'), where('room','==',room.ch), orderBy('ts','asc'));
  activeUnsub = onSnapshot(q, snap=>{
    const prog=progress[activePid]||0;
    const canRead=room.ch===0||prog>=room.ch;
    let msgs=[]; snap.forEach(d=>msgs.push({id:d.id,...d.data()}));
    if(!canRead) msgs=msgs.filter(m=>m.name===activePid);
    msgDiv.innerHTML='';
    if(msgs.length===0){
      msgDiv.innerHTML=(!canRead&&room.ch!==0)
        ?`<div class="locked-note"><strong>Write mode</strong>Post freely — you'll see everyone's thoughts once you reach chapter ${room.ch}.</div>`
        :`<span class="empty-note">No thoughts yet. Be the first!</span>`;
      return;
    }
    msgs.forEach(m=>{
      const p=PLAYERS[m.name];
      const el=document.createElement('div');
      el.className='msg'+(m.name===activePid?' mine':'');
      el.innerHTML=`<span class="msg-name">${p?p.emoji:'✦'} ${m.name}</span><span class="msg-text">${esc(m.text)}</span>`;
      msgDiv.appendChild(el);
    });
    msgDiv.scrollTop=msgDiv.scrollHeight;
  },err=>console.error(err));
}

async function sendMessage() {
  const text=chatTA.value.trim();
  if(!text||!activeRoom) return;
  try {
    await addDoc(collection(db,'shouty_messages'),{
      room: activeRoom.ch, name: activePid, text, ts: serverTimestamp()
    });
    chatTA.value=''; chatTA.style.height='auto';
  } catch(e){console.error(e);}
}

/* ── BINGO ── */
async function loadBingo(pid) {
  try {
    const d=await getDoc(doc(db,'shouty_bingo',pid));
    return d.exists()?(d.data().marked||[]):[];
  } catch(e){console.error(e);return [];}
}
async function saveBingo(pid, markedArr) {
  try { await setDoc(doc(db,'shouty_bingo',pid),{marked:markedArr}); } catch(e){console.error(e);}
}

/* ── PLAYER PAGES ── */
const ROOM_CHAPTERS=[0,6,16,26,36,46,56,66];

async function buildPlayerPage(pid) {
  const p = PLAYERS[pid];
  const container = document.getElementById('page-p-'+pid);
  if(container.dataset.built) return;
  container.dataset.built='1';

  const savedMarked = await loadBingo(pid);
  const markedSet = new Set(savedMarked);

  function checkBingo(){
    for(let r=0;r<5;r++) if([0,1,2,3,4].every(c=>markedSet.has(r*5+c))) return true;
    for(let c=0;c<5;c++) if([0,1,2,3,4].every(r=>markedSet.has(r*5+c))) return true;
    if([0,1,2,3,4].every(i=>markedSet.has(i*5+i))) return true;
    if([0,1,2,3,4].every(i=>markedSet.has(i*5+(4-i)))) return true;
    return false;
  }

  function renderBingoHeader(){
    const hdr=container.querySelector('.bingo-header');
    hdr.innerHTML=`<div class="kicker">Reading Bingo</div>${checkBingo()?'<span style="background:#3b1e06;color:var(--gold-lt);font-size:9px;font-family:Cinzel,serif;letter-spacing:1px;padding:2px 7px;border-radius:3px;border:1px solid var(--gold-lt)">BINGO!</span>':""}`;
  }

  const noteData={};
  let selRoom=0;

  container.innerHTML=`
    <div style="max-width:820px;margin:0 auto;padding:1.5rem 1.2rem;">
      <div class="page-nav-row">
        <button class="back-btn" onclick="showPage('home')">← Home</button>
        <div>
          <div class="kicker">Reading Tracker</div>
          <div style="font-family:'Cinzel',serif;font-weight:600;font-size:1rem;color:var(--ink);">${p.emoji} ${p.display}</div>
        </div>
      </div>
      <div class="player-grid">
        <div class="parch-card" style="padding:0.9rem;">
          <div class="bingo-header" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;"></div>
          <div class="bingo-grid" id="bingo-${pid}"></div>
          <div style="font-size:9px;color:var(--gold);margin-top:5px;font-style:italic;">Click squares to mark</div>
        </div>
        <div class="parch-card" style="padding:0.9rem;">
          <div class="kicker" style="margin-bottom:8px;">Chapter Notes</div>
          <div class="ch-pick-row" id="chpicks-${pid}"></div>
          <div style="background:rgba(242,232,208,0.5);border-radius:5px;border:1px solid var(--worn);padding:0.6rem;">
            <div id="note-label-${pid}" style="font-family:'Cinzel',serif;font-size:0.55rem;letter-spacing:2px;color:var(--gold);margin-bottom:5px;"></div>
            <textarea class="parch-note" id="note-ta-${pid}" rows="9" placeholder="Your thoughts…"></textarea>
          </div>
        </div>
      </div>
      <div class="footer-orn">✦ &nbsp; The Bingo Book Club &nbsp; ✦</div>
    </div>`;

  renderBingoHeader();

  // bingo cells
  const bingoGrid=document.getElementById('bingo-'+pid);
  BINGO_ITEMS.forEach((item,i)=>{
    const isFree=i===12;
    const cell=document.createElement('div');
    cell.className='bingo-cell'+(isFree?' free':markedSet.has(i)?' marked':'');
    cell.textContent=isFree?'FREE':item;
    if(!isFree) cell.addEventListener('click',async()=>{
      markedSet.has(i)?markedSet.delete(i):markedSet.add(i);
      cell.className='bingo-cell'+(markedSet.has(i)?' marked':'');
      renderBingoHeader();
      await saveBingo(pid,[...markedSet]);
    });
    bingoGrid.appendChild(cell);
  });

  // chapter picks
  const picks=document.getElementById('chpicks-'+pid);
  function updateNoteUI(){
    document.getElementById('note-label-'+pid).textContent=selRoom===0?'General Notes':`Notes — Up to Chapter ${selRoom}`;
    document.getElementById('note-ta-'+pid).value=noteData[selRoom]||'';
    picks.querySelectorAll('.ch-pick').forEach(b=>{
      b.classList.toggle('active',+b.dataset.ch===selRoom);
      b.classList.toggle('inactive',+b.dataset.ch!==selRoom);
    });
  }
  ROOM_CHAPTERS.forEach(ch=>{
    const b=document.createElement('button');
    b.className='ch-pick '+(ch===selRoom?'active':'inactive');
    b.dataset.ch=ch;
    b.textContent=ch===0?'Gen':'Ch.'+ch;
    b.addEventListener('click',()=>{selRoom=ch;updateNoteUI();});
    picks.appendChild(b);
  });
  updateNoteUI();

  document.getElementById('note-ta-'+pid).addEventListener('input',e=>{
    noteData[selRoom]=e.target.value;
  });
}

// build player pages on first nav
document.querySelectorAll('.nav-tab').forEach(t=>{
  t.addEventListener('click',()=>{
    const pid=t.dataset.page;
    if(pid==='p-marine') buildPlayerPage('marine');
    if(pid==='p-kathi')  buildPlayerPage('kathi');
  });
});
document.querySelectorAll('.player-card-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const pid=btn.getAttribute('onclick').includes('marine')?'marine':'kathi';
    buildPlayerPage(pid);
  });
});

/* ── HELPERS ── */
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');}
</script>
