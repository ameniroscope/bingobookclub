<div class="container">…</div>
<div class="controls">…</div>
-->

<!-- With this: -->
<div class="card-layout">
    <div class="journey-wrapper">
        <!-- existing journey content unchanged -->
    </div>

    <div class="container">
        <div class="bingo-grid" id="bingoGrid"></div>
    </div>

    <div class="controls">
        <!-- existing controls unchanged -->
    </div>
</div>


<!-- ─────────────────────────────────────────────────────────── -->
<!-- 2. Replace ALL the CSS for .journey-wrapper, .container,   -->
<!--    .controls, and add .card-layout                         -->
<!-- ─────────────────────────────────────────────────────────── -->

<style>
/* ── Card layout: row with three columns ── */
.card-layout {
    display: flex;
    flex-direction: row;
    align-items: center;        /* vertically centre all three columns */
    justify-content: center;
    gap: 24px;
    width: 100%;
    max-width: 1200px;
}

/* ── Bingo card (centre column) ── */
.container {
    position: relative;
    flex-shrink: 0;
    width: min(90vw, 560px);
    aspect-ratio: 1024 / 1536;
    background-image: url('current_bingo.png');
    background-size: 100% 100%;
}

/* ── Journey box (left column) ── */
.journey-wrapper {
    /* Remove all fixed/absolute positioning */
    position: static;
    transform: none;
    left: unset;
    top: unset;

    width: 280px;
    flex-shrink: 0;
    padding-top: 70px;          /* keep room for the cover image */
}

.journey-cover {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 90px;
    height: 130px;
    object-fit: cover;
    border-radius: 6px;
    border: 2px solid #c9a84c55;
    box-shadow: 0 0 15px rgba(201,168,76,0.3);
    z-index: 2;
}

/* journey-wrapper must be relative so the cover image can be absolute inside it */
.journey-wrapper {
    position: relative;
}

.journey-box {
    padding: 90px 20px 24px 20px;
    background: rgba(26, 15, 31, 0.9);
    border: 1px solid #c9a84c33;
    border-radius: 12px;
    box-shadow: 0 0 18px rgba(201,168,76,0.15);
    text-align: center;
    color: #f5ecd9;
}

/* ── Controls (right column) ── */
.controls {
    /* Remove all fixed/absolute positioning */
    position: static;
    transform: none;
    right: unset;
    top: unset;

    display: flex;
    flex-direction: column;
    gap: 10px;
    align-items: stretch;
    width: 160px;
    flex-shrink: 0;
}

/* ── Responsive: stack vertically on narrow screens ── */
@media (max-width: 1000px) {
    .card-layout {
        flex-direction: column;
        align-items: center;
    }

    .journey-wrapper {
        width: min(90vw, 400px);
        padding-top: 0;
    }

    .journey-cover {
        position: static;
        transform: none;
        width: 80px;
        height: 115px;
        margin: 0 auto 15px auto;
        display: block;
    }

    .journey-box {
        padding: 20px;
        width: 100%;
    }

    .container {
        width: min(90vw, 560px);
    }

    .controls {
        width: min(90vw, 400px);
    }

    .secondary-buttons { width: 100%; }
}
</style>
