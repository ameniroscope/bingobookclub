<!-- ============================================================
     PATCH: Add read-only lock with password unlock
     Apply these 3 changes to marine_bingo.html
     ============================================================ -->


<!-- ── CHANGE 1 ──────────────────────────────────────────────
     Add this CSS block inside the existing <style> tag
     (paste anywhere inside the <style>...</style> section)
─────────────────────────────────────────────────────────────── -->
<style>
/* Lock button */
.lock-btn {
    position: fixed;
    top: 24px;
    right: 24px;
    z-index: 200;
    background: rgba(31, 58, 54, 0.9);
    border: 1px solid #c9a84c55;
    border-radius: 50%;
    width: 48px;
    height: 48px;
    font-size: 1.4rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    box-shadow: 0 0 12px rgba(201, 168, 76, 0.15);
    padding: 0;
}
.lock-btn:hover {
    border-color: #c9a84c;
    box-shadow: 0 0 20px rgba(201, 168, 76, 0.35);
    transform: scale(1.1);
}
.lock-btn.unlocked {
    border-color: #c9a84c;
    background: rgba(201, 168, 76, 0.25);
}

/* Overlay */
.lock-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 300;
    align-items: center;
    justify-content: center;
}
.lock-overlay.visible {
    display: flex;
}
.lock-modal {
    background: rgba(26, 15, 31, 0.97);
    border: 1px solid #c9a84c55;
    border-radius: 12px;
    padding: 32px;
    text-align: center;
    box-shadow: 0 0 30px rgba(201, 168, 76, 0.2);
    display: flex;
    flex-direction: column;
    gap: 16px;
    min-width: 260px;
}
.lock-modal h3 {
    font-family: 'Cinzel', serif;
    color: #c9a84c;
    font-size: 1rem;
    letter-spacing: 1px;
    margin: 0;
}
.lock-modal input[type="password"] {
    width: 100%;
    background: rgba(255,255,255,0.07);
    border: 1px solid #c9a84c55;
    border-radius: 6px;
    color: #f5ecd9;
    font-family: 'Crimson Text', Georgia, serif;
    font-size: 1.1rem;
    padding: 10px 14px;
    text-align: center;
    outline: none;
    box-sizing: border-box;
    height: auto;
}
.lock-modal input[type="password"]:focus {
    border-color: #c9a84c;
}
.lock-modal .error {
    color: #e06c75;
    font-size: 0.85rem;
    min-height: 1em;
}
.lock-modal .modal-buttons {
    display: flex;
    gap: 10px;
    justify-content: center;
}
</style>


<!-- ── CHANGE 2 ──────────────────────────────────────────────
     Add this HTML right after the opening <body> tag
     (before the stars <div>)
─────────────────────────────────────────────────────────────── -->

<!-- Lock button (top-right corner) -->
<button class="lock-btn" id="lockBtn" title="Unlock card">🔒</button>

<!-- Password modal -->
<div class="lock-overlay" id="lockOverlay">
    <div class="lock-modal">
        <h3>🔐 Unlock Card</h3>
        <input type="password" id="passwordInput" placeholder="Enter password" autocomplete="off">
        <div class="error" id="lockError"></div>
        <div class="modal-buttons">
            <button class="small-btn" id="unlockSubmit">Unlock</button>
            <button class="small-btn" id="unlockCancel">Cancel</button>
        </div>
    </div>
</div>


<!-- ── CHANGE 3 ──────────────────────────────────────────────
     Replace the entire <script> block with this one.
     The only additions are:
       - CARD_PASSWORD constant (change "bingo2024" to your password)
       - isUnlocked state variable
       - lockBtn / overlay logic
       - saveCard() and toggleMode guards
       - initGrid() respects locked state
─────────────────────────────────────────────────────────────── -->
<script>
// Star generation
const starsContainer = document.getElementById('stars');
for (let i = 0; i < 80; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    const size = Math.random() > 0.8 ? 3 : 2;
    star.style.cssText = `
        left: ${Math.random() * 100}%;
        top: ${Math.random() * 100}%;
        width: ${size}px;
        height: ${size}px;
        --d: ${2 + Math.random() * 4}s;
        --delay: ${Math.random() * 4}s;
    `;
    starsContainer.appendChild(star);
}

// ── PASSWORD ──────────────────────────────────────────────────
const CARD_PASSWORD = 'bingo2024'; // 👈 Change this for each player or use one shared password

// Firebase config
const PROJECT_ID = 'bingobookclub-2144e';
const FIRESTORE_BASE =
  'https://firestore.googleapis.com/v1/projects/' +
  PROJECT_ID +
  '/databases/(default)/documents/first_bingo/';

// Player
const playerId = 'marine';

// State
const GRID_SIZE = 25;
let cells = Array(GRID_SIZE).fill('');
let marked = Array(GRID_SIZE).fill(false);
let isEditMode = false;
let isUnlocked = false; // 🔒 locked by default
let chapterProgress = 0;
let readingFormat = 'physical';
let emotions = [];

// Elements
const grid = document.getElementById('bingoGrid');
const statusEl = document.getElementById('status');
const saveBtn = document.getElementById('saveBtn');
const lockBtn = document.getElementById('lockBtn');
const lockOverlay = document.getElementById('lockOverlay');
const passwordInput = document.getElementById('passwordInput');
const lockError = document.getElementById('lockError');

const chapterSlider = document.getElementById('chapterSlider');
const chapterValue = document.getElementById('chapterValue');

document.getElementById('playerHeaderName').textContent = playerId;

// ── LOCK / UNLOCK LOGIC ───────────────────────────────────────
function setLockState(unlocked) {
    isUnlocked = unlocked;
    lockBtn.textContent = unlocked ? '🔓' : '🔒';
    lockBtn.classList.toggle('unlocked', unlocked);
    lockBtn.title = unlocked ? 'Lock card' : 'Unlock card';
    saveBtn.disabled = !unlocked;
    document.getElementById('toggleMode').disabled = !unlocked;
    document.getElementById('resetBtn').disabled = !unlocked;
    chapterSlider.disabled = !unlocked;
    document.querySelectorAll('.emotion-btn').forEach(b => b.disabled = !unlocked);
    document.querySelectorAll('input[name="format"]').forEach(r => r.disabled = !unlocked);
    restoreStatus();
    initGrid();
}

lockBtn.onclick = () => {
    if (isUnlocked) {
        // Lock it again
        setLockState(false);
    } else {
        // Show password modal
        passwordInput.value = '';
        lockError.textContent = '';
        lockOverlay.classList.add('visible');
        setTimeout(() => passwordInput.focus(), 50);
    }
};

document.getElementById('unlockSubmit').onclick = tryUnlock;
document.getElementById('unlockCancel').onclick = () => lockOverlay.classList.remove('visible');

passwordInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') tryUnlock();
    if (e.key === 'Escape') lockOverlay.classList.remove('visible');
});

function tryUnlock() {
    if (passwordInput.value === CARD_PASSWORD) {
        lockOverlay.classList.remove('visible');
        setLockState(true);
    } else {
        lockError.textContent = 'Wrong password, try again.';
        passwordInput.value = '';
        passwordInput.focus();
    }
}

// ── SLIDER / FORMAT / EMOTIONS ────────────────────────────────
chapterSlider.oninput = e => {
    chapterProgress = Number(e.target.value);
    chapterValue.textContent = chapterProgress;
};

document.querySelectorAll('input[name="format"]').forEach(radio => {
    radio.addEventListener('change', e => { readingFormat = e.target.value; });
});

document.querySelectorAll('.emotion-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        if (!isUnlocked) return;
        const emotion = btn.dataset.emotion;
        const index = emotions.indexOf(emotion);
        if (index > -1) {
            emotions.splice(index, 1);
            btn.classList.remove('active');
        } else {
            emotions.push(emotion);
            btn.classList.add('active');
        }
    });
});

// ── FIRESTORE HELPERS ─────────────────────────────────────────
function toFV(val) {
    if (typeof val === 'boolean') return { booleanValue: val };
    if (typeof val === 'number') return { integerValue: String(val) };
    if (Array.isArray(val)) return { arrayValue: { values: val.map(toFV) } };
    return { stringValue: String(val) };
}

function fromFV(fv) {
    if (!fv) return null;
    if (fv.booleanValue !== undefined) return fv.booleanValue;
    if (fv.integerValue !== undefined) return Number(fv.integerValue);
    if (fv.stringValue !== undefined) return fv.stringValue;
    if (fv.arrayValue) return (fv.arrayValue.values || []).map(fromFV);
    return null;
}

function restoreStatus() {
    if (!isUnlocked) {
        statusEl.textContent = '🔒 Read Only';
    } else {
        statusEl.textContent = isEditMode ? 'Edit Mode' : 'Play Mode';
    }
}

// ── GRID ──────────────────────────────────────────────────────
function initGrid() {
    grid.innerHTML = '';
    for (let i = 0; i < GRID_SIZE; i++) {
        const cell = document.createElement('div');
        cell.className = 'bingo-cell';

        if (i === 12) {
            cell.textContent = '';
            cell.classList.add('free');
            marked[i] = true;
        } else if (isUnlocked && isEditMode) {
            const input = document.createElement('textarea');
            input.value = cells[i];
            input.oninput = e => cells[i] = e.target.value;
            cell.appendChild(input);
        } else {
            const text = document.createElement('div');
            text.className = 'cell-text';
            text.textContent = cells[i];
            cell.appendChild(text);
            if (marked[i]) cell.classList.add('marked');
            // Only allow clicking cells when unlocked
            if (isUnlocked) {
                cell.onclick = () => { marked[i] = !marked[i]; initGrid(); };
                cell.style.cursor = 'pointer';
            }
        }
        grid.appendChild(cell);
    }
}

// ── SAVE ──────────────────────────────────────────────────────
async function saveCard() {
    if (!isUnlocked) return; // guard
    saveBtn.disabled = true;
    statusEl.textContent = 'Saving...';

    const body = {
        fields: {
            cells: toFV(cells),
            marked: toFV(marked),
            chapterProgress: { integerValue: String(chapterProgress) },
            readingFormat: { stringValue: readingFormat },
            emotions: toFV(emotions),
            savedAt: { stringValue: new Date().toISOString() }
        }
    };

    try {
        const resp = await fetch(FIRESTORE_BASE + encodeURIComponent(playerId), {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        statusEl.textContent = 'Saved to Firebase!';
    } catch (e) {
        statusEl.textContent = 'Firebase save failed';
    } finally {
        saveBtn.disabled = false;
        setTimeout(restoreStatus, 2500);
    }
}

// ── LOAD ──────────────────────────────────────────────────────
async function loadCard() {
    statusEl.textContent = 'Loading...';
    try {
        const resp = await fetch(FIRESTORE_BASE + encodeURIComponent(playerId));
        if (resp.status === 404) { statusEl.textContent = 'No saved data found'; setTimeout(restoreStatus, 2500); return; }
        if (!resp.ok) throw new Error('HTTP ' + resp.status);

        const data = await resp.json();
        const fields = data.fields || {};

        if (fields.cells) cells = fromFV(fields.cells) || Array(GRID_SIZE).fill('');
        if (fields.marked) { marked = fromFV(fields.marked) || Array(GRID_SIZE).fill(false); marked[12] = true; }
        if (fields.chapterProgress) { chapterProgress = Number(fields.chapterProgress.integerValue || 0); chapterSlider.value = chapterProgress; chapterValue.textContent = chapterProgress; }
        if (fields.readingFormat) { readingFormat = fields.readingFormat.stringValue || 'physical'; const r = document.querySelector(`input[name="format"][value="${readingFormat}"]`); if (r) r.checked = true; }
        if (fields.emotions) { emotions = fromFV(fields.emotions) || []; document.querySelectorAll('.emotion-btn').forEach(btn => { btn.classList.toggle('active', emotions.includes(btn.dataset.emotion)); }); }

        initGrid();
        statusEl.textContent = 'Data loaded!';
        setTimeout(restoreStatus, 2000);
    } catch (e) {
        statusEl.textContent = 'No saved data';
        setTimeout(restoreStatus, 2000);
    }
}

// ── BUTTONS ───────────────────────────────────────────────────
document.getElementById('toggleMode').onclick = () => {
    if (!isUnlocked) return;
    isEditMode = !isEditMode;
    document.getElementById('toggleMode').textContent = isEditMode ? '👁️ Play' : '✏️ Edit';
    restoreStatus();
    initGrid();
};

document.getElementById('resetBtn').onclick = () => {
    if (!isUnlocked) return;
    if (!confirm('Reset this bingo card?')) return;
    cells = Array(GRID_SIZE).fill('');
    marked = Array(GRID_SIZE).fill(false);
    marked[12] = true;
    chapterProgress = 0;
    readingFormat = 'physical';
    emotions = [];
    chapterSlider.value = 0;
    chapterValue.textContent = 0;
    document.querySelector('input[name="format"][value="physical"]').checked = true;
    document.querySelectorAll('.emotion-btn').forEach(btn => btn.classList.remove('active'));
    initGrid();
    statusEl.textContent = 'Card reset';
    setTimeout(restoreStatus, 1500);
};

saveBtn.onclick = saveCard;

// ── INIT ──────────────────────────────────────────────────────
setLockState(false); // start locked
loadCard();
</script>
