<style>
:root {
  --base: 20px;
}

html {
  font-size: var(--base);
  height: 100%;
}

body {
  height: 100%;
  width: 100%;
  overflow-y: auto;
  overflow-x: hidden;
  padding-bottom: 5rem;
}

/* SCROLL AREA */
.card-scroll {
  max-width: 720px;
  margin: 0 auto;
  padding: 2rem 1rem 5rem;
}

/* CARD */
.card {
  background: linear-gradient(170deg,#1a1020 0%,#110d14 50%,#0f0a10 100%);
  border: 1px solid #c9a84c55;
  border-radius: 0.5rem;
  overflow: hidden;
  position: relative;
  margin-bottom: 1rem;
}

.card::before,
.card::after {
  content: '';
  position: absolute;
  width: 1.875rem;
  height: 1.875rem;
  border-color: #c9a84c55;
  border-style: solid;
  border-width: 0;
}

.card::before {
  top: 0.5rem;
  left: 0.5rem;
  border-top-width: 1px;
  border-left-width: 1px;
}

.card::after {
  top: 0.5rem;
  right: 0.5rem;
  border-top-width: 1px;
  border-right-width: 1px;
}

.corner-bl,
.corner-br {
  position: absolute;
  width: 1.875rem;
  height: 1.875rem;
  border-color: #c9a84c55;
  border-style: solid;
  border-width: 0;
}

.corner-bl {
  bottom: 0.5rem;
  left: 0.5rem;
  border-bottom-width: 1px;
  border-left-width: 1px;
}

.corner-br {
  bottom: 0.5rem;
  right: 0.5rem;
  border-bottom-width: 1px;
  border-right-width: 1px;
}

.accent-bar {
  height: 0.25rem;
}

.header {
  padding: 1.125rem 1.25rem 0.75rem;
  text-align: center;
}

.crown {
  font-size: 1.25rem;
  color: #c9a84c;
  margin-bottom: 0.25rem;
  display: block;
}

.book-title {
  font-family: 'Cinzel', serif;
  font-size: 1.375rem;
  font-weight: 700;
  color: #f0e6c8;
  line-height: 1.2;
  letter-spacing: 0.0625rem;
}

.author-line {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
  margin-top: 0.5rem;
}

.author-line .rule {
  flex: 1;
  height: 1px;
  max-width: 3.125rem;
}

.author-line .rule.l {
  background: linear-gradient(to right,transparent,#c9a84c66);
}

.author-line .rule.r {
  background: linear-gradient(to left,transparent,#c9a84c66);
}

.author {
  font-family: 'Cinzel', serif;
  font-size: 0.7rem;
  letter-spacing: 0.15625rem;
  color: #c9a84c;
  text-transform: uppercase;
}

.divider {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0 1.25rem;
  margin: 0.25rem 0;
}

.divider .line {
  flex: 1;
  height: 1px;
  background: linear-gradient(to right,transparent,#c9a84c33,transparent);
}

.divider .dot {
  color: #c9a84c;
  font-size: 0.5rem;
}

/* COVER + STATS */
.mid {
  display: flex;
  gap: 0.875rem;
  padding: 0.75rem 1rem 0.5rem;
  align-items: flex-start;
}

.cover {
  width: 6.875rem;
  min-width: 6.875rem;
  height: 10.3125rem;
  border-radius: 0.375rem;
  border: 1px solid #c9a84c22;
  overflow: hidden;
  flex-shrink: 0;
}

.cover img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* STATS */
.mid-right {
  flex: 1;
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(2,1fr);
  gap: 1px;
  background: #c9a84c11;
  border: 1px solid #c9a84c11;
  border-radius: 0.375rem;
  overflow: hidden;
}

.stat-row {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  padding: 0.5rem 0.25rem;
  background: #0f0b12;
}

.stat-icon {
  font-size: 0.9375rem;
  margin-bottom: 0.1875rem;
}

.stat-label {
  font-family: 'Cinzel', serif;
  font-size: 0.4375rem;
  letter-spacing: 0.0625rem;
  color: #c9a84c88;
  text-transform: uppercase;
  margin-bottom: 0.125rem;
}

.stat-val {
  font-size: 0.625rem;
  color: #f0e6c8;
  line-height: 1.3;
}

.stat-sub {
  font-size: 0.5625rem;
  color: #8a7060;
  font-style: italic;
  line-height: 1.3;
  margin-top: 0.0625rem;
}

/* IF LIKED */
.if-liked-full {
  margin: 0 1rem 0.5rem;
  padding: 0.375rem 0.625rem;
  border: 1px solid #c9a84c22;
  border-radius: 0.3125rem;
  background: rgba(201,168,76,0.03);
}

.if-liked-label {
  font-family: 'Cinzel', serif;
  font-size: 0.4375rem;
  letter-spacing: 0.0625rem;
  color: #c9a84c88;
  text-transform: uppercase;
  display: block;
  margin-bottom: 0.1875rem;
}

.if-liked-val {
  font-size: 0.6875rem;
  color: #c8b89a;
  line-height: 1.5;
  font-style: italic;
}

/* SUMMARY */
.summary {
  padding: 0.625rem 1rem;
}

.summary p {
  font-size: 0.8125rem;
  color: #c8b89a;
  line-height: 1.8;
  text-align: justify;
}

/* BARS */
.bars-section {
  padding: 0.625rem 1rem;
  border-bottom: 1px solid #c9a84c22;
}

.bars-title {
  font-family: 'Cinzel', serif;
  font-size: 0.5625rem;
  letter-spacing: 0.125rem;
  color: #c9a84c;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 0.375rem;
  margin-bottom: 0.625rem;
}

.bars-title::before,
.bars-title::after {
  content: '✦';
  font-size: 0.4375rem;
  opacity: 0.6;
}

.bar-row {
  margin-bottom: 0.375rem;
}

.bar-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 0.1875rem;
}

.bar-label {
  font-size: 0.6875rem;
  color: #a89070;
}

.bar-val {
  font-size: 0.5625rem;
  color: #c9784c;
  font-weight: 600;
}

.bar-track {
  height: 3px;
  border-radius: 2px;
  background: rgba(201,168,76,0.1);
  overflow: hidden;
}

.bar-fill {
  height: 100%;
  border-radius: 2px;
}

/* TROPES */
.tropes {
  display: flex;
  border-top: 1px solid #c9a84c22;
}

.trope {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  padding: 0.625rem 0.375rem;
  border-right: 1px solid #c9a84c22;
}

.trope:last-child {
  border-right: none;
}

.trope-icon {
  font-size: 1.125rem;
  margin-bottom: 0.25rem;
}

.trope-label {
  font-family: 'Cinzel', serif;
  font-size: 0.4375rem;
  letter-spacing: 0.0625rem;
  color: #c9a84c;
  text-transform: uppercase;
  margin-bottom: 0.1875rem;
}

.trope-desc {
  font-size: 0.59375rem;
  color: #c8b89a;
  line-height: 1.4;
}

/* MOBILE */
@media (max-width: 480px) {
  :root {
    --base: 18px;
  }

  .mid {
    gap: 0.65rem;
  }

  .cover {
    width: 6.2rem;
    min-width: 6.2rem;
    height: 9.3rem;
  }
}

/* ── Back Button ── */
.back-btn {
  position: fixed;
  bottom: 1.2rem;
  left: 50%;
  transform: translateX(-50%);
  z-index: 1000;

  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 0.45rem;

  padding: 0.65rem 1.5rem;

  font-size: 0.65rem;
  font-family: 'Cinzel', serif;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  text-decoration: none;
  border-radius: 6px;

  background: #1a0f1f;
  border: 1px solid #c9a84c66;
  color: #f5ecd9;
  text-shadow: 0 1px 2px rgba(0,0,0,0.6);
  box-shadow: 0 0 12px rgba(201,168,76,0.12);

  transition: all 0.3s ease;
}

.back-btn:hover {
  background: #24152b;
  border-color: #c9a84c;
  box-shadow: 0 0 20px rgba(201,168,76,0.25);
  transform: translateX(-50%) translateY(-2px);
}

.loading {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  font-family: 'Cinzel', serif;
  color: #c9a84c;
  font-size: 0.9rem;
  letter-spacing: 0.1em;

.no-card-msg {

@keyframes float {

  50% { transform: translateY(-10px); }
}

.construction-title {
  font-size: 1.1rem;
  font-weight: 700;
  color: #c9a84c;
  letter-spacing: 0.08em;
  margin-bottom: 0.5rem;

.construction-book {

.construction-text {

.construction-recommender {

  border-radius: 0.5rem;
  background: rgba(201,168,76,0.03);
  font-size: 0.7rem;
  color: #a89070;

.construction-emoji {
  font-size: 1rem;
  margin-right: 0.3rem;
}
  
</style>
</head>

function slugify(str) {
  return str.toLowerCase()
    .replace(/[^\w\s-]/g, '')
    .replace(/\s+/g, '-')
    .replace(/-+/g, '-')
    .trim();
}

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const booksCol = collection(db, "books");

// Get URL parameters
const params = new URLSearchParams(window.location.search);
const targetBookId = params.get('id');

async function loadBook() {
  const snapshot = await getDocs(booksCol);
  let book = null;
  
  snapshot.forEach(doc => {
    if (doc.id === targetBookId) {
      book = { id: doc.id, ...doc.data() };
    }
  });
  
  if (!book) {
    document.getElementById('content').innerHTML = '<div class="no-card-msg">Book not found!</div>';
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    return;
  }
  
  const slug = slugify(book.title);
  const cardData = BOOK_CARDS[slug];
  
  if (!cardData) {
    document.getElementById('content').innerHTML = `
      <div class="no-card-msg">
        <div class="construction-icon">🏗️</div>
        <div class="construction-title">Card Under Construction</div>
        <div class="construction-book">${book.title}</div>
        <div class="construction-text">
          The detailed information card for this book is being crafted with care. 
          In the meantime, you can still vote for it on the main page!
        </div>
        <div class="construction-recommender">
          <span class="construction-emoji">${book.recommenderEmoji}</span>
          Recommended by ${book.recommender}
        </div>
      </div>
    `;
  } else {
    const { crown, accent, genre, pages, audio, series, seriesSub, spice, spiceLabel, spiceSub, 
            ifLiked, summary, vibes, tropes } = cardData;
    
    document.getElementById('content').innerHTML = `
      <div class="card">
        <div class="corner-bl"></div><div class="corner-br"></div>
        <div class="accent-bar" style="background:${accent};"></div>
        <div class="header">
          <span class="crown">${crown}</span>
          <div class="book-title">${book.title}</div>
          <div class="author-line">
            <div class="rule l"></div>
            <span style="color:#c9a84c;font-size:0.625rem;">✦</span>
            <span class="author">${book.author || 'Unknown Author'}</span>
            <span style="color:#c9a84c;font-size:0.625rem;">✦</span>
            <div class="rule r"></div>
          </div>
        </div>
        <div class="mid">
          <div class="cover">
             ${book.cover ? `<img src="${book.cover}" alt="cover" onerror="this.outerHTML='📖'">` : '📖'}
          </div>
          <div class="mid-right">
            <div class="stats-grid">
              <div class="stat-row"><span class="stat-icon">🌑</span><span class="stat-label">Genre</span><span class="stat-val">${genre}</span></div>
              <div class="stat-row"><span class="stat-icon">⏱️</span><span class="stat-label">Length</span><span class="stat-val">${pages}</span><span class="stat-sub">${audio}</span></div>
              <div class="stat-row"><span class="stat-icon">📖</span><span class="stat-label">Series</span><span class="stat-val">${series}</span><span class="stat-sub">${seriesSub}</span></div>
              <div class="stat-row"><span class="stat-icon">${spice}</span><span class="stat-label">Spice</span><span class="stat-val">${spiceLabel}</span><span class="stat-sub">${spiceSub}</span></div>
            </div>
          </div>
        </div>
        <div class="if-liked-full">
          <span class="if-liked-label">Perfect if you liked</span>
          <span class="if-liked-val">${ifLiked}</span>
        </div>
        <div class="divider"><div class="line"></div><div class="dot">◆</div><div class="line"></div></div>
        <div class="summary"><p>${summary}</p></div>
        <div class="divider"><div class="line"></div><div class="dot">◆</div><div class="line"></div></div>
        <div class="bars-section">
          <div class="bars-title">Vibes</div>
          ${vibes.map(v => `<div class="bar-row">
            <div class="bar-header"><span class="bar-label">${v.label}</span><span class="bar-val">${v.val}</span></div>
            <div class="bar-track"><div class="bar-fill" style="width:${v.width}%;background:${accent};"></div></div>
          </div>`).join('')}
        </div>
        <div class="tropes">
          ${tropes.map(t => `<div class="trope">
            <span class="trope-icon">${t.icon}</span>
            <span class="trope-label">${t.label}</span>
            <span class="trope-desc">${t.desc}</span>
          </div>`).join('')}
        </div>
      </div>
    `;
  }
  
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'block';
}

loadBook();
</script>
