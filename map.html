<!DOCTYPE html>
<html>
<head>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://www.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://firestore.googleapis.com https://*.googleapis.com;">

  <title>Book Map</title>

  <style>
    body {
      font-family: Arial, sans-serif;
    }

    .map {
      position: relative;
      width: 900px;
      height: 550px;
      border: 3px solid #333;
      border-radius: 20px;
      background: #f3ead7;
      margin-top: 20px;
      overflow: hidden;
    }

    .path {
      position: absolute;
      width: 700px;
      height: 300px;
      left: 80px;
      top: 120px;
      border-top: 6px dashed #8b6f47;
      transform: rotate(-8deg);
      opacity: 0.5;
    }

    .chapter {
      position: absolute;
      width: 110px;
      padding: 8px;
      background: white;
      border: 2px solid #444;
      border-radius: 12px;
      text-align: center;
      font-weight: bold;
      transform: translate(-50%, -50%);
    }

    .house {
      position: absolute;
      left: 60px;
      top: 480px;
      width: 90px;
      height: 60px;
      background: #d2691e;
      border: 3px solid #5a2d0c;
      border-radius: 6px;
      transform: translate(-50%, -50%);
      text-align: center;
      font-weight: bold;
      padding-top: 20px;
    }

    .house::before {
      content: "";
      position: absolute;
      left: -10px;
      top: -45px;
      width: 0;
      height: 0;
      border-left: 55px solid transparent;
      border-right: 55px solid transparent;
      border-bottom: 45px solid #8b0000;
    }

    .house span {
      position: relative;
      z-index: 2;
      color: white;
    }

    .player {
      position: absolute;
      left: 60px;
      top: 480px;
      width: 42px;
      height: 42px;
      background: crimson;
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      border: 3px solid white;
      box-shadow: 0 3px 8px rgba(0,0,0,0.3);
      transform: translate(-50%, -120%);
      transition: left 0.5s ease, top 0.5s ease;
      z-index: 10;
    }

    #status {
      font-weight: bold;
    }
  </style>
</head>

<body>
  <h1>Book Progress Map</h1>

  <p>Marine is at chapter: <span id="marineChapter">Loading...</span></p>
  <p id="status">Connecting to Firebase...</p>

  <div class="map" id="map">
    <div class="path"></div>

    <div class="house"><span>Home</span></div>

    <div class="chapter" style="left: 90px; top: 430px;">Chap 1</div>
    <div class="chapter" style="left: 180px; top: 370px;">Chap 2</div>
    <div class="chapter" style="left: 270px; top: 320px;">Chap 3</div>
    <div class="chapter" style="left: 360px; top: 270px;">Chap 4</div>
    <div class="chapter" style="left: 450px; top: 220px;">Chap 5</div>
    <div class="chapter" style="left: 540px; top: 250px;">Chap 6</div>
    <div class="chapter" style="left: 630px; top: 300px;">Chap 7</div>
    <div class="chapter" style="left: 720px; top: 230px;">Chap 8</div>
    <div class="chapter" style="left: 800px; top: 160px;">Chap 9</div>

    <div class="player" id="marineMarker">🦖</div>
  </div>

  <script type="module">
    import { db } from "./firebase.js";
    import { doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const marineMarker = document.getElementById("marineMarker");
    const marineChapter = document.getElementById("marineChapter");
    const status = document.getElementById("status");

    const chapterPositions = {
      0: { x: 60, y: 480 },
      1: { x: 90, y: 430 },
      2: { x: 180, y: 370 },
      3: { x: 270, y: 320 },
      4: { x: 360, y: 270 },
      5: { x: 450, y: 220 },
      6: { x: 540, y: 250 },
      7: { x: 630, y: 300 },
      8: { x: 720, y: 230 },
      9: { x: 800, y: 160 }
    };

    function moveMarineToChapter(chapter) {
      const position = chapterPositions[chapter];

      if (!position) {
        status.textContent = "No position for chapter " + chapter;
        return;
      }

      marineMarker.style.left = position.x + "px";
      marineMarker.style.top = position.y + "px";
    }

    const marineRef = doc(db, "firstbingo", "marine");

    onSnapshot(
      marineRef,
      (docSnap) => {
        if (!docSnap.exists()) {
          marineChapter.textContent = "0";
          status.textContent = "Marine not found in Firebase, showing Home.";
          moveMarineToChapter(0);
          return;
        }

        const data = docSnap.data();
        const chapter = Number(data.chapterProgress ?? 0);

        console.log("Marine data:", data);
        console.log("Chapter:", chapter);

        marineChapter.textContent = chapter;
        status.textContent = "Connected to Firebase.";
        moveMarineToChapter(chapter);
      },
      (error) => {
        console.error("Firebase error:", error);
        marineChapter.textContent = "error";
        status.textContent = "Firebase error. Check console.";
        moveMarineToChapter(0);
      }
    );
  </script>
</body>
</html>
