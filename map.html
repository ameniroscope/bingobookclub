<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  min-height: 100%;
}

body {
  background: #0d0a0e;
  color: #c8b89a;
  font-family: Georgia, serif;
  text-align: center;
}

.map {
  position: relative;
  height: 90vh;
  width: fit-content;
  max-width: 95vw;
  margin: 5vh auto;
  border: 2px solid #c9a84c;
  border-radius: 15px;
  overflow: hidden;
}

.map-image {
  height: 100%;
  width: auto;
  max-width: 95vw;
  display: block;
  object-fit: contain;
}

.player {
  position: absolute;
  width: 48px;
  height: 48px;
  background: transparent;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.7rem;
  filter: drop-shadow(0 0 6px rgba(201,168,76,0.7))
          drop-shadow(0 0 12px rgba(201,168,76,0.45));
  animation: glowPulse 3s ease-in-out infinite;
  transform: translate(-50%, -120%);
  transition: left 0.6s ease, top 0.6s ease;
  z-index: 10;
}

@keyframes glowPulse {
  0%, 100% {
    filter: drop-shadow(0 0 6px rgba(201,168,76,0.7))
            drop-shadow(0 0 12px rgba(201,168,76,0.45));
  }

  50% {
    filter: drop-shadow(0 0 10px rgba(201,168,76,1))
            drop-shadow(0 0 20px rgba(201,168,76,0.7));
  }
}
</style>
</head>

<body>

<div id="status" style="display:none;"></div>

<div class="map">
  <img src="map.png" class="map-image" alt="Book map">
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAIQTe-QGQmwqTVmIyJZZ_qlDNsD6GUskY",
  authDomain: "bingobookclub-2144e.firebaseapp.com",
  projectId: "bingobookclub-2144e",
  storageBucket: "bingobookclub-2144e.firebasestorage.app",
  messagingSenderId: "294177836341",
  appId: "1:294177836341:web:6d5f11e64737fbe3aad07c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const map = document.querySelector(".map");
const status = document.getElementById("status");

const positions = {
  0: { x: 13.8, y: 22.3 },
  1: { x: 33.7, y: 23.3 },
  2: { x: 48.4, y: 23.3 },
  3: { x: 63.2, y: 23.3 },
  4: { x: 77.6, y: 23.4 },
  5: { x: 90.7, y: 28.3 },
  6: { x: 77.6, y: 32.2 },
  7: { x: 63.2, y: 32.4 },
  8: { x: 49.4, y: 32.2 },
  9: { x: 35.7, y: 32.0 },
  10: { x: 21.6, y: 31.7 },
  11: { x: 12.0, y: 40.3 },
  12: { x: 25.1, y: 40.8 },
  13: { x: 39.0, y: 40.8 },
  14: { x: 52.9, y: 40.8 },
  15: { x: 67.3, y: 40.8 },
  16: { x: 80.7, y: 40.6 },
  17: { x: 91.0, y: 46.2 },
  18: { x: 81.2, y: 49.2 },
  19: { x: 68.0, y: 49.6 },
  20: { x: 55.9, y: 48.7 },
  21: { x: 42.6, y: 49.2 },
  22: { x: 27.9, y: 49.2 },
  23: { x: 18.3, y: 57.1 },
  24: { x: 33.2, y: 57.0 },
  25: { x: 47.6, y: 57.3 },
  26: { x: 61.7, y: 57.1 },
  27: { x: 76.1, y: 57.3 },
  28: { x: 91.0, y: 62.9 },
  29: { x: 79.1, y: 65.4 },
  30: { x: 66.3, y: 65.6 },
  31: { x: 53.2, y: 66.2 },
  32: { x: 39.8, y: 66.1 },
  33: { x: 26.2, y: 65.9 },
  34: { x: 18.1, y: 74.3 },
  35: { x: 33.0, y: 74.7 },
  36: { x: 46.8, y: 74.7 },
  37: { x: 61.2, y: 74.3 },
  38: { x: 73.6, y: 74.5 },
  39: { x: 89.5, y: 79.9 },
  40: { x: 40.0, y: 83.1 },
  41: { x: 26.4, y: 83.4 },
  42: { x: 13.5, y: 89.3 }
};

const playerEmojis = {
  marine: "🧜‍♀️",
  elana: "🐉",
  kathi: "🍄",
  lena: "🌙"
};

const offsets = [
  { x: 0, y: 0 },
  { x: 2.2, y: 0 },
  { x: -2.2, y: 0 },
  { x: 0, y: 2.2 },
  { x: 0, y: -2.2 },
  { x: 2.2, y: 2.2 },
  { x: -2.2, y: 2.2 },
  { x: 2.2, y: -2.2 },
  { x: -2.2, y: -2.2 }
];

function getOrCreatePlayerMarker(playerId) {
  let marker = document.getElementById("player-" + playerId);

  if (!marker) {
    marker = document.createElement("div");
    marker.className = "player";
    marker.id = "player-" + playerId;
    marker.textContent = playerEmojis[playerId] || "✨";
    map.appendChild(marker);
  }

  return marker;
}

function movePlayer(playerId, chapter, indexInChapter) {
  const marker = getOrCreatePlayerMarker(playerId);
  const position = positions[chapter] || positions[0];
  const offset = offsets[indexInChapter] || { x: 0, y: 0 };

  marker.style.left = position.x + offset.x + "%";
  marker.style.top = position.y + offset.y + "%";
  marker.title = playerId + " — chapter " + chapter;
}

const playersRef = collection(db, "first_bingo");

onSnapshot(
  playersRef,
  (snapshot) => {
    status.textContent = "Connected";

    const chapterGroups = {};

    snapshot.forEach((docSnap) => {
      const playerId = docSnap.id;
      const data = docSnap.data();
      const chapter = Number(data.chapterProgress ?? 0);

      if (!chapterGroups[chapter]) {
        chapterGroups[chapter] = [];
      }

      chapterGroups[chapter].push(playerId);
    });

    Object.keys(chapterGroups).forEach((chapter) => {
      chapterGroups[chapter].forEach((playerId, index) => {
        movePlayer(playerId, Number(chapter), index);
      });
    });
  },
  (error) => {
    console.error("Firebase error:", error);
    status.textContent = "Firebase error";
  }
);

map.addEventListener("click", (e) => {
  const rect = map.getBoundingClientRect();

  const x = ((e.clientX - rect.left) / rect.width * 100).toFixed(1);
  const y = ((e.clientY - rect.top) / rect.height * 100).toFixed(1);

  console.log(`{ x: ${x}, y: ${y} }`);

  const dot = document.createElement("div");
  dot.style.position = "absolute";
  dot.style.left = x + "%";
  dot.style.top = y + "%";
  dot.style.width = "10px";
  dot.style.height = "10px";
  dot.style.background = "red";
  dot.style.borderRadius = "50%";
  dot.style.transform = "translate(-50%, -50%)";
  dot.style.zIndex = "9999";

  map.appendChild(dot);
});
</script>

</body>
</html>
