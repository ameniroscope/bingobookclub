<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Book Progress Map</title>

<style>
body{background:#0d0a0e;color:#c8b89a;font-family:Georgia,serif;text-align:center;}
.map{
  position:relative;
  width:min(95vw, 900px);
  margin:20px auto;
  border:2px solid #c9a84c;
  border-radius:15px;
  overflow:hidden;
}

.map-image{
  width:100%;
  display:block;
}
.chapter{position:absolute;background:#111;border:1px solid #c9a84c;padding:5px;border-radius:6px;color:#f0e6c8;transform:translate(-50%,-50%);}
.player {
  position: absolute;
  width: 48px;
  height: 48px;

  /* ❌ remove circle background */
  background: transparent;

  /* emoji centered */
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.6rem;

  /* ✨ faint magical glow */
  filter: drop-shadow(0 0 6px rgba(201,168,76,0.6))
          drop-shadow(0 0 12px rgba(201,168,76,0.4));

  /* optional soft pulse */
  animation: glowPulse 3s ease-in-out infinite;

  transform: translate(-50%, -120%);
  transition: left 0.6s ease, top 0.6s ease;
  z-index: 10;
}
</style>
</head>

<body>

<h1>Book Progress Map</h1>

<div class="map">
  <img src="map.png" class="map-image">
</div>

<!-- 🔥 Firebase (ALL IN ONE FILE) -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* 🔴 PASTE YOUR REAL CONFIG HERE */
const firebaseConfig = {
  apiKey: "AIzaSyAIQTe-QGQmwqTVmIyJZZ_qlDNsD6GUskY",
  authDomain: "bingobookclub-2144e.firebaseapp.com",
  projectId: "bingobookclub-2144e",
  storageBucket: "bingobookclub-2144e.firebasestorage.app",
  messagingSenderId: "294177836341",
  appId: "1:294177836341:web:6d5f11e64737fbe3aad07c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const status = document.getElementById("status");

const positions = {
  0:{x:8,y:20},   // START

  1:{x:20,y:22},
  2:{x:35,y:22},
  3:{x:50,y:22},
  4:{x:65,y:22},
  5:{x:80,y:26},

  6:{x:75,y:38},
  7:{x:60,y:38},
  8:{x:45,y:38},
  9:{x:30,y:38},
  10:{x:15,y:38},

  11:{x:10,y:50},
  12:{x:25,y:50},
  13:{x:40,y:50},
  14:{x:55,y:50},
  15:{x:70,y:50},
  16:{x:85,y:50},

  17:{x:88,y:60},
  18:{x:75,y:62},
  19:{x:60,y:62},
  20:{x:45,y:62},
  21:{x:30,y:62},
  22:{x:15,y:62},

  23:{x:12,y:72},
  24:{x:28,y:72},
  25:{x:44,y:72},
  26:{x:60,y:72},
  27:{x:76,y:72},

  28:{x:88,y:80},
  29:{x:75,y:82},
  30:{x:60,y:82},
  31:{x:45,y:82},
  32:{x:30,y:82},
  33:{x:15,y:82},

  34:{x:12,y:90},
  35:{x:28,y:90},
  36:{x:44,y:90},
  37:{x:60,y:90},
  38:{x:76,y:90},

  39:{x:90,y:95},
  40:{x:55,y:96},
  41:{x:30,y:96}
};

const playerEmojis = {
  marine: "🧜‍♀️",
  elana: "🐉",
  kathi: "🍄",
  lena: "🌙"
};

const map = document.querySelector(".map");

function getOrCreatePlayerMarker(playerId) {
  let marker = document.getElementById("player-" + playerId);

  if (!marker) {
    marker = document.createElement("div");
    marker.className = "player";
    marker.id = "player-" + playerId;
    marker.textContent = playerEmojis[playerId] || "✨";
    map.appendChild(marker);
  }

  return marker;
}

function movePlayer(playerId, chapter, indexInChapter) {
  const marker = getOrCreatePlayerMarker(playerId);
  const p = positions[chapter] || positions[0];

  const offsets = [
    { x: 0, y: 0 },
    { x: 2.2, y: 0 },
    { x: -2.2, y: 0 },
    { x: 0, y: 2.2 },
    { x: 0, y: -2.2 },
    { x: 2.2, y: 2.2 },
    { x: -2.2, y: 2.2 },
    { x: 2.2, y: -2.2 },
    { x: -2.2, y: -2.2 }
  ];

  const offset = offsets[indexInChapter] || { x: 0, y: 0 };

  const finalX = p.x + offset.x;
  const finalY = p.y + offset.y;

  marker.style.left = finalX + "%";
  marker.style.top = finalY + "%";
  marker.title = playerId + " — chapter " + chapter;
}

  const offset = offsets[indexInChapter] || {
    x: (indexInChapter % 3) * 28,
    y: Math.floor(indexInChapter / 3) * 28
  };

  marker.style.left = finalX + "%";
  marker.style.top = finalY + "%";
  marker.title = playerId + " — chapter " + chapter;
}

const playersRef = collection(db, "first_bingo");

onSnapshot(
  playersRef,
  (snapshot) => {
    status.textContent = "Connected ✅";

    const chapterGroups = {};

    snapshot.forEach((docSnap) => {
      const playerId = docSnap.id;
      const data = docSnap.data();
      const chapter = Number(data.chapterProgress ?? 0);

      if (!chapterGroups[chapter]) {
        chapterGroups[chapter] = [];
      }

      chapterGroups[chapter].push(playerId);
    });

    Object.keys(chapterGroups).forEach((chapter) => {
      chapterGroups[chapter].forEach((playerId, index) => {
        movePlayer(playerId, Number(chapter), index);
      });
    });
  },
  (error) => {
    console.error(error);
    status.textContent = "Firebase error ❌";
  }
);

  document.addEventListener("click", (e)=>{
  const rect = document.querySelector(".map").getBoundingClientRect();
  const x = ((e.clientX - rect.left)/rect.width*100).toFixed(1);
  const y = ((e.clientY - rect.top)/rect.height*100).toFixed(1);
  console.log(`x:${x}, y:${y}`);
});
  
</script>

</body>
</html>
