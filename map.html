<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://www.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://firestore.googleapis.com https://firebaseinstallations.googleapis.com https://*.googleapis.com https://*.firebaseio.com https://*.firebaseapp.com wss://*.firebaseio.com;">

<title>Book Progress Map — The Bingo Book Club</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap');

*{box-sizing:border-box;margin:0;padding:0;}
html{font-size:20px;}
html,body{
  background:#0d0a0e;
  font-family:'Crimson Text',Georgia,serif;
  min-height:100vh;
  width:100%;
  overflow-x:hidden;
  color:#c8b89a;
}

.stars,.floating-books{position:fixed;inset:0;pointer-events:none;z-index:0;}
.star{position:absolute;background:#c9a84c;border-radius:50%;animation:twinkle var(--d) ease-in-out infinite;animation-delay:var(--delay);}
@keyframes twinkle{0%,100%{opacity:0.1;}50%{opacity:0.8;}}

.book{position:absolute;font-size:var(--size);animation:float var(--fd) ease-in-out infinite;animation-delay:var(--fdelay);opacity:0.07;}
@keyframes float{0%,100%{transform:translateY(0) rotate(var(--r));}50%{transform:translateY(-20px) rotate(calc(var(--r) + 5deg));}}

.page{
  position:relative;
  z-index:1;
  min-height:100vh;
  padding:2rem 1rem 5rem;
  text-align:center;
}

.title{
  font-family:'Cinzel',serif;
  font-size:clamp(1.8rem,7vw,3rem);
  color:transparent;
  background:linear-gradient(135deg,#c9a84c,#f0e6c8,#c9a84c88);
  -webkit-background-clip:text;
  background-clip:text;
  letter-spacing:3px;
  margin-bottom:0.5rem;
}

.subtitle{
  font-family:'Cinzel',serif;
  font-size:0.65rem;
  letter-spacing:3px;
  color:#c9a84c;
  text-transform:uppercase;
  margin-bottom:0.8rem;
}

.status{
  margin-bottom:1.2rem;
  color:#c8b89a;
  font-size:0.9rem;
}

.status strong{
  color:#f0e6c8;
}

.map{
  position:relative;
  width:min(95vw,900px);
  height:550px;
  margin:0 auto;
  border:1px solid #c9a84c66;
  border-radius:18px;
  background:
    radial-gradient(circle at 50% 20%,rgba(201,168,76,0.11),transparent 45%),
    linear-gradient(145deg,#171019,#0d0a0e);
  box-shadow:0 0 30px rgba(201,168,76,0.13);
  overflow:hidden;
}

.map::before{
  content:"";
  position:absolute;
  inset:18px;
  border:1px solid #c9a84c22;
  border-radius:14px;
  pointer-events:none;
}

.path{
  position:absolute;
  left:85px;
  top:275px;
  width:730px;
  border-top:4px dashed #c9a84c66;
  transform:rotate(-16deg);
}

.chapter{
  position:absolute;
  width:115px;
  padding:0.45rem 0.3rem;
  background:rgba(13,10,14,0.9);
  border:1px solid #c9a84c88;
  color:#f0e6c8;
  border-radius:8px;
  text-align:center;
  font-family:'Cinzel',serif;
  font-size:0.58rem;
  letter-spacing:1px;
  transform:translate(-50%,-50%);
  box-shadow:0 0 14px rgba(201,168,76,0.13);
}

.house{
  position:absolute;
  left:60px;
  top:480px;
  width:95px;
  height:70px;
  background:rgba(201,168,76,0.16);
  border:1px solid #c9a84c99;
  border-radius:8px;
  transform:translate(-50%,-50%);
  display:flex;
  align-items:end;
  justify-content:center;
  padding-bottom:0.45rem;
  color:#f0e6c8;
  font-family:'Cinzel',serif;
  font-size:0.58rem;
}

.house::before{
  content:"";
  position:absolute;
  top:-42px;
  left:-8px;
  width:0;
  height:0;
  border-left:55px solid transparent;
  border-right:55px solid transparent;
  border-bottom:45px solid #7b1720;
}

.house::after{
  content:"🏠";
  position:absolute;
  top:-25px;
  font-size:2rem;
}

.player{
  position:absolute;
  left:60px;
  top:480px;
  width:48px;
  height:48px;
  background:radial-gradient(circle,#c9a84c,#7b1720);
  color:white;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:1.25rem;
  border:2px solid #f0e6c8;
  box-shadow:0 0 18px rgba(201,168,76,0.55);
  transform:translate(-50%,-120%);
  transition:left 0.6s ease, top 0.6s ease;
  z-index:10;
}

.home-btn{
  position:fixed;
  bottom:1.2rem;
  left:1.2rem;
  z-index:1000;
  display:flex;
  align-items:center;
  gap:0.45rem;
  padding:0.55rem 0.9rem;
  font-family:'Cinzel',serif;
  font-size:0.55rem;
  letter-spacing:1.5px;
  text-transform:uppercase;
  text-decoration:none;
  border-radius:6px;
  background:rgba(13,10,14,0.85);
  border:1px solid #c9a84c55;
  color:#c9a84ccc;
}

.home-btn:hover{
  border-color:#c9a84c;
  color:#f0e6c8;
  box-shadow:0 0 16px rgba(201,168,76,0.2);
}
</style>
</head>

<body>

<div class="stars" id="stars"></div>
<div class="floating-books" id="floatingBooks"></div>

<div class="page">
  <h1 class="title">Book Progress Map</h1>
  <div class="subtitle">The Bingo Book Club</div>

  <p class="status">
    Marine is at chapter: <strong id="marineChapter">Loading...</strong>
  </p>
  <p class="status" id="status">Connecting to Firebase...</p>

  <div class="map">
    <div class="path"></div>

    <div class="house">Home</div>

    <div class="chapter" style="left:90px; top:430px;">Chap 1</div>
    <div class="chapter" style="left:180px; top:370px;">Chap 2</div>
    <div class="chapter" style="left:270px; top:320px;">Chap 3</div>
    <div class="chapter" style="left:360px; top:270px;">Chap 4</div>
    <div class="chapter" style="left:450px; top:220px;">Chap 5</div>
    <div class="chapter" style="left:540px; top:250px;">Chap 6</div>
    <div class="chapter" style="left:630px; top:300px;">Chap 7</div>
    <div class="chapter" style="left:720px; top:230px;">Chap 8</div>
    <div class="chapter" style="left:800px; top:160px;">Chap 9</div>

    <div class="player" id="marineMarker">🦖</div>
  </div>
</div>

<a class="home-btn" href="index.html">🏠 Home</a>

<script>
const starsEl = document.getElementById('stars');
for(let i = 0; i < 70; i++){
  const s = document.createElement('div');
  s.className = 'star';
  const size = Math.random() > 0.85 ? 3 : 2;
  s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;width:${size}px;height:${size}px;--d:${2+Math.random()*4}s;--delay:${Math.random()*4}s;`;
  starsEl.appendChild(s);
}

const bookEmojis = ['📖','📚','🕯️','✨','🌙','⚔️','🗡️','🌹','♟️','🔮'];
const booksEl = document.getElementById('floatingBooks');
for(let i = 0; i < 10; i++){
  const b = document.createElement('div');
  b.className = 'book';
  b.textContent = bookEmojis[i % bookEmojis.length];
  const rot = (Math.random()*30 - 15).toFixed(1);
  b.style.cssText = `left:${Math.random()*90}%;top:${Math.random()*90}%;--size:${1.3+Math.random()*1.2}rem;--fd:${4+Math.random()*4}s;--fdelay:${Math.random()*4}s;--r:${rot}deg;`;
  booksEl.appendChild(b);
}
</script>

<script type="module">
import { db } from "./firebase.js";
import { doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const marineMarker = document.getElementById("marineMarker");
const marineChapter = document.getElementById("marineChapter");
const status = document.getElementById("status");

const chapterPositions = {
  0: { x: 60, y: 480 },
  1: { x: 90, y: 430 },
  2: { x: 180, y: 370 },
  3: { x: 270, y: 320 },
  4: { x: 360, y: 270 },
  5: { x: 450, y: 220 },
  6: { x: 540, y: 250 },
  7: { x: 630, y: 300 },
  8: { x: 720, y: 230 },
  9: { x: 800, y: 160 }
};

function moveMarineToChapter(chapter) {
  const position = chapterPositions[chapter];

  if (!position) {
    status.textContent = "No position for chapter " + chapter;
    return;
  }

  marineMarker.style.left = position.x + "px";
  marineMarker.style.top = position.y + "px";
}

const marineRef = doc(db, "firstbingo", "marine");

onSnapshot(
  marineRef,
  (docSnap) => {
    if (!docSnap.exists()) {
      marineChapter.textContent = "0";
      status.textContent = "Marine not found, showing Home.";
      moveMarineToChapter(0);
      return;
    }

    const data = docSnap.data();
    const chapter = Number(data.chapterProgress ?? 0);

    marineChapter.textContent = chapter;
    status.textContent = "Connected to Firebase.";
    moveMarineToChapter(chapter);
  },
  (error) => {
    console.error("Firebase error:", error);
    marineChapter.textContent = "error";
    status.textContent = "Firebase error. Check console.";
    moveMarineToChapter(0);
  }
);
</script>

</body>
</html>
