<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Book Progress Map</title>

<style>
body{background:#0d0a0e;color:#c8b89a;font-family:Georgia,serif;text-align:center;}
.map{position:relative;width:900px;height:550px;margin:20px auto;border:2px solid #c9a84c;border-radius:15px;}
.chapter{position:absolute;background:#111;border:1px solid #c9a84c;padding:5px;border-radius:6px;color:#f0e6c8;transform:translate(-50%,-50%);}
.player{position:absolute;width:45px;height:45px;border-radius:50%;background:#c9a84c;color:black;display:flex;align-items:center;justify-content:center;font-size:20px;transform:translate(-50%,-120%);transition:0.5s;}
</style>
</head>

<body>

<h1>Book Progress Map</h1>
<p id="status">Connecting...</p>

<div class="map">
  <div class="chapter" style="left:60px;top:480px;">🏠 Home</div>
  <div class="chapter" style="left:90px;top:430px;">1</div>
  <div class="chapter" style="left:180px;top:370px;">2</div>
  <div class="chapter" style="left:270px;top:320px;">3</div>
  <div class="chapter" style="left:360px;top:270px;">4</div>
  <div class="chapter" style="left:450px;top:220px;">5</div>
  <div class="chapter" style="left:540px;top:250px;">6</div>
  <div class="chapter" style="left:630px;top:300px;">7</div>
  <div class="chapter" style="left:720px;top:230px;">8</div>
  <div class="chapter" style="left:800px;top:160px;">9</div>

  <div class="player" id="marineMarker">🦖</div>
</div>

<!-- 🔥 Firebase (ALL IN ONE FILE) -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* 🔴 PASTE YOUR REAL CONFIG HERE */
const firebaseConfig = {
  apiKey: "AIzaSyAIQTe-QGQmwqTVmIyJZZ_qlDNsD6GUskY",
  authDomain: "bingobookclub-2144e.firebaseapp.com",
  projectId: "bingobookclub-2144e",
  storageBucket: "bingobookclub-2144e.firebasestorage.app",
  messagingSenderId: "294177836341",
  appId: "1:294177836341:web:6d5f11e64737fbe3aad07c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const status = document.getElementById("status");

const positions = {
  0:{x:60,y:480},
  1:{x:90,y:430},
  2:{x:180,y:370},
  3:{x:270,y:320},
  4:{x:360,y:270},
  5:{x:450,y:220},
  6:{x:540,y:250},
  7:{x:630,y:300},
  8:{x:720,y:230},
  9:{x:800,y:160}
};

const playerEmojis = {
  marine: "🧜‍♀️",
  elana: "🐉",
  kathi: "🍄",
  lena: "🌙"
};

const map = document.querySelector(".map");

function getOrCreatePlayerMarker(playerId) {
  let marker = document.getElementById("player-" + playerId);

  if (!marker) {
    marker = document.createElement("div");
    marker.className = "player";
    marker.id = "player-" + playerId;
    marker.textContent = playerEmojis[playerId] || "✨";
    map.appendChild(marker);
  }

  return marker;
}

function movePlayer(playerId, chapter) {
  const marker = getOrCreatePlayerMarker(playerId);
  const p = positions[chapter] || positions[0];

  marker.style.left = p.x + "px";
  marker.style.top = p.y + "px";
  marker.title = playerId + " — chapter " + chapter;
}

const playersRef = collection(db, "first_bingo");

onSnapshot(
  playersRef,
  (snapshot) => {
    status.textContent = "Connected ✅";

    snapshot.forEach((docSnap) => {
      const playerId = docSnap.id;
      const data = docSnap.data();
      const chapter = Number(data.chapterProgress ?? 0);

      movePlayer(playerId, chapter);
    });
  },
  (error) => {
    console.error(error);
    status.textContent = "Firebase error ❌";
  }
);
</script>

</body>
</html>
