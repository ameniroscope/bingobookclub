<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chapter Hub | The Bingo Book Club</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap');

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html,
body {
  background: #0d0a0e;
  font-family: 'Crimson Text', Georgia, serif;
  min-height: 100vh;
  color: #f0e6c8;
}

.layout {
  min-height: 100vh;
  max-width: 1250px;
  margin: 0 auto;
  padding: 3rem 1.4rem;
  display: grid;
  grid-template-columns: 420px 1fr;
  gap: 2rem;
  align-items: start;
}

.map-column {
  position: sticky;
  top: 3rem;
  display: flex;
  justify-content: center;
  padding-top: 10.4rem;
}

.map {
  position: relative;
  width: 100%;
  max-width: 420px;
  border: 2px solid #c9a84c;
  border-radius: 15px;
  overflow: hidden;
  background: #0d0a0e;
  box-shadow: 0 0 18px rgba(201,168,76,0.16);
}

.map-image {
  width: 100%;
  height: auto;
  display: block;
}

.player {
  position: absolute;
  width: 34px;
  height: 34px;
  background: transparent;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.35rem;
  filter:
    drop-shadow(0 0 6px rgba(201,168,76,0.7))
    drop-shadow(0 0 12px rgba(201,168,76,0.45));
  animation: glowPulse 3s ease-in-out infinite;
  transform: translate(-50%, -120%);
  transition: left 0.6s ease, top 0.6s ease;
  z-index: 10;
}

@keyframes glowPulse {
  0%, 100% {
    filter:
      drop-shadow(0 0 6px rgba(201,168,76,0.7))
      drop-shadow(0 0 12px rgba(201,168,76,0.45));
  }

  50% {
    filter:
      drop-shadow(0 0 10px rgba(201,168,76,1))
      drop-shadow(0 0 20px rgba(201,168,76,0.7));
  }
}

.page {
  text-align: center;
}

.club-title {
  font-family: 'Cinzel', serif;
  font-size: 0.72rem;
  letter-spacing: 6px;
  color: #c9a84c88;
  text-transform: uppercase;
  margin-bottom: 0.35rem;
}

.main-title {
  font-family: 'Cinzel', serif;
  font-size: clamp(2rem, 5vw, 3.3rem);
  font-weight: 700;
  color: #f0e6c8;
  letter-spacing: 2px;
}

.ornament {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  width: 100%;
  max-width: 18rem;
  margin: 1rem auto;
}

.line {
  flex: 1;
  height: 1px;
  background: linear-gradient(to right, transparent, #c9a84c55, transparent);
}

.gem {
  color: #c9a84c;
  font-size: 0.6rem;
}

.message {
  max-width: 34rem;
  margin: 0 auto 1.2rem;
}

.message p {
  font-size: 0.88rem;
  color: #c8b89a;
  line-height: 1.9;
}

.message p + p {
  margin-top: 0.6rem;
}

.message em {
  color: #f0e6c8;
  font-style: italic;
}

.user-panel {
  max-width: 700px;
  margin: 0 auto 1.4rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 0.8rem;
  padding: 0.8rem;
  border: 1px solid #c9a84c44;
  border-radius: 10px;
  background: rgba(26,15,31,0.88);
}

.user-badge {
  font-family: 'Cinzel', serif;
  font-size: 0.75rem;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: #f0e6c8;
}

.logout-btn {
  min-height: 40px;
  padding: 0 1rem;
  font-family: 'Cinzel', serif;
  text-transform: uppercase;
  border-radius: 6px;
  cursor: pointer;
  background: #1a0f1f;
  border: 1px solid #c9a84c33;
  color: #f5ecd9;
  letter-spacing: 2px;
}

.legend {
  max-width: 700px;
  margin: 0 auto 1rem;
  display: flex;
  justify-content: center;
  gap: 1rem;
  flex-wrap: wrap;
  color: #c8b89a;
  font-size: 0.9rem;
}

.legend span {
  display: flex;
  align-items: center;
  gap: 0.35rem;
}

.dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  display: inline-block;
}

.dot.normal {
  background: #1f3a36;
}

.dot.my-comment {
  background: #1a0f1f;
}

.dot.they-comment {
  background: #b76b03;
}

.buttons {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 0.6rem;
  max-width: 700px;
  margin: 0 auto;
}

.btn {
  height: 58px;
  display: flex;
  align-items: center;
  justify-content: center;
  text-decoration: none;
  border-radius: 6px;
  background: #1f3a36;
  border: 1px solid #c9a84c55;
  color: #f5ecd9;
  font-family: 'Cinzel', serif;
  font-size: 0.75rem;
  letter-spacing: 1.5px;
  transition: all 0.25s ease;
  box-shadow: 0 0 8px rgba(201,168,76,0.12);
}

.btn:hover {
  background: #2c4f49;
  border-color: #c9a84c55;
  box-shadow: 0 0 12px rgba(201,168,76,0.28);
  transform: translateY(-1px);
}

.btn.my-comment {
  background: #1a0f1f;
  border-color: #c9a84c;
  color: #f5ecd9;
  box-shadow: 0 0 14px rgba(90,51,122,0.55);
}

.btn.they-comment {
  background: #b76b03;
  border-color: #c9a84c;
  color: #fff3dd;
  box-shadow: 0 0 14px rgba(183,107,3,0.5);
}

.footer {
  margin-top: 2.2rem;
  font-family: 'Cinzel', serif;
  font-size: 0.45rem;
  letter-spacing: 2px;
  color: #c9a84cbb;
  text-transform: uppercase;
}

.home-btn {
  position: fixed;
  bottom: 1.2rem;
  left: 1.2rem;
  z-index: 1000;
  display: flex;
  align-items: center;
  gap: 0.45rem;
  padding: 0.55rem 0.9rem;
  font-family: 'Cinzel', serif;
  font-size: 0.55rem;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  text-decoration: none;
  border-radius: 6px;
  background: rgba(13,10,14,0.85);
  border: 1px solid #c9a84c55;
  color: #c9a84ccc;
  backdrop-filter: blur(6px);
  transition: all 0.25s;
}

.home-btn:hover {
  border-color: #c9a84c;
  color: #f0e6c8;
  background: rgba(13,10,14,0.95);
  box-shadow: 0 0 16px rgba(201,168,76,0.2);
}

.home-btn-icon {
  font-size: 0.85rem;
}

  .bottom-center {
  width: 100%;
  text-align: center;
  margin: 0 auto 2.5rem;
}

.bottom-center .ornament {
  margin: 1rem auto;
}

@media (max-width: 900px) {
  .layout {
    grid-template-columns: 1fr;
    max-width: 760px;
  }

.map-column {
  position: static;
  max-width: 430px;
  width: 100%;
  margin: 0 auto;
  padding-top: 0;
}
}

@media (max-width: 700px) {
  .layout {
    padding: 1.4rem 1rem 2.5rem;
    gap: 1.4rem;
  }

  .buttons {
    grid-template-columns: repeat(3, 1fr);
  }

  .user-panel {
    flex-direction: column;
    align-items: stretch;
  }

  .logout-btn {
    width: 100%;
  }

  .player {
    width: 28px;
    height: 28px;
    font-size: 1.15rem;
  }
}

@media (max-width: 400px) {
  .buttons {
    grid-template-columns: repeat(2, 1fr);
  }

  .btn {
    height: 54px;
    font-size: 0.7rem;
  }
}
</style>
</head>

<body>

<div class="layout">

  <aside class="map-column">
    <div id="status" style="display:none;"></div>

    <div class="map">
      <img src="map.png" class="map-image" alt="Book map">
    </div>
  </aside>

  <main class="page">

    <div class="club-title">Spoiler-Safe</div>
    <div class="main-title">Chapter Rooms</div>

    <div class="ornament">
      <div class="line"></div>
      <div class="gem">◆</div>
      <div class="line"></div>
    </div>

    <div class="message">
      <p>A room for every chapter and a space for every thought — big or small.</p>
      <p>No need to scream into the void… we’re all here to listen.</p>
    </div>

    <div class="user-panel">
      <div class="user-badge" id="loggedInText">Not logged in</div>
      <button class="logout-btn" id="logoutBtn" type="button">Log out</button>
    </div>

    <div class="legend">
      <span><i class="dot normal"></i> No comments</span>
      <span><i class="dot my-comment"></i> You commented</span>
      <span><i class="dot they-comment"></i> They commented</span>
    </div>

    <div class="buttons" id="chapterButtons"></div>

  </main>

</div>
  
  <div class="bottom-center">

  <div class="ornament">
    <div class="line"></div>
    <div class="gem">◆</div>
    <div class="line"></div>
  </div>

  <div class="footer">✦ &nbsp; The Bingo Book Club &nbsp; ✦</div>
</div>

<a class="home-btn" href="index.html">
  <span class="home-btn-icon">🏠</span>
  Home
</a>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAIQTe-QGQmwqTVmIyJZZ_qlDNsD6GUskY",
  authDomain: "bingobookclub-2144e.firebaseapp.com",
  projectId: "bingobookclub-2144e",
  storageBucket: "bingobookclub-2144e.firebasestorage.app",
  messagingSenderId: "294177836341",
  appId: "1:294177836341:web:6d5f11e64737fbe3aad07c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const totalChapters = 41;
const container = document.getElementById("chapterButtons");
const loggedInText = document.getElementById("loggedInText");
const logoutBtn = document.getElementById("logoutBtn");

const savedName = sessionStorage.getItem("bookClubName");

if (savedName) {
  loggedInText.textContent = "✦ Logged in as " + savedName;
  logoutBtn.style.display = "block";
} else {
  loggedInText.textContent = "Not logged in yet";
  logoutBtn.style.display = "none";
}

logoutBtn.addEventListener("click", () => {
  sessionStorage.removeItem("bookClubName");
  sessionStorage.removeItem("bookClubAvatar");
  sessionStorage.removeItem("bookClubColor");
  window.location.reload();
});

for (let i = 1; i <= totalChapters; i++) {
  const link = document.createElement("a");
  link.className = "btn";
  link.href = `chat.html?chapter=${i}`;
  link.textContent = `Chap ${i}`;
  link.id = `chapter-${i}-btn`;
  container.appendChild(link);
}

loadChapterHighlights();

function getChapterNumber(chapterValue) {
  if (!chapterValue) return null;

  return String(chapterValue)
    .replace("chapter-", "")
    .replace("chapter", "")
    .replace("Chap", "")
    .replace("chap", "")
    .trim();
}

async function loadChapterHighlights() {
  try {
    const snapshot = await getDocs(collection(db, "messages"));

    const chaptersWithMyComments = new Set();
    const chaptersWithOtherComments = new Set();

    snapshot.forEach((docSnap) => {
      const msg = docSnap.data();
      const chapterNumber = getChapterNumber(msg.chapter);

      if (!chapterNumber) return;

      if (savedName && msg.name === savedName) {
        chaptersWithMyComments.add(chapterNumber);
      } else {
        chaptersWithOtherComments.add(chapterNumber);
      }
    });

    for (let i = 1; i <= totalChapters; i++) {
      const button = document.getElementById(`chapter-${i}-btn`);
      const chapter = String(i);

      if (!button) continue;

      button.classList.remove("my-comment", "they-comment");

      if (chaptersWithMyComments.has(chapter)) {
        button.classList.add("my-comment");
      } else if (chaptersWithOtherComments.has(chapter)) {
        button.classList.add("they-comment");
      }
    }
  } catch (error) {
    console.error("Could not load chapter highlights:", error);
  }
}

/* MAP CODE */

const map = document.querySelector(".map");
const status = document.getElementById("status");

const positions = {
  0:  { x: 10.5, y: 20.5 }, // START

  // Row 1 — left to right
  1:  { x: 27.0, y: 20.5 },
  2:  { x: 42.5, y: 20.5 },
  3:  { x: 58.0, y: 20.5 },
  4:  { x: 73.5, y: 20.5 },

  // Curve right
  5:  { x: 87.0, y: 27.5 },

  // Row 2 — right to left
  6:  { x: 73.5, y: 33.5 },
  7:  { x: 58.0, y: 33.5 },
  8:  { x: 42.5, y: 33.5 },
  9:  { x: 27.0, y: 33.5 },
  10: { x: 11.5, y: 33.5 },

  // Row 3 — left to right
  11: { x: 9.5,  y: 46.5 },
  12: { x: 24.0, y: 46.5 },
  13: { x: 38.5, y: 46.5 },
  14: { x: 53.0, y: 46.5 },
  15: { x: 67.5, y: 46.5 },
  16: { x: 82.0, y: 46.5 },

  // Curve right
  17: { x: 88.5, y: 54.0 },

  // Row 4 — right to left
  18: { x: 75.0, y: 59.5 },
  19: { x: 60.5, y: 59.5 },
  20: { x: 46.0, y: 59.5 },
  21: { x: 31.5, y: 59.5 },
  22: { x: 17.0, y: 59.5 },

  // Row 5 — left to right
  23: { x: 10.5, y: 71.5 },
  24: { x: 25.5, y: 71.5 },
  25: { x: 40.5, y: 71.5 },
  26: { x: 55.5, y: 71.5 },
  27: { x: 70.5, y: 71.5 },

  // Curve right
  28: { x: 87.0, y: 78.0 },

  // Row 6 — right to left
  29: { x: 74.0, y: 83.5 },
  30: { x: 59.5, y: 83.5 },
  31: { x: 45.0, y: 83.5 },
  32: { x: 30.5, y: 83.5 },
  33: { x: 16.0, y: 83.5 },

  // Row 7 — left to right
  34: { x: 13.0, y: 94.5 },
  35: { x: 27.5, y: 94.5 },
  36: { x: 42.0, y: 94.5 },
  37: { x: 56.5, y: 94.5 },
  38: { x: 71.0, y: 94.5 },

  // Curve right
  39: { x: 86.5, y: 101.5 },

  // Row 8 — right to left
  40: { x: 36.5, y: 107.5 },
  41: { x: 22.0, y: 107.5 },

  // END
  42: { x: 9.5,  y: 115.0 },
};

const playerEmojis = {
  marine: "🧜‍♀️",
  elana: "🐉",
  kathi: "🍄",
  lena: "🌙"
};


const playerOffsets = {
  marine: {  x:  2.5, y:  2.5 },
  elana:  { x:  2.5, y: -2.5 },
  kathi:  { x: -2.5, y:  2.5 },
  lena:   { x:  2.5, y:  2.5 },
};

function getOrCreatePlayerMarker(playerId) {
  let marker = document.getElementById("player-" + playerId);

  if (!marker) {
    marker = document.createElement("div");
    marker.className = "player";
    marker.id = "player-" + playerId;
    marker.textContent = playerEmojis[playerId] || "✨";
    map.appendChild(marker);
  }

  return marker;
}


function movePlayer(playerId, chapter, indexInChapter) {
  const marker = getOrCreatePlayerMarker(playerId);
  const position = positions[chapter] || positions[0];
  const offset = playerOffsets[playerId] || { x: 0, y: 0 };

  marker.style.left = position.x + offset.x + "%";
  marker.style.top  = position.y + offset.y + "%";
  marker.title = playerId + " — chapter " + chapter;
}

const playersRef = collection(db, "first_bingo");

onSnapshot(
  playersRef,
  (snapshot) => {
    status.textContent = "Connected";

    const chapterGroups = {};

    snapshot.forEach((docSnap) => {
      const playerId = docSnap.id;
      const data = docSnap.data();
      const chapter = Number(data.chapterProgress ?? 0);

      if (!chapterGroups[chapter]) {
        chapterGroups[chapter] = [];
      }

      chapterGroups[chapter].push(playerId);
    });

    Object.keys(chapterGroups).forEach((chapter) => {
      chapterGroups[chapter].forEach((playerId, index) => {
        movePlayer(playerId, Number(chapter), index);
      });
    });
  },
  (error) => {
    console.error("Firebase error:", error);
    status.textContent = "Firebase error";
  }
);

/* Optional map coordinate helper */
map.addEventListener("click", (e) => {
  const rect = map.getBoundingClientRect();

  const x = (((e.clientX - rect.left) / rect.width) * 100).toFixed(1);
  const y = (((e.clientY - rect.top) / rect.height) * 100).toFixed(1);

  console.log(`{ x: ${x}, y: ${y} }`);
});
</script>

</body>
</html>
