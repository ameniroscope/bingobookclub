<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chapter Hub | The Bingo Book Club</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap');

*{box-sizing:border-box;margin:0;padding:0;}

html,body{
  background:#0d0a0e;
  font-family:'Crimson Text',Georgia,serif;
  min-height:100vh;
  color:#f0e6c8;
}

.page{
  min-height:100vh;
  max-width:900px;
  margin:0 auto;
  padding:3rem 1.4rem;
  text-align:center;
}

.club-title{
  font-family:'Cinzel',serif;
  font-size:0.72rem;
  letter-spacing:6px;
  color:#c9a84c88;
  text-transform:uppercase;
  margin-bottom:0.35rem;
}

.main-title{
  font-family:'Cinzel',serif;
  font-size:clamp(2rem,5vw,3.3rem);
  font-weight:700;
  color:#f0e6c8;
  letter-spacing:2px;
}

.title-rule{
  display:flex;
  align-items:center;
  gap:0.6rem;
  margin:1rem auto 1.3rem;
  max-width:30rem;
}

.line{
  flex:1;
  height:1px;
  background:linear-gradient(to right,transparent,#c9a84c55,transparent);
}

.gem{color:#c9a84c;}

.user-panel{
  max-width:700px;
  margin:0 auto 1.4rem;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:0.8rem;
  padding:0.8rem;
  border:1px solid #c9a84c44;
  border-radius:10px;
  background:rgba(26,15,31,0.88);
}

.user-badge{
  font-family:'Cinzel',serif;
  font-size:0.75rem;
  letter-spacing:1.5px;
  text-transform:uppercase;
  color:#f0e6c8;
}

.logout-btn{
  min-height:40px;
  padding:0 1rem;
  font-family:'Cinzel',serif;
  text-transform:uppercase;
  border-radius:6px;
  cursor:pointer;
  background:#1a0f1f;
  border:1px solid #c9a84c33;
  color:#f5ecd9;
  letter-spacing:2px;
}

.legend{
  max-width:700px;
  margin:0 auto 1rem;
  display:flex;
  justify-content:center;
  gap:1rem;
  flex-wrap:wrap;
  color:#c8b89a;
  font-size:0.9rem;
}

.legend span{
  display:flex;
  align-items:center;
  gap:0.35rem;
}

.dot{
  width:12px;
  height:12px;
  border-radius:50%;
  display:inline-block;
}

.dot.normal{background:#1f3a36;}
.dot.my-comment{background:#1a0f1f;}

.buttons{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:0.6rem;
  max-width:700px;
  margin:0 auto;
}

  .home-btn{
    max-width:260px;
    margin:2rem auto 0;
    min-height:55px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:0.5rem;
    font-family:'Cinzel',serif;
    text-transform:uppercase;
    text-decoration:none;
    border-radius:6px;
    background:#1a0f1f;
    border:1px solid #c9a84c33;
    color:#f5ecd9;
    letter-spacing:2px;
  }

.home-btn:hover{
  border-color:#c9a84c88;
  background:#24152b;
}

.btn{
  height:58px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
  border-radius:6px;
  background:#1f3a36;
  border:1px solid #c9a84c55;
  color:#f5ecd9;
  font-family:'Cinzel',serif;
  font-size:0.75rem;
  letter-spacing:1.5px;
  transition:all 0.25s ease;
  box-shadow:0 0 8px rgba(201,168,76,0.12);
}

.btn:hover{
  background:#2c4f49;
  border-color:#c9a84c55;
  box-shadow:0 0 12px rgba(201,168,76,0.28);
  transform:translateY(-1px);
}

.btn.my-comment{
  background:#1a0f1f;
  border-color:#c9a84c;
  color:#f5ecd9;
  box-shadow:0 0 14px rgba(90,51,122,0.55);
}

.back-link{
  max-width:260px;
  margin:2rem auto 0;
  min-height:55px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'Cinzel',serif;
  text-transform:uppercase;
  text-decoration:none;
  border-radius:6px;
  background:#1a0f1f;
  border:1px solid #c9a84c33;
  color:#f5ecd9;
  letter-spacing:2px;
}

.footer{
  margin-top:2rem;
  font-family:'Cinzel',serif;
  font-size:0.55rem;
  letter-spacing:2px;
  color:#c9a84cbb;
  text-transform:uppercase;
}

@media(max-width:700px){
  .buttons{
    grid-template-columns:repeat(3,1fr);
  }

  .user-panel{
    flex-direction:column;
    align-items:stretch;
  }

  .logout-btn{
    width:100%;
  }
}

@media(max-width:400px){
  .buttons{
    grid-template-columns:repeat(2,1fr);
  }

  .btn{
    height:54px;
    font-size:0.7rem;
  }
}
</style>
</head>

<body>

<div class="page">

  <div class="club-title">Spoiler-Safe</div>
  <div class="main-title">Chapter Rooms</div>

  <div class="title-rule">
    <div class="line"></div>
    <div class="gem">◆</div>
    <div class="line"></div>
  </div>

  <div class="user-panel">
    <div class="user-badge" id="loggedInText">Not logged in</div>
    <button class="logout-btn" id="logoutBtn" type="button">Log out</button>
  </div>

  <div class="legend">
    <span><i class="dot normal"></i> Not commented</span>
    <span><i class="dot my-comment"></i> You commented</span>
  </div>

  <div class="buttons" id="chapterButtons"></div>

  <div class="ornament">
    <div class="line"></div>
    <div class="gem">◆</div>
    <div class="line"></div>
</div>

<a class="home-btn" href="index.html">
    <span class="home-btn-icon">🏠</span> Home
</a>

<div class="footer">✦ Choose wisely · Spoilers stay sealed ✦</div>
</div>

<script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAIQTe-QGQmwqTVmIyJZZ_qlDNsD6GUskY",
  authDomain: "bingobookclub-2144e.firebaseapp.com",
  projectId: "bingobookclub-2144e",
  storageBucket: "bingobookclub-2144e.firebasestorage.app",
  messagingSenderId: "294177836341",
  appId: "1:294177836341:web:6d5f11e64737fbe3aad07c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const totalChapters = 41;
const container = document.getElementById("chapterButtons");
const loggedInText = document.getElementById("loggedInText");
const logoutBtn = document.getElementById("logoutBtn");

const savedName = sessionStorage.getItem("bookClubName");

if (savedName) {
  loggedInText.textContent = "✦ Logged in as " + savedName;
  logoutBtn.style.display = "block";
} else {
  loggedInText.textContent = "Not logged in yet";
  logoutBtn.style.display = "none";
}

logoutBtn.addEventListener("click", () => {
  sessionStorage.removeItem("bookClubName");
  sessionStorage.removeItem("bookClubAvatar");
  sessionStorage.removeItem("bookClubColor");
  window.location.reload();
});

for (let i = 1; i <= totalChapters; i++) {
  const link = document.createElement("a");
  link.className = "btn";
  link.href = `chat.html?chapter=${i}`;
  link.textContent = `Chap ${i}`;
  link.id = `chapter-${i}-btn`;
  container.appendChild(link);
}

loadChapterHighlights();

async function loadChapterHighlights() {
  if (!savedName) return;

  try {
    const snapshot = await getDocs(collection(db, "messages"));

    snapshot.forEach((docSnap) => {
      const msg = docSnap.data();

      if (!msg.chapter) return;
      if (msg.name !== savedName) return;

      const chapterNumber = String(msg.chapter).replace("chapter-", "");
      const button = document.getElementById(`chapter-${chapterNumber}-btn`);

      if (button) {
        button.classList.add("my-comment");
      }
    });
  } catch (error) {
    console.error("Could not load chapter highlights:", error);
  }
}
</script>

</body>
</html>
