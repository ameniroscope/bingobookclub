<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chapter Hub | The Bingo Book Club</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap');

*{box-sizing:border-box;margin:0;padding:0;}

html,body{
  background:#0d0a0e;
  font-family:'Crimson Text',Georgia,serif;
  min-height:100vh;
  color:#f0e6c8;
}

.page{
  min-height:100vh;
  max-width:900px;
  margin:0 auto;
  padding:3rem 1.4rem;
  text-align:center;
}

.club-title{
  font-family:'Cinzel',serif;
  font-size:0.72rem;
  letter-spacing:6px;
  color:#c9a84c88;
  text-transform:uppercase;
  margin-bottom:0.35rem;
}

.main-title{
  font-family:'Cinzel',serif;
  font-size:clamp(2rem,5vw,3.3rem);
  font-weight:700;
  color:#f0e6c8;
  letter-spacing:2px;
}

.title-rule{
  display:flex;
  align-items:center;
  gap:0.6rem;
  margin:1rem auto 2rem;
  max-width:30rem;
}

.line{
  flex:1;
  height:1px;
  background:linear-gradient(to right,transparent,#c9a84c55,transparent);
}

.gem{
  color:#c9a84c;
}

.buttons{
  display:grid;
  gap:0.9rem;
  max-width:650px;
  margin:0 auto;
}

@media(min-width:620px){
  .buttons{
  display:grid;
  grid-template-columns: repeat(5, 1fr);
  gap:0.6rem;
  max-width:700px;
  margin:0 auto;
}

.btn{
  height:60px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
  border-radius:6px;
  background:#1f3a36;
  border:1px solid #c9a84c55;
  color:#f5ecd9;
  font-family:'Cinzel',serif;
  font-size:0.75rem;
  letter-spacing:1.5px;
  transition:all 0.25s ease;
}

.btn:hover{
  background:#2c4f49;
  border-color:#c9a84c;
  box-shadow:0 0 10px rgba(201,168,76,0.25);
  transform:translateY(-1px);
}

.btn-icon{
  font-size:1.5rem;
}

.btn-text{
  display:flex;
  flex-direction:column;
  align-items:flex-start;
}

.btn-label{
  font-family:'Cinzel',serif;
  text-transform:uppercase;
  font-size:0.9rem;
  letter-spacing:2px;
}

.btn-sub{
  font-size:0.75rem;
  color:#c8b89a;
  font-style:italic;
}
@media(max-width:700px){
  .buttons{
    grid-template-columns: repeat(3, 1fr);
  }
}

@media(max-width:400px){
  .buttons{
    grid-template-columns: repeat(2, 1fr);
  }
}
.back-link{
  max-width:260px;
  margin:2rem auto 0;
  min-height:55px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'Cinzel',serif;
  text-transform:uppercase;
  text-decoration:none;
  border-radius:6px;
  background:#1a0f1f;
  border:1px solid #c9a84c33;
  color:#f5ecd9;
  letter-spacing:2px;
}

.footer{
  margin-top:2rem;
  font-family:'Cinzel',serif;
  font-size:0.55rem;
  letter-spacing:2px;
  color:#c9a84cbb;
  text-transform:uppercase;
}
</style>
</head>

<body>

<div class="page">

  <div class="club-title">Spoiler-Safe</div>
  <div class="main-title">Chapter Rooms</div>

  <div class="title-rule">
    <div class="line"></div>
    <div class="gem">◆</div>
    <div class="line"></div>
  </div>

<div class="buttons" id="chapterButtons"></div>

  <a class="back-link" href="index.html">Back Home</a>

  <div class="footer">✦ Choose wisely · Spoilers stay sealed ✦</div>

</div>

<script>
const totalChapters = 41;
const container = document.getElementById("chapterButtons");

for(let i = 1; i <= totalChapters; i++){
  const link = document.createElement("a");
  link.className = "btn";
  link.href = `chat.html?chapter=${i}`;
  link.textContent = `Chap ${i}`;

  container.appendChild(link);
}
</script>
  
</body>
</html>
