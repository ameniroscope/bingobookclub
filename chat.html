<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chapter Chat | The Bingo Book Club</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap');

*{box-sizing:border-box;margin:0;padding:0;}

html,body{
  background:#0d0a0e;
  font-family:'Crimson Text',Georgia,serif;
  min-height:100vh;
  color:#f0e6c8;
}

.page{
  min-height:100vh;
  max-width:850px;
  margin:0 auto;
  padding:2rem 1rem;
  text-align:center;
}

.club-title{
  font-family:'Cinzel',serif;
  font-size:0.72rem;
  letter-spacing:6px;
  color:#c9a84c88;
  text-transform:uppercase;
}

.main-title{
  font-family:'Cinzel',serif;
  font-size:clamp(2rem,5vw,3.2rem);
  color:#f0e6c8;
  letter-spacing:2px;
  margin-top:0.3rem;
}

.card{
  background:rgba(26,15,31,0.9);
  border:1px solid #c9a84c44;
  border-radius:12px;
  padding:1.2rem;
  box-shadow:0 0 30px rgba(201,168,76,0.12);
  margin:1.5rem auto;
  max-width:680px;
}

.hidden{display:none;}

label{
  display:block;
  font-family:'Cinzel',serif;
  font-size:0.75rem;
  letter-spacing:2px;
  text-transform:uppercase;
  color:#c9a84c;
  margin-bottom:0.5rem;
  text-align:left;
}

input,textarea{
  width:100%;
  background:#0d0a0e;
  color:#f0e6c8;
  border:1px solid #c9a84c55;
  border-radius:8px;
  padding:0.85rem;
  font-family:'Crimson Text',Georgia,serif;
  font-size:1rem;
}

button,.back-link{
  min-height:52px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'Cinzel',serif;
  text-transform:uppercase;
  text-decoration:none;
  border-radius:8px;
  cursor:pointer;
  background:#1f3a36;
  border:1px solid #c9a84c55;
  color:#f5ecd9;
  letter-spacing:2px;
}

.error{
  color:#d9a1a1;
  margin-top:0.8rem;
}

.welcome{
  font-family:'Cinzel',serif;
  color:#c9a84c;
  letter-spacing:2px;
  margin-bottom:1rem;
}

.chat-window{
  height:430px;
  overflow-y:auto;
  padding:1rem;
  background:rgba(13,10,14,0.7);
  border:1px solid #c9a84c33;
  border-radius:12px;
  margin-bottom:1rem;
}

.message-list{
  display:flex;
  flex-direction:column;
  gap:0.9rem;
  text-align:left;
}

.message-row{
  display:flex;
  align-items:flex-start;
  gap:0.65rem;
}

.avatar{
  width:38px;
  height:38px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
  font-size:1.2rem;
  border:1px solid #c9a84c55;
  background:#1a0f1f;
  box-shadow:0 0 12px rgba(201,168,76,0.15);
}

.bubble{
  max-width:85%;
  border-radius:16px 16px 16px 4px;
  padding:0.8rem 1rem;
  border:1px solid #c9a84c44;
  box-shadow:0 0 10px rgba(201,168,76,0.08);
}

.bubble.green{background:#1f3a36;}
.bubble.purple{background:#24152b;}
.bubble.gold{background:#3a2d16;}
.bubble.rose{background:#3a1f28;}
.bubble.blue{background:#172838;}

.bubble-name{
  font-family:'Cinzel',serif;
  font-size:0.65rem;
  letter-spacing:1.5px;
  color:#c9a84c;
  margin-bottom:0.25rem;
  text-transform:uppercase;
}

.bubble-text{
  color:#f0e6c8;
  line-height:1.5;
  white-space:pre-wrap;
}

.chat-input-row{
  display:flex;
  gap:0.7rem;
}

.chat-input-row textarea{
  min-height:55px;
  resize:none;
}

.chat-input-row button{
  width:130px;
  flex-shrink:0;
}

.empty-message{
  color:#c8b89a;
  font-style:italic;
  text-align:center;
  padding:1rem;
}

.links{
  display:flex;
  justify-content:center;
  gap:1rem;
  flex-wrap:wrap;
}

.back-link{
  width:220px;
  margin-top:0.5rem;
  background:#1a0f1f;
}

@media(max-width:600px){
  .chat-input-row{
    flex-direction:column;
  }

  .chat-input-row button{
    width:100%;
  }

  .chat-window{
    height:380px;
  }

  .bubble{
    max-width:100%;
  }
}
</style>
</head>

<body>

<div class="page">

  <div class="club-title">Spoiler-Safe Chat</div>
  <div class="main-title" id="chapterTitle">Chapter Chat</div>

  <div id="loginBox" class="card">
    <label for="codeInput">Enter your private code</label>
    <input id="codeInput" type="password" placeholder="Your code">
    <br><br>
    <button id="loginBtn" type="button">Enter Chat</button>
    <p id="loginError" class="error"></p>
  </div>

  <div id="chatBox" class="card hidden">
    <div id="welcome" class="welcome"></div>

    <div class="chat-window" id="chatWindow">
      <div id="messages" class="message-list"></div>
    </div>

    <div class="chat-input-row">
      <textarea id="messageInput" placeholder="Write a message..."></textarea>
      <button id="sendBtn" type="button">Send</button>
    </div>
  </div>

  <div class="links">
    <a class="back-link" href="chapter_hub.html">All Chapters</a>
    <a class="back-link" href="index.html">Home</a>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
  getFirestore,
  doc,
  getDoc,
  collection,
  addDoc,
  query,
  where,
  orderBy,
  onSnapshot,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAIQTe-QGQmwqTVmIyJZZ_qlDNsD6GUskY",
  authDomain: "bingobookclub-2144e.firebaseapp.com",
  projectId: "bingobookclub-2144e",
  storageBucket: "bingobookclub-2144e.firebasestorage.app",
  messagingSenderId: "294177836341",
  appId: "1:294177836341:web:6d5f11e64737fbe3aad07c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const urlParams = new URLSearchParams(window.location.search);
const chapterNumber = urlParams.get("chapter") || "1";
const chapterId = "chapter-" + chapterNumber;

document.getElementById("chapterTitle").textContent = "Chapter " + chapterNumber;

let currentName = "";
let currentAvatar = "📚";
let currentColor = "green";
let unsubscribeMessages = null;

const loginBox = document.getElementById("loginBox");
const chatBox = document.getElementById("chatBox");
const codeInput = document.getElementById("codeInput");
const loginBtn = document.getElementById("loginBtn");
const loginError = document.getElementById("loginError");
const welcome = document.getElementById("welcome");
const messageInput = document.getElementById("messageInput");
const sendBtn = document.getElementById("sendBtn");
const messages = document.getElementById("messages");
const chatWindow = document.getElementById("chatWindow");

const savedName = sessionStorage.getItem("bookClubName");
const savedAvatar = sessionStorage.getItem("bookClubAvatar");
const savedColor = sessionStorage.getItem("bookClubColor");

if(savedName){
  currentName = savedName;
  currentAvatar = savedAvatar || "📚";
  currentColor = savedColor || "green";
  showChat();
}

loginBtn.addEventListener("click", login);

codeInput.addEventListener("keydown", function(event){
  if(event.key === "Enter"){
    login();
  }
});

sendBtn.addEventListener("click", sendMessage);

messageInput.addEventListener("keydown", function(event){
  if(event.key === "Enter" && !event.shiftKey){
    event.preventDefault();
    sendMessage();
  }
});

async function login(){
  const code = codeInput.value.trim();
  loginError.textContent = "";

  if(!code){
    loginError.textContent = "Please enter your code.";
    return;
  }

  loginBtn.disabled = true;
  loginBtn.textContent = "Checking...";

  try{
    const codeSnap = await getDoc(doc(db, "accessCodes", code));

    if(!codeSnap.exists()){
      loginError.textContent = "Wrong code. Check capital letters.";
      return;
    }

    const data = codeSnap.data();

    if(!data.name){
      loginError.textContent = "This code exists, but it has no name field.";
      return;
    }

    currentName = data.name;
    currentAvatar = data.avatar || "📚";
    currentColor = cleanColor(data.color || "green");

    sessionStorage.setItem("bookClubName", currentName);
    sessionStorage.setItem("bookClubAvatar", currentAvatar);
    sessionStorage.setItem("bookClubColor", currentColor);

    showChat();

  }catch(error){
    loginError.textContent = "Firebase error: " + error.message;
  }finally{
    loginBtn.disabled = false;
    loginBtn.textContent = "Enter Chat";
  }
}

function showChat(){
  loginBox.classList.add("hidden");
  chatBox.classList.remove("hidden");
  welcome.textContent = currentAvatar + " Welcome, " + currentName;
  loadMessages();
}

async function sendMessage(){
  const text = messageInput.value.trim();

  if(!currentName){
    alert("Please enter your code first.");
    return;
  }

  if(!text){
    return;
  }

  sendBtn.disabled = true;
  sendBtn.textContent = "Sending...";

  try{
    await addDoc(collection(db, "messages"), {
      name: currentName,
      avatar: currentAvatar,
      color: currentColor,
      text: text,
      chapter: chapterId,
      createdAt: serverTimestamp()
    });

    messageInput.value = "";

  }catch(error){
    alert("Could not send message: " + error.message);
  }finally{
    sendBtn.disabled = false;
    sendBtn.textContent = "Send";
  }
}

function loadMessages(){
  messages.innerHTML = `<div class="empty-message">Loading messages...</div>`;

  if(unsubscribeMessages){
    unsubscribeMessages();
  }

  const q = query(
    collection(db, "messages"),
    where("chapter", "==", chapterId),
    orderBy("createdAt", "asc")
  );

  unsubscribeMessages = onSnapshot(q, function(snapshot){
    messages.innerHTML = "";

    if(snapshot.empty){
      messages.innerHTML = `<div class="empty-message">No messages in this chapter yet.</div>`;
      return;
    }

    snapshot.forEach(function(docSnap){
      const msg = docSnap.data();

      const row = document.createElement("div");
      row.className = "message-row";

      const color = cleanColor(msg.color || "green");

      row.innerHTML = `
        <div class="avatar">${escapeHTML(msg.avatar || "📚")}</div>
        <div class="bubble ${color}">
          <div class="bubble-name">${escapeHTML(msg.name || "Unknown Reader")}</div>
          <div class="bubble-text">${escapeHTML(msg.text || "")}</div>
        </div>
      `;

      messages.appendChild(row);
    });

    chatWindow.scrollTop = chatWindow.scrollHeight;

  }, function(error){
    messages.innerHTML = `<div class="error">${escapeHTML(error.message)}</div>`;
  });
}

function cleanColor(color){
  const allowedColors = ["green", "purple", "gold", "rose", "blue"];
  return allowedColors.includes(color) ? color : "green";
}

function escapeHTML(str){
  return String(str || "").replace(/[&<>"']/g, function(char){
    return {
      "&":"&amp;",
      "<":"&lt;",
      ">":"&gt;",
      '"':"&quot;",
      "'":"&#039;"
    }[char];
  });
}
</script>

</body>
</html>
