<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chapter Chat | The Bingo Book Club</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap');

*{box-sizing:border-box;margin:0;padding:0;}

html,body{
  background:#0d0a0e;
  font-family:'Crimson Text',Georgia,serif;
  min-height:100vh;
  width:100%;
  overflow-x:hidden;
  color:#f0e6c8;
}

.stars{position:fixed;inset:0;pointer-events:none;z-index:0;}
.star{position:absolute;background:#c9a84c;border-radius:50%;animation:twinkle var(--d) ease-in-out infinite;animation-delay:var(--delay);}
@keyframes twinkle{0%,100%{opacity:0.1;}50%{opacity:0.8;}}

.page{
  position:relative;
  z-index:1;
  min-height:100vh;
  padding:3rem 1.4rem;
  max-width:900px;
  margin:0 auto;
  text-align:center;
}

.club-title{
  font-family:'Cinzel',serif;
  font-size:0.72rem;
  letter-spacing:6px;
  color:#c9a84c88;
  text-transform:uppercase;
  margin-bottom:0.35rem;
}

.main-title{
  font-family:'Cinzel',serif;
  font-size:clamp(2rem,5vw,3.3rem);
  font-weight:700;
  color:#f0e6c8;
  line-height:1;
  letter-spacing:2px;
  text-shadow:0 0 40px rgba(201,168,76,0.25);
}

.title-rule{
  display:flex;
  align-items:center;
  gap:0.6rem;
  margin:1rem auto 2rem;
  width:100%;
  max-width:30rem;
}

.title-rule .line{
  flex:1;
  height:1px;
  background:linear-gradient(to right,transparent,#c9a84c55,transparent);
}

.title-rule .gem{
  color:#c9a84c;
  font-size:0.65rem;
}

.card{
  background:rgba(26,15,31,0.88);
  border:1px solid #c9a84c44;
  border-radius:10px;
  padding:1.5rem;
  box-shadow:0 0 30px rgba(201,168,76,0.12);
  margin:0 auto 1.5rem;
  max-width:650px;
}

.hidden{display:none;}

label{
  display:block;
  font-family:'Cinzel',serif;
  font-size:0.75rem;
  letter-spacing:2px;
  text-transform:uppercase;
  color:#c9a84c;
  margin-bottom:0.5rem;
  text-align:left;
}

input,select,textarea{
  width:100%;
  background:#0d0a0e;
  color:#f0e6c8;
  border:1px solid #c9a84c55;
  border-radius:6px;
  padding:0.85rem;
  font-family:'Crimson Text',Georgia,serif;
  font-size:1rem;
  margin-bottom:1rem;
}

textarea{
  min-height:110px;
  resize:vertical;
}

button,.back-link{
  width:100%;
  min-height:55px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:0.7rem;
  padding:0 1.2rem;
  font-family:'Cinzel',serif;
  text-transform:uppercase;
  text-decoration:none;
  border-radius:6px;
  transition:all 0.3s ease;
  cursor:pointer;
  background:#1f3a36;
  border:1px solid #c9a84c55;
  color:#f5ecd9;
  box-shadow:0 0 12px rgba(201,168,76,0.15);
  letter-spacing:2px;
}

button:hover,.back-link:hover{
  background:#2c4f49;
  border-color:#c9a84c;
  box-shadow:0 0 20px rgba(201,168,76,0.25);
  transform:translateY(-2px);
}

button:disabled{
  opacity:0.6;
  cursor:not-allowed;
  transform:none;
}

.error{
  color:#d9a1a1;
  margin-top:0.8rem;
  line-height:1.5;
}

.welcome{
  font-family:'Cinzel',serif;
  color:#c9a84c;
  letter-spacing:2px;
  margin-bottom:1rem;
}

.message-list{
  margin-top:1.3rem;
  display:flex;
  flex-direction:column;
  gap:0.9rem;
  text-align:left;
}

.bubble{
  background:#1a0f1f;
  border:1px solid #c9a84c33;
  border-radius:14px;
  padding:1rem;
  box-shadow:0 0 12px rgba(201,168,76,0.08);
}

.bubble-name{
  font-family:'Cinzel',serif;
  font-size:0.75rem;
  letter-spacing:1.5px;
  color:#c9a84c;
  margin-bottom:0.35rem;
  text-transform:uppercase;
}

.bubble-text{
  color:#c8b89a;
  line-height:1.6;
  white-space:pre-wrap;
}

.empty-message{
  color:#c8b89a;
  font-style:italic;
  text-align:center;
  padding:1rem;
}

.footer{
  margin-top:2rem;
  font-family:'Cinzel',serif;
  font-size:0.45rem;
  letter-spacing:2px;
  color:#c9a84cbb;
  text-transform:uppercase;
  text-align:center;
}

.back-link{
  max-width:260px;
  margin:1.5rem auto 0;
}
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
  getFirestore,
  doc,
  getDoc,
  collection,
  addDoc,
  query,
  where,
  orderBy,
  onSnapshot,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAIQTe-QGQmwqTVmIyJZZ_qlDNsD6GUskY",
  authDomain: "bingobookclub-2144e.firebaseapp.com",
  projectId: "bingobookclub-2144e",
  storageBucket: "bingobookclub-2144e.firebasestorage.app",
  messagingSenderId: "294177836341",
  appId: "1:294177836341:web:6d5f11e64737fbe3aad07c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentName = "";
let unsubscribeMessages = null;

const loginBox = document.getElementById("loginBox");
const chatBox = document.getElementById("chatBox");
const codeInput = document.getElementById("codeInput");
const loginBtn = document.getElementById("loginBtn");
const loginError = document.getElementById("loginError");
const welcome = document.getElementById("welcome");
const chapterSelect = document.getElementById("chapterSelect");
const messageInput = document.getElementById("messageInput");
const sendBtn = document.getElementById("sendBtn");
const messages = document.getElementById("messages");

const savedName = sessionStorage.getItem("bookClubName");

if (savedName) {
  currentName = savedName;
  showChat();
}

loginBtn.addEventListener("click", login);

codeInput.addEventListener("keydown", (event) => {
  if (event.key === "Enter") {
    login();
  }
});

chapterSelect.addEventListener("change", loadMessages);
sendBtn.addEventListener("click", sendMessage);

messageInput.addEventListener("keydown", (event) => {
  if (event.key === "Enter" && !event.shiftKey) {
    event.preventDefault();
    sendMessage();
  }
});

async function login() {
  loginError.textContent = "";

  const code = codeInput.value.trim();

  if (!code) {
    loginError.textContent = "Please enter your private code.";
    return;
  }

  loginBtn.disabled = true;
  loginBtn.textContent = "Checking...";

  try {
    const codeRef = doc(db, "accessCodes", code);
    const codeSnap = await getDoc(codeRef);

    if (!codeSnap.exists()) {
      loginError.textContent = "Wrong code. Check spelling and capital letters.";
      return;
    }

    const userData = codeSnap.data();

    if (!userData.name) {
      loginError.textContent = "This code exists, but it has no name field in Firebase.";
      return;
    }

    currentName = userData.name;
    sessionStorage.setItem("bookClubName", currentName);

    showChat();

  } catch (error) {
    console.error("Login error:", error);

    if (error.code === "permission-denied") {
      loginError.textContent = "Firebase blocked this. Check your Firestore rules.";
    } else {
      loginError.textContent = "Login error: " + error.message;
    }

  } finally {
    loginBtn.disabled = false;
    loginBtn.textContent = "Enter the Reading Room";
  }
}

function showChat() {
  loginBox.classList.add("hidden");
  chatBox.classList.remove("hidden");
  welcome.textContent = `Welcome, ${currentName}`;
  loadMessages();
}

async function sendMessage() {
  const text = messageInput.value.trim();
  const chapter = chapterSelect.value;

  if (!currentName) {
    alert("Please enter your code first.");
    return;
  }

  if (!text) {
    return;
  }

  sendBtn.disabled = true;
  sendBtn.textContent = "Posting...";

  try {
    await addDoc(collection(db, "messages"), {
      name: currentName,
      text: text,
      chapter: chapter,
      createdAt: serverTimestamp()
    });

    messageInput.value = "";

  } catch (error) {
    console.error("Message error:", error);

    if (error.code === "permission-denied") {
      alert("Firebase blocked this message. Check your Firestore rules.");
    } else {
      alert("Could not post message: " + error.message);
    }

  } finally {
    sendBtn.disabled = false;
    sendBtn.textContent = "Post Message";
  }
}

function loadMessages() {
  const chapter = chapterSelect.value;

  messages.innerHTML = `<div class="empty-message">Loading messages...</div>`;

  if (unsubscribeMessages) {
    unsubscribeMessages();
    unsubscribeMessages = null;
  }

  const q = query(
    collection(db, "messages"),
    where("chapter", "==", chapter),
    orderBy("createdAt", "asc")
  );

  unsubscribeMessages = onSnapshot(
    q,
    (snapshot) => {
      messages.innerHTML = "";

      if (snapshot.empty) {
        messages.innerHTML = `<div class="empty-message">No messages for this chapter yet.</div>`;
        return;
      }

      snapshot.forEach((documentSnapshot) => {
        const msg = documentSnapshot.data();

        const bubble = document.createElement("div");
        bubble.className = "bubble";

        const chapterLabel = chapter.replace("-", " ");

        bubble.innerHTML = `
          <div class="bubble-header">
            <div class="bubble-name">${escapeHTML(msg.name || "Unknown Reader")}</div>
            <div class="bubble-chapter">${escapeHTML(chapterLabel)}</div>
          </div>
          <div class="bubble-text">${escapeHTML(msg.text || "")}</div>
        `;

        messages.appendChild(bubble);
      });
    },
    (error) => {
      console.error("Message loading error:", error);

      if (error.code === "permission-denied") {
        messages.innerHTML = `<div class="error">Firebase blocked the messages. Check your Firestore rules.</div>`;
      } else if (error.code === "failed-precondition") {
        messages.innerHTML = `
          <div class="error">
            Firebase needs an index for this chat. Open the browser console, click the Firebase index link, then refresh this page once the index is enabled.
          </div>
        `;
      } else {
        messages.innerHTML = `<div class="error">Could not load messages: ${escapeHTML(error.message)}</div>`;
      }
    }
  );
}

function escapeHTML(str) {
  return String(str).replace(/[&<>"']/g, (char) => ({
    "&": "&amp;",
    "<": "&lt;",
    ">": "&gt;",
    '"': "&quot;",
    "'": "&#039;"
  }[char]));
}
</script>

</body>
</html>
